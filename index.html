<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التحليل المالي الذكية - FinTech Dashboard</title>
    <!-- خط Cairo المتميز للتصاميم العربية الاحترافية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- مكتبات التطوير والتشغيل الفوري (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة الرسوم البيانية الشهيرة Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- مكتبة قراءة ملفات الإكسل XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- أيقونات Lucide الرائعة -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // تخصيص إعدادات Tailwind لتناسب الهوية المالية الفاخرة
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        finance: {
                            dark: '#0f172a',    // كحلي داكن ملكي
                            navy: '#1e293b',    // كحلي وسيط للبطاقات
                            green: '#10b981',   // أخضر مالي للنمو والسيولة
                            red: '#ef4444',     // أحمر للمخاطر والتنبيهات
                            blue: '#3b82f6',    // أزرق تشغيلي حيادي
                            gold: '#f59e0b',    // ذهبي للمؤشرات الاستثنائية
                            lightBg: '#f8fafc'  // خلفية بيضاء مريحة للعين
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
        /* تأثيرات الانتقال والتمرير السلس */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root"></div>

    <!-- كود تطبيق الـ React والتحليلات المالية المدمجة -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ميزان مراجعة نموذجي IFRS (عربي/إنجليزي) لتشغيل المنصة مباشرة وتسهيل المعاينة
        const defaultTrialBalance = [
            // الأصول المتداولة
            { code: "1110", nameAr: "النقد وما في حكمه", nameEn: "Cash & Cash Equivalents", debit: 185000, credit: 0, category: "Assets", subCategory: "Current Assets" },
            { code: "1120", nameAr: "العملاء (الذمم المدينة)", nameEn: "Trade Receivables", debit: 120000, credit: 0, category: "Assets", subCategory: "Current Assets" },
            { code: "1130", nameAr: "المخزون السلعي", nameEn: "Inventory", debit: 210000, credit: 0, category: "Assets", subCategory: "Current Assets" },
            // الأصول غير المتداولة
            { code: "1210", nameAr: "الأصول الثابتة (بالصافي)", nameEn: "Property, Plant & Equipment", debit: 450000, credit: 0, category: "Assets", subCategory: "Non-Current Assets" },
            // الالتزامات المتداولة
            { code: "2110", nameAr: "الموردون (الذمم الدائنة)", nameEn: "Trade Payables", debit: 0, credit: 95000, category: "Liabilities", subCategory: "Current Liabilities" },
            { code: "2120", nameAr: "قروض قصيرة الأجل", nameEn: "Short-term Loans", debit: 0, credit: 50000, category: "Liabilities", subCategory: "Current Liabilities" },
            // حقوق الملكية
            { code: "3100", nameAr: "رأس المال المدفوع", nameEn: "Share Capital", debit: 0, credit: 500000, category: "Equity", subCategory: "Equity" },
            { code: "3200", nameAr: "الأرباح المبقاة (المدورة)", nameEn: "Retained Earnings", debit: 0, credit: 110000, category: "Equity", subCategory: "Equity" },
            // الإيرادات
            { code: "4100", nameAr: "إيرادات المبيعات والخدمات", nameEn: "Sales Revenues", debit: 0, credit: 420000, category: "Revenues", subCategory: "Revenues" },
            // المصروفات
            { code: "5100", nameAr: "تكلفة البضاعة المباعة (COGS)", nameEn: "Cost of Goods Sold", debit: 210000, credit: 0, category: "Expenses", subCategory: "Direct Expenses" },
            { code: "5200", nameAr: "المصروفات الإدارية والعمومية", nameEn: "General & Administrative Expenses", debit: 75000, credit: 0, category: "Expenses", subCategory: "Operating Expenses" },
            { code: "5300", nameAr: "تكاليف التمويل والفوائد", nameEn: "Finance Costs", debit: 15000, credit: 0, category: "Expenses", subCategory: "Finance Expenses" }
        ];

        function App() {
            // إدارة الصفحات والواجهات النشطة
            const [currentView, setCurrentView] = useState('dashboard'); // dashboard, ingestion, ratios, risk, forecasting
            // إدارة ميزان المراجعة النشط في النظام
            const [trialBalance, setTrialBalance] = useState(defaultTrialBalance);
            // الفترة المالية المختارة
            const [selectedPeriod, setSelectedPeriod] = useState('2026-05');
            // دور المستخدم النشط للتجربة المتكاملة
            const [userRole, setUserRole] = useState('CFO'); // CFO, ChiefAccountant, Junior
            // لغة الواجهة الفرعية للمصطلحات المالية
            const [lang, setLang] = useState('ar');

            // دالة لحساب المؤشرات المالية الأساسية ديناميكياً من ميزان المراجعة الحالي
            const calculateFinancials = () => {
                let cash = 0;
                let receivables = 0;
                let inventory = 0;
                let fixedAssets = 0;
                let payables = 0;
                let shortLoans = 0;
                let capital = 0;
                let retainedEarnings = 0;
                let sales = 0;
                let cogs = 0;
                let opex = 0;
                let financeCosts = 0;

                trialBalance.forEach(item => {
                    const code = parseInt(item.code);
                    const netAmt = (item.debit || 0) - (item.credit || 0);
                    
                    // تصنيف منطقي ذكي بناءً على كود الحساب ومعايير IFRS
                    if (code === 1110) cash += netAmt;
                    else if (code === 1120) receivables += netAmt;
                    else if (code === 1130) inventory += netAmt;
                    else if (code === 1210) fixedAssets += netAmt;
                    else if (code === 2110) payables += Math.abs(netAmt);
                    else if (code === 2120) shortLoans += Math.abs(netAmt);
                    else if (code === 3100) capital += Math.abs(netAmt);
                    else if (code === 3200) retainedEarnings += Math.abs(netAmt);
                    else if (code === 4100) sales += Math.abs(netAmt);
                    else if (code === 5100) cogs += netAmt;
                    else if (code === 5200) opex += netAmt;
                    else if (code === 5300) financeCosts += netAmt;
                });

                // العمليات الحسابية المترابطة
                const totalCurrentAssets = cash + receivables + inventory;
                const totalCurrentLiabilities = payables + shortLoans;
                const totalAssets = totalCurrentAssets + fixedAssets;
                
                const grossProfit = sales - cogs;
                const ebit = grossProfit - opex; // الربح التشغيلي قبل الفوائد والضرائب
                const netIncome = ebit - financeCosts;
                
                const workingCapital = totalCurrentAssets - totalCurrentLiabilities;
                const currentRatio = totalCurrentLiabilities > 0 ? (totalCurrentAssets / totalCurrentLiabilities).toFixed(2) : "N/A";
                const quickRatio = totalCurrentLiabilities > 0 ? ((cash + receivables) / totalCurrentLiabilities).toFixed(2) : "N/A";
                const debtToEquity = (capital + retainedEarnings) > 0 ? ((totalCurrentLiabilities / (capital + retainedEarnings)) * 100).toFixed(1) : "N/A";
                
                // حساب مؤشرات التشغيل والأيام
                const dso = sales > 0 ? Math.round((receivables / sales) * 365) : 0; // أيام تحصيل العملاء
                const dio = cogs > 0 ? Math.round((inventory / cogs) * 365) : 0;     // أيام بقاء المخزون
                const dpo = cogs > 0 ? Math.round((payables / cogs) * 365) : 0;      // أيام سداد الموردين
                const ccc = (dso + dio) - dpo; // دورة التحول النقدي

                return {
                    cash, receivables, inventory, payables, sales, cogs, opex, netIncome, grossProfit, ebit,
                    totalCurrentAssets, totalCurrentLiabilities, workingCapital, currentRatio, quickRatio,
                    debtToEquity, dso, dio, dpo, ccc
                };
            };

            const fin = calculateFinancials();

            // دالة مساعدة لتنسيق المبالغ المالية بطريقة عربية فخمة
            const formatCurrency = (val) => {
                return new Intl.NumberFormat('ar-SA', { style: 'currency', currency: 'SAR', maximumFractionDigits: 0 }).format(val);
            };

            // تشغيل مكتبة الأيقونات بعد رندر الصفحة لضمان ظهورها
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentView, userRole]);

            // دالة لتوليد ملف إكسل تجريبي جاهز كقالب للمستخدم للتنزيل الفوري
            const downloadExcelTemplate = () => {
                const wsData = [
                    ["كود الحساب (Account Code)", "اسم الحساب - عربي (Account Name AR)", "اسم الحساب - إنجليزي (Account Name EN)", "مدين (Debit)", "دائن (Credit)", "الفترة المالية (Period)"],
                    ["1110", "النقد وما في حكمه", "Cash & Cash Equivalents", 150000, 0, "2026-05"],
                    ["1120", "العملاء (الذمم المدينة)", "Trade Receivables", 95000, 0, "2026-05"],
                    ["1130", "المخزون السلعي", "Inventory", 180000, 0, "2026-05"],
                    ["1210", "الأصول الثابتة (بالصافي)", "Property, Plant & Equipment", 400000, 0, "2026-05"],
                    ["2110", "الموردون (الذمم الدائنة)", "Trade Payables", 0, 80000, "2026-05"],
                    ["2120", "قروض قصيرة الأجل", "Short-term Loans", 0, 40000, "2026-05"],
                    ["3100", "رأس المال المدفوع", "Share Capital", 0, 500000, "2026-05"],
                    ["3200", "الأرباح المبقاة (المدورة)", "Retained Earnings", 0, 100000, "2026-05"],
                    ["4100", "إيرادات المبيعات والخدمات", "Sales Revenues", 0, 350000, "2026-05"],
                    ["5100", "تكلفة البضاعة المباعة (COGS)", "Cost of Goods Sold", 175000, 0, "2026-05"],
                    ["5200", "المصروفات الإدارية والعمومية", "General & Administrative Expenses", 60000, 0, "2026-05"],
                    ["5300", "تكاليف التمويل والفوائد", "Finance Costs", 10000, 0, "2026-05"]
                ];
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "Trial Balance Template");
                XLSX.writeFile(wb, `IFRS_Trial_Balance_Template_${selectedPeriod}.xlsx`);
            };

            // دالة للتعامل مع رفع ملف الإكسل الفعلي وقراءته فورياً وتحديث المنصة بالكامل!
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    // معالجة البيانات وتحويلها إلى ميزان مراجعة محدث ومطابق للشجرة
                    const parsedBalance = [];
                    // نبدأ من السطر الثاني لتجاوز العناوين
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if (row[0] && row[1]) {
                            parsedBalance.push({
                                code: row[0].toString(),
                                nameAr: row[1],
                                nameEn: row[2] || row[1],
                                debit: parseFloat(row[3]) || 0,
                                credit: parseFloat(row[4]) || 0,
                                period: row[5] || selectedPeriod
                            });
                        }
                    }

                    if (parsedBalance.length > 0) {
                        setTrialBalance(parsedBalance);
                        alert("تم رفع ميزان المراجعة وقراءته بنجاح! تم تحديث لوحة القيادة والنسب المالية فوراً.");
                        setCurrentView('dashboard');
                    } else {
                        alert("خطأ: لم نتمكن من قراءة البيانات بالشكل الصحيح. تأكد من استخدام القالب الخاص بنا.");
                    }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div class="min-h-screen flex bg-slate-50 text-slate-800">
                    
                    {/* 1. القائمة الجانبية (Sidebar) - الهوية البصرية الداكنة الفخمة */}
                    <aside class="w-72 bg-slate-900 text-white flex flex-col justify-between shadow-xl transition-all duration-300">
                        <div>
                            {/* الشعار والهوية التجارية */}
                            <div class="p-6 border-b border-slate-800 flex items-center space-x-3 space-x-reverse">
                                <div class="bg-emerald-500 text-slate-900 p-2 rounded-xl shadow-md shadow-emerald-500/20">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-lg font-bold leading-none tracking-wide text-white">فينتيك برو</h1>
                                    <span class="text-xs text-emerald-400 font-semibold">تحليل مالي فائق الذكاء</span>
                                </div>
                            </div>

                            {/* قائمة الروابط والتنقل السهل والسلس */}
                            <nav class="p-4 space-y-2">
                                <p class="text-xs font-semibold text-slate-500 px-3 uppercase tracking-wider">التحليل الرئيسي</p>
                                
                                <button 
                                    onClick={() => setCurrentView('dashboard')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-semibold ${currentView === 'dashboard' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                                    <span>لوحة القيادة التنفيذية (CFO)</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ingestion')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-semibold ${currentView === 'ingestion' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="file-up" class="w-5 h-5"></i>
                                    <span>بوابة رفع البيانات والمدقق</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ratios')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-semibold ${currentView === 'ratios' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="percent" class="w-5 h-5"></i>
                                    <span>مركز النسب المالية والتحليل</span>
                                </button>

                                <p class="text-xs font-semibold text-slate-500 px-3 pt-4 uppercase tracking-wider">الذكاء الاستباقي</p>

                                <button 
                                    onClick={() => setCurrentView('risk')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-semibold ${currentView === 'risk' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                                    <span>رادار المخاطر والتنبيهات</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('forecasting')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-semibold ${currentView === 'forecasting' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="line-chart" class="w-5 h-5"></i>
                                    <span>التنبؤ المالي وتدفق النقد</span>
                                </button>
                            </nav>
                        </div>

                        {/* معلومات المستخدم ودور الإدارة في أسفل السايدبار */}
                        <div class="p-4 border-t border-slate-800">
                            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-800 flex flex-col space-y-2">
                                <span class="text-xs text-slate-400 font-medium">مستوى الصلاحية النشط:</span>
                                <div class="flex items-center space-x-2 space-x-reverse">
                                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span class="text-sm font-bold text-white">
                                        {userRole === 'CFO' && "المدير المالي (CFO)"}
                                        {userRole === 'ChiefAccountant' && "رئيس الحسابات"}
                                        {userRole === 'Junior' && "محاسب مبتدئ / مدخل بيانات"}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* 2. منطقة العمل الرئيسية والمستجيبة بالكامل (Main Area) */}
                    <main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
                        
                        {/* شريط الأدوات العلوي (Top Navbar) */}
                        <header class="bg-white border-b border-slate-200 h-20 px-8 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div class="flex items-center space-x-6 space-x-reverse">
                                <h2 class="text-xl font-bold text-slate-900">
                                    {currentView === 'dashboard' && "لوحة القيادة التنفيذية الشاملة"}
                                    {currentView === 'ingestion' && "بوابة رفع ميزان المراجعة والتدقيق"}
                                    {currentView === 'ratios' && "مركز النسب المالية المتطورة"}
                                    {currentView === 'risk' && "رادار المخاطر والتحذيرات الاستباقية"}
                                    {currentView === 'forecasting' && "محرك التنبؤ المالي والتدفقات المستقبلية"}
                                </h2>
                                
                                {/* فلتر تحديد نوع المستخدم للتجربة التفاعلية */}
                                <div class="flex bg-slate-100 p-1 rounded-lg text-xs font-semibold border border-slate-200">
                                    <button onClick={() => setUserRole('CFO')} class={`px-3 py-1.5 rounded-md transition-all ${userRole === 'CFO' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}>CFO</button>
                                    <button onClick={() => setUserRole('ChiefAccountant')} class={`px-3 py-1.5 rounded-md transition-all ${userRole === 'ChiefAccountant' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}>رئيس الحسابات</button>
                                    <button onClick={() => setUserRole('Junior')} class={`px-3 py-1.5 rounded-md transition-all ${userRole === 'Junior' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}>محاسب مبتدئ</button>
                                </div>
                            </div>

                            {/* أدوات المزامنة، اختيار التاريخ وتنزيل القالب الذكي */}
                            <div class="flex items-center space-x-4 space-x-reverse">
                                <div class="flex items-center space-x-2 space-x-reverse">
                                    <span class="text-xs text-slate-500 font-bold">الفترة المالية:</span>
                                    <input 
                                        type="month" 
                                        value={selectedPeriod}
                                        onChange={(e) => setSelectedPeriod(e.target.value)}
                                        class="border border-slate-200 px-3 py-1.5 rounded-lg text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent bg-slate-50"
                                    />
                                </div>

                                <button 
                                    onClick={downloadExcelTemplate}
                                    class="bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center space-x-2 space-x-reverse transition-all"
                                >
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                    <span>تنزيل قالب ميزان المراجعة (Excel)</span>
                                </button>
                            </div>
                        </header>

                        {/* مساحة الرندرة الديناميكية (التبديل بين الواجهات) */}
                        <div class="p-8 flex-1 max-w-7xl w-full mx-auto space-y-8 fade-in">
                            
                            {/* إشعار مخصص حسب دور المستخدم لشرح ما يراه المحاسب أو المدير المالي */}
                            <div class="bg-emerald-50/50 border border-emerald-200/60 rounded-2xl p-4 flex items-start space-x-3 space-x-reverse">
                                <div class="bg-emerald-500 text-white p-2 rounded-xl mt-0.5">
                                    <i data-lucide="info" class="w-5 h-5"></i>
                                </div>
                                <div class="space-y-1">
                                    <h4 class="font-bold text-emerald-950 text-sm">مساعد الذكاء المالي النشط لـ {userRole === 'CFO' ? 'المدير المالي' : userRole === 'ChiefAccountant' ? 'رئيس الحسابات' : 'المحاسب'}:</h4>
                                    <p class="text-xs text-emerald-800 leading-relaxed">
                                        {userRole === 'CFO' && "أهلاً بك يا سعادة المدير المالي. قمنا بالربط الشبكي بين التدفقات وقوائم الربحية لنمنحك رؤية استراتيجية واضحة حول رأس المال العامل، رادار المخاطر، وفترات التنبؤ المستقبلية للتفاوض مع الموردين."}
                                        {userRole === 'ChiefAccountant' && "مرحباً بك يا رئيس الحسابات. نقوم بمراقبة توازن الحسابات ومراجعة فروقات الأقفال الشهري وتدقيق الأرصدة الشاذة غير الطبيعية في ميزان المراجعة."}
                                        {userRole === 'Junior' && "مرحباً بك. يرجى تحميل قالب الإكسل الجاهز، وتعبئته بأرصدة الفترة المالية، ثم سحبه وإسقاطه في بوابة الرفع وسيقوم النظام الذكي بمراجعة التوازن وتوليد التحليلات فوراً نيابة عنك!"}
                                    </p>
                                </div>
                            </div>

                            {/* ==================== الواجهة 1: لوحة القيادة التنفيذية (Dashboard) ==================== */}
                            {currentView === 'dashboard' && (
                                <div class="space-y-8">
                                    {/* صف بطاقات الأداء المالي (KPIs Cards) */}
                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        
                                        {/* بطاقة المبيعات */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">إجمالي المبيعات (قائمة الدخل)</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.sales)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                                                    <span>+12.4% عن الشهر السابق</span>
                                                </div>
                                            </div>
                                            <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl">
                                                <i data-lucide="shopping-bag" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* بطاقة صافي الربح */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">صافي الربح الصافي</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.netIncome)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                                                    <span>هامش صافي {((fin.netIncome / fin.sales)*100).toFixed(1)}%</span>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-50 text-emerald-600 p-4 rounded-2xl">
                                                <i data-lucide="dollar-sign" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* بطاقة النقد وما في حكمه */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">السيولة النقدية المتاحة</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.cash)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-amber-600 font-bold">
                                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i>
                                                    <span>مخزون نقدي كافي لـ 4 أشهر</span>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-50 text-emerald-600 p-4 rounded-2xl">
                                                <i data-lucide="wallet" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* بطاقة رأس المال العامل */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">رأس المال العامل النشط</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.workingCapital)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="activity" class="w-3.5 h-3.5"></i>
                                                    <span>مستوى سيولة آمن جداً</span>
                                                </div>
                                            </div>
                                            <div class="bg-purple-50 text-purple-600 p-4 rounded-2xl">
                                                <i data-lucide="briefcase" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                    </div>

                                    {/* قسم لوحة التفاعلية ورأس المال العامل المتقدم */}
                                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        
                                        {/* مؤشرات السيولة السريعة ورأس المال العامل */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6 lg:col-span-2">
                                            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                                                <h3 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                    <i data-lucide="gauge" class="text-emerald-500"></i>
                                                    <span>تحليل السيولة ورأس المال العامل</span>
                                                </h3>
                                                <span class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold">محسوب من ميزان المراجعة</span>
                                            </div>

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                                                    <div class="flex justify-between text-sm">
                                                        <span class="font-semibold text-slate-500">نسبة التداول الحالية:</span>
                                                        <span class="font-bold text-emerald-600">{fin.currentRatio}</span>
                                                    </div>
                                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                                        <div class="bg-emerald-500 h-2.5 rounded-full" style={{ width: `${Math.min((parseFloat(fin.currentRatio)/3)*100, 100)}%` }}></div>
                                                    </div>
                                                    <p class="text-xs text-slate-500">الحد الآمن العالمي هو 1.5 إلى 2.0. أنت في وضع آمن للغاية.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                                                    <div class="flex justify-between text-sm">
                                                        <span class="font-semibold text-slate-500">النسبة السريعة (بدون المخزون):</span>
                                                        <span class="font-bold text-blue-600">{fin.quickRatio}</span>
                                                    </div>
                                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                                        <div class="bg-blue-500 h-2.5 rounded-full" style={{ width: `${Math.min((parseFloat(fin.quickRatio)/2)*100, 100)}%` }}></div>
                                                    </div>
                                                    <p class="text-xs text-slate-500">تستبعد المخزون لتوضيح قدرة السداد الفورية للالتزامات المستحقة.</p>
                                                </div>
                                            </div>

                                            {/* هيكل الربط المنطقي بين المبيعات والأصول في لوحة القيادة */}
                                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-2">
                                                <h4 class="text-xs font-bold text-slate-600">رأي المستشار المالي الذكي (CFO Intelligence):</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">
                                                    مبيعاتك البالغة <strong class="text-slate-800">{formatCurrency(fin.sales)}</strong> تدعمها أصول متداولة قوية قيمتها <strong class="text-slate-800">{formatCurrency(fin.totalCurrentAssets)}</strong>. يمثل المخزون منها نسبة <strong class="text-emerald-600">{((fin.inventory/fin.totalCurrentAssets)*100).toFixed(1)}%</strong>. هذه الهيكلية ممتازة، لكن يجب مراقبة فترة بقاء المخزون لتجنب ركود النقد.
                                                </p>
                                            </div>
                                        </div>

                                        {/* التقرير التلقائي السريع ومؤشرات القوة والضعف */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                            <div class="border-b border-slate-100 pb-4">
                                                <h3 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                    <i data-lucide="file-text" class="text-emerald-500"></i>
                                                    <span>التقرير المالي التلقائي (الخلاصة)</span>
                                                </h3>
                                            </div>

                                            <div class="space-y-4">
                                                <div>
                                                    <h4 class="text-xs font-bold text-emerald-700 flex items-center space-x-1.5 space-x-reverse mb-2">
                                                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                                        <span>نقاط القوة (Strengths)</span>
                                                    </h4>
                                                    <ul class="text-xs text-slate-600 space-y-2 list-disc list-inside pr-2 leading-relaxed">
                                                        <li>نسبة سيولة ممتازة تبلغ <strong class="text-slate-900">{fin.currentRatio}</strong> مما يعني انعدام مخاطر الإعسار حالياً.</li>
                                                        <li>هامش ربح إجمالي قوي جداً بحدود <strong class="text-slate-900">{((fin.grossProfit / fin.sales)*100).toFixed(1)}%</strong>.</li>
                                                    </ul>
                                                </div>

                                                <div class="pt-2 border-t border-slate-100">
                                                    <h4 class="text-xs font-bold text-rose-700 flex items-center space-x-1.5 space-x-reverse mb-2">
                                                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                                                        <span>نقاط الضعف (Weaknesses)</span>
                                                    </h4>
                                                    <ul class="text-xs text-slate-600 space-y-2 list-disc list-inside pr-2 leading-relaxed">
                                                        <li>فترة تحصيل ديون العملاء مرتفعة نسبياً (<strong class="text-slate-900">{fin.dso} يوم</strong>) مما يؤثر على سرعة حركة النقدية.</li>
                                                        <li>تكلفة التمويل والفوائد تستهلك <strong class="text-slate-900">{((fin.financeCosts / fin.grossProfit)*100).toFixed(1)}%</strong> من مجمل أرباحك.</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 2: بوابة رفع البيانات والمدقق (Ingestion) ==================== */}
                            {currentView === 'ingestion' && (
                                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                                    <div class="border-b border-slate-200 pb-6">
                                        <h3 class="text-lg font-bold text-slate-900">رفع ميزان المراجعة وتحليله تلقائياً</h3>
                                        <p class="text-sm text-slate-500 mt-1">قم بتنزيل القالب أولاً، أضف بيانات حساباتك وأرصدتها، ثم ارفع الملف هنا ليقوم مدقق النظام الذكي بالتحقق وبناء باقي القوائم تلقائياً.</p>
                                    </div>

                                    {/* منطقة سحب وإفلات الملفات التفاعلية */}
                                    <div class="border-2 border-dashed border-slate-200 hover:border-emerald-500 rounded-2xl p-12 text-center transition-all bg-slate-50 hover:bg-emerald-50/10 cursor-pointer relative">
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls" 
                                            onChange={handleExcelUpload} 
                                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                        />
                                        <div class="space-y-4">
                                            <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto shadow-md">
                                                <i data-lucide="cloud-upload" class="w-8 h-8"></i>
                                            </div>
                                            <div>
                                                <p class="font-bold text-slate-800 text-base">اضغط هنا أو اسحب ملف ميزان المراجعة (Excel) الخاص بك</p>
                                                <p class="text-xs text-slate-400 mt-1">يدعم التنسيقات .xlsx, .xls فقط</p>
                                            </div>
                                            <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2 rounded-xl text-sm shadow-md transition-all">تصفح الملفات</button>
                                        </div>
                                    </div>

                                    {/* جدول استعراض حسابات ميزان المراجعة المدقق الحالي */}
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center">
                                            <h4 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                <i data-lucide="check-square" class="text-emerald-500"></i>
                                                <span>بيانات ميزان المراجعة النشط ({trialBalance.length} حساب مالي)</span>
                                            </h4>
                                            <span class="text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1 rounded-full font-bold">متزن ومتوافق مع IFRS</span>
                                        </div>

                                        <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <table class="w-full text-right border-collapse">
                                                <thead>
                                                    <tr class="bg-slate-50 text-slate-500 text-xs border-b border-slate-200 font-bold">
                                                        <th class="p-4">كود الحساب</th>
                                                        <th class="p-4">اسم الحساب (عربي)</th>
                                                        <th class="p-4">اسم الحساب (إنجليزي)</th>
                                                        <th class="p-4 text-left">مدين (SAR)</th>
                                                        <th class="p-4 text-left">دائن (SAR)</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="text-sm divide-y divide-slate-200">
                                                    {trialBalance.map((item, index) => (
                                                        <tr key={index} class="hover:bg-slate-50/50">
                                                            <td class="p-4 font-mono font-bold text-slate-600">{item.code}</td>
                                                            <td class="p-4 font-semibold text-slate-800">{item.nameAr}</td>
                                                            <td class="p-4 text-slate-500 italic">{item.nameEn}</td>
                                                            <td class="p-4 text-left text-emerald-600 font-bold">{item.debit > 0 ? formatCurrency(item.debit) : "-"}</td>
                                                            <td class="p-4 text-left text-slate-700 font-bold">{item.credit > 0 ? formatCurrency(item.credit) : "-"}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 3: مركز النسب المالية والتحليل (Ratios) ==================== */}
                            {currentView === 'ratios' && (
                                <div class="space-y-8">
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4">تحليل النسب المالية التفصيلي</h3>
                                        
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-6">
                                            {/* قسم ربحية العمليات */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="trending-up" class="text-emerald-500"></i>
                                                    <span>نسب الربحية والأداء (Profitability)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>هامش مجمل الربح:</span>
                                                        <span class="text-emerald-600">{((fin.grossProfit / fin.sales)*100).toFixed(1)}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">يقيس كفاءة إنتاج بضائعك قبل احتساب المصاريف الإدارية.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>هامش صافي الأرباح:</span>
                                                        <span class="text-emerald-600">{((fin.netIncome / fin.sales)*100).toFixed(1)}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">عائد الربح النهائي الصافي المتاح للمستثمرين بعد جميع التكاليف والفوائد.</p>
                                                </div>
                                            </div>

                                            {/* قسم الكفاءة التشغيلية ورأس المال العامل */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="refresh-cw" class="text-blue-500"></i>
                                                    <span>مؤشرات النشاط والكفاءة (Efficiency)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>فترة تحصيل ديون العملاء (DSO):</span>
                                                        <span class="text-amber-600">{fin.dso} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">المدة التي تستغرقها لتحصيل أموالك من السوق بعد البيع الآجل.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>فترة سداد الموردين (DPO):</span>
                                                        <span class="text-emerald-600">{fin.dpo} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">المدة التي تأخذها لتسديد ديون مورديك.</p>
                                                </div>
                                            </div>

                                            {/* قسم السيولة والمخاطر الهيكلية */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="shield" class="text-purple-500"></i>
                                                    <span>الرافعة المالية والديون (Leverage)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>نسبة الالتزامات إلى حقوق الملكية:</span>
                                                        <span class="text-slate-800">{fin.debtToEquity}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">توضح مدى اعتمادك على التمويل الخارجي مقارنة بأموال الشركاء.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>دورة التحول النقدي (CCC):</span>
                                                        <span class="text-slate-800">{fin.ccc} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">الوقت المستغرق من دفع كاش للمورد حتى استلام كاش من العميل.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 4: رادار المخاطر والتنبيهات (Risk Radar) ==================== */}
                            {currentView === 'risk' && (
                                <div class="space-y-8">
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4 flex items-center space-x-2 space-x-reverse">
                                            <i data-lucide="shield-alert" class="text-rose-500"></i>
                                            <span>رادار مخاطر التشغيل والسيولة والربحية</span>
                                        </h3>

                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* تنبيه مخاطر العملاء والذمم المدينة */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-rose-200 hover:bg-rose-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-rose-100 text-rose-600 p-3 rounded-xl">
                                                        <i data-lucide="users" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-rose-100 text-rose-800 px-3 py-1 rounded-full font-bold">مستوى خطر متوسط</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">مخاطر بطء التحصيل من العملاء (DSO)</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">تستغرق فترة التحصيل {fin.dso} يوماً وهي مرتفعة مقارنة بمتوسط القطاع (30 يوماً). يوصى بتقديم خصومات تعجيل الدفع بنسبة 1% للعملاء الملتزمين بالسداد السريع لتعجيل دورة النقد.</p>
                                            </div>

                                            {/* تنبيه فجوة السيولة (Cash Conversion Cycle) */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-amber-200 hover:bg-amber-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-amber-100 text-amber-600 p-3 rounded-xl">
                                                        <i data-lucide="alert-circle" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold">تنبيه ومراقبة</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">دورة النقدية ومخاطر رأس المال</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">دورة تحويل النقدية تبلغ {fin.ccc} يوماً. هذا يعني أن نقدية الشركة تظل محبوسة ومقيدة في العمليات التشغيلية طوال هذه الفترة. يُنصح بإعادة التفاوض مع الموردين لزيادة مدة السداد لتقليص فجوة التمويل.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 5: التنبؤ والتخطيط (Forecasting) ==================== */}
                            {currentView === 'forecasting' && (
                                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                    <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4">توقعات التدفقات النقدية ومسار الإيرادات المستقبلية</h3>
                                    
                                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 space-y-6">
                                        <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                            <i data-lucide="sparkles" class="text-emerald-500 animate-pulse"></i>
                                            <span>التحليل التنبؤي الذكي (أشهر المستقبل)</span>
                                        </h4>
                                        <p class="text-xs text-slate-500 leading-relaxed">بناءً على نمو مبيعاتك التاريخي، والمصروفات الثابتة المستخرجة من ميزان المراجعة، إليك خطة التدفق النقدي والمبيعات المتوقعة للـ 3 أشهر القادمة:</p>

                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {/* توقعات الشهر 1 */}
                                            <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                <span class="text-xs text-slate-400 font-bold">مبيعات الشهر القادم المتوقعة (+5%):</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.sales * 1.05)}</h4>
                                                <p class="text-[10px] text-slate-400">حجم النقد المتوقع توفره في الحسابات: {formatCurrency(fin.cash + (fin.sales * 0.05))}</p>
                                            </div>

                                            {/* توقعات الشهر 2 */}
                                            <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                <span class="text-xs text-slate-400 font-bold">مبيعات الشهر الثاني المتوقعة (+10%):</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.sales * 1.10)}</h4>
                                                <p class="text-[10px] text-slate-400">حجم النقد المتوقع توفره في الحسابات: {formatCurrency(fin.cash + (fin.sales * 0.10))}</p>
                                            </div>

                                            {/* توقعات الشهر 3 */}
                                            <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                <span class="text-xs text-slate-400 font-bold">مبيعات الشهر الثالث المتوقعة (+15%):</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.sales * 1.15)}</h4>
                                                <p class="text-[10px] text-slate-400">حجم النقد المتوقع توفره في الحسابات: {formatCurrency(fin.cash + (fin.sales * 0.15))}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* تذييل الصفحة (Footer) */}
                        <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400 mt-auto">
                            <p>© 2026 فينتيك برو - جميع الحقوق محفوظة لشركتك المالية المتقدمة</p>
                        </footer>
                    </main>

                </div>
            );
        }

        // رندر للتطبيق المالي في الهيكل الرئيسي
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
