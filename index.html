            { code: "5120", nameAr: "تكلفة الأجور المباشرة والعمالة الإنتاجية", nameEn: "Direct Labor Costs", debit: 65000, credit: 0, category: "Expenses", subCategory: "COGS", period: "2026-06" },
            { code: "5130", nameAr: "مصاريف صناعية غير مباشرة وإيجار المصنع والتشغيل", nameEn: "Indirect Manufacturing Overheads", debit: 45000, credit: 0, category: "Expenses", subCategory: "COGS", period: "2026-06" },
            { code: "5211", nameAr: "رواتب ومنافع موظفي الإدارة العامة", nameEn: "Administrative Salaries & Employee Benefits", debit: 75000, credit: 0, category: "Expenses", subCategory: "OPEX", period: "2026-06" },
            { code: "5212", nameAr: "إيجار المكاتب الإدارية والكهرباء والاتصالات", nameEn: "Office Rents, Utilities & Communications", debit: 25000, credit: 0, category: "Expenses", subCategory: "OPEX", period: "2026-06" },
            { code: "5213", nameAr: "مصاريف التسويق والإعلانات والبيع والتوزيع", nameEn: "Marketing, Advertising & Distribution", debit: 22000, credit: 0, category: "Expenses", subCategory: "OPEX", period: "2026-06" },
            { code: "5214", nameAr: "استهلاك الأصول الثابتة وإطفاء الفترة الحالي", nameEn: "Depreciation & Amortization Expense", debit: 20000, credit: 0, category: "Expenses", subCategory: "OPEX", period: "2026-06" },
            { code: "5215", nameAr: "مصروف مخصص الديون والائتمان للفترة", nameEn: "ECL Provision Expense for the Period", debit: 6000, credit: 0, category: "Expenses", subCategory: "OPEX", period: "2026-06" },
            { code: "5310", nameAr: "تكاليف تمويلية وفوائد بنكية مدفوعة", nameEn: "Finance Costs & Bank Interest Expense", debit: 15000, credit: 0, category: "Expenses", subCategory: "Finance", period: "2026-06" },
            { code: "5410", nameAr: "مصروف الزكاة الشرعية وضريبة الدخل التقديرية", nameEn: "Zakat & Income Tax Expense for the Period", debit: 12000, credit: 0, category: "Expenses", subCategory: "Tax", period: "2026-06" }
        ];

        function App() {
            // إدارة الصفحات والواجهات النشطة
            const [currentView, setCurrentView] = useState('dashboard'); // dashboard, statements, ingestion, ratios, risk, forecasting
            const [activeStatementTab, setActiveStatementTab] = useState('income'); // income, balance, cashflow
            // إدارة ميزان المراجعة النشط في النظام
            const [trialBalance, setTrialBalance] = useState(defaultTrialBalance);
            // الفترة المالية المختارة (تلقائياً مايو 2026 كفترة متوسطة حية)
            const [selectedPeriod, setSelectedPeriod] = useState('2026-05');
            // متغيرات لوحة محاكاة السيناريوهات المالية (ماذا لو؟)
            const [simSalesGrowth, setSimSalesGrowth] = useState(0); // نسبة التغيير المتوقعة في المبيعات %
            const [simCogsRatio, setSimCogsRatio] = useState(44); // نسبة تكلفة البضاعة المباعة إلى المبيعات %
            const [simOpexRatio, setSimOpexRatio] = useState(22); // نسبة المصاريف الإدارية إلى المبيعات %

            // دالة لحساب المؤشرات المالية والقوائم بشكل فوري ومترابط من ميزان المراجعة المفلتر حسب الشهر
            const calculateFinancials = () => {
                let cash = 0;
                let bank = 0;
                let stInvestments = 0;
                let receivables = 0;
                let eclAllowance = 0;
                let rawMaterials = 0;
                let wip = 0;
                let finishedGoods = 0;
                let prepaids = 0;
                let dueFromRelated = 0;
                let lands = 0;
                let buildings = 0;
                let machinery = 0;
                let accumDepr = 0;
                let intangibleAssets = 0;

                let payables = 0;
                let accruedExp = 0;
                let customerAdvances = 0;
                let shortTermLoans = 0;
                let dueToRelated = 0;
                let zakatProvision = 0;
                let longTermLoans = 0;
                let endOfServiceProvision = 0;

                let capital = 0;
                let statutoryReserve = 0;
                let retainedEarnings = 0;

                let revenueGoods = 0;
                let revenueServices = 0;
                let salesDiscounts = 0;

                let cogsMaterials = 0;
                let cogsLabor = 0;
                let cogsOverhead = 0;

                let opexSalaries = 0;
                let opexRent = 0;
                let opexMarketing = 0;
                let opexDepreciation = 0;
                let opexEcl = 0;

                let financeCosts = 0;
                let zakatTaxExpense = 0;

                // تصفية السجلات ديناميكياً لتشمل فقط الحسابات التابعة للفترة المحددة
                const filteredData = trialBalance.filter(item => !item.period || item.period === selectedPeriod);

                filteredData.forEach(item => {
                    const code = parseInt(item.code);
                    const debitAmt = parseFloat(item.debit) || 0;
                    const creditAmt = parseFloat(item.credit) || 0;
                    const netAmt = debitAmt - creditAmt;

                    switch(code) {
                        case 1111: cash += netAmt; break;
                        case 1112: bank += netAmt; break;
                        case 1113: stInvestments += netAmt; break;
                        case 1120: receivables += netAmt; break;
                        case 1125: eclAllowance += creditAmt; break; 
                        case 1131: rawMaterials += netAmt; break;
                        case 1132: wip += netAmt; break;
                        case 1133: finishedGoods += netAmt; break;
                        case 1140: prepaids += netAmt; break;
                        case 1150: dueFromRelated += netAmt; break;
                        case 1211: lands += netAmt; break;
                        case 1212: buildings += netAmt; break;
                        case 1213: machinery += netAmt; break;
                        case 1214: accumDepr += creditAmt; break; 
                        case 1220: intangibleAssets += netAmt; break;

                        case 2111: payables += creditAmt; break;
                        case 2112: accruedExp += creditAmt; break;
                        case 2113: customerAdvances += creditAmt; break;
                        case 2121: shortTermLoans += creditAmt; break;
                        case 2130: dueToRelated += creditAmt; break;
                        case 2140: zakatProvision += creditAmt; break;

                        case 2211: longTermLoans += creditAmt; break;
                        case 2220: endOfServiceProvision += creditAmt; break;

                        case 3100: capital += creditAmt; break;
                        case 3150: statutoryReserve += creditAmt; break;
                        case 3200: retainedEarnings += creditAmt; break;

                        case 4110: revenueGoods += creditAmt; break;
                        case 4120: revenueServices += creditAmt; break;
                        case 4150: salesDiscounts += debitAmt; break; 

                        case 5110: cogsMaterials += debitAmt; break;
                        case 5120: cogsLabor += debitAmt; break;
                        case 5130: cogsOverhead += debitAmt; break;

                        case 5211: opexSalaries += debitAmt; break;
                        case 5212: opexRent += debitAmt; break;
                        case 5213: opexMarketing += debitAmt; break;
                        case 5214: opexDepreciation += debitAmt; break;
                        case 5215: opexEcl += debitAmt; break;

                        case 5310: financeCosts += debitAmt; break;
                        case 5410: zakatTaxExpense += debitAmt; break;
                        default: break;
                    }
                });

                // تجميع الهياكل والمستويات المالية الكلية
                const totalCashAndEquivalents = cash + bank + stInvestments;
                const netReceivables = receivables - eclAllowance;
                const totalInventory = rawMaterials + wip + finishedGoods;
                const totalCurrentAssets = totalCashAndEquivalents + netReceivables + totalInventory + prepaids + dueFromRelated;

                const netFixedAssets = lands + buildings + machinery - accumDepr;
                const totalNonCurrentAssets = netFixedAssets + intangibleAssets;
                const totalAssets = totalCurrentAssets + totalNonCurrentAssets;

                const totalPayables = payables + accruedExp + customerAdvances;
                const totalCurrentLiabilities = totalPayables + shortTermLoans + dueToRelated + zakatProvision;
                const totalNonCurrentLiabilities = longTermLoans + endOfServiceProvision;
                const totalLiabilities = totalCurrentLiabilities + totalNonCurrentLiabilities;

                // إجمالي حقوق الملكية قبل إضافة أرباح الفترة الحالية
                const baseEquity = capital + statutoryReserve + retainedEarnings;

                // قائمة الدخل التفصيلية
                const netSales = revenueGoods + revenueServices - salesDiscounts;
                const totalCogs = cogsMaterials + cogsLabor + cogsOverhead;
                const grossProfit = netSales - totalCogs;
                const totalOpex = opexSalaries + opexRent + opexMarketing + opexDepreciation + opexEcl;
                const operatingProfit = grossProfit - totalOpex; 
                const netIncomeBeforeZakat = operatingProfit - financeCosts;
                const netIncome = netIncomeBeforeZakat - zakatTaxExpense; 

                // إجمالي حقوق الملكية النهائي
                const totalEquity = baseEquity + netIncome;

                // المؤشرات والنسب
                const currentRatio = totalCurrentLiabilities > 0 ? (totalCurrentAssets / totalCurrentLiabilities).toFixed(2) : "N/A";
                const quickRatio = totalCurrentLiabilities > 0 ? ((totalCashAndEquivalents + netReceivables) / totalCurrentLiabilities).toFixed(2) : "N/A";
                const debtToEquity = totalEquity > 0 ? ((totalLiabilities / totalEquity) * 100).toFixed(1) : "N/A";
                const returnOnEquity = totalEquity > 0 ? ((netIncome / totalEquity) * 100).toFixed(1) : "N/A";
                const returnOnAssets = totalAssets > 0 ? ((netIncome / totalAssets) * 100).toFixed(1) : "N/A";

                const workingCapital = totalCurrentAssets - totalCurrentLiabilities;

                // دراسة كفاءة رأس المال العامل وأعمار الذمم
                const dso = netSales > 0 ? Math.round((netReceivables / netSales) * 365) : 0; 
                const dio = totalCogs > 0 ? Math.round((totalInventory / totalCogs) * 365) : 0; 
                const dpo = totalCogs > 0 ? Math.round((payables / totalCogs) * 365) : 0; 
                const ccc = (dso + dio) - dpo; 

                return {
                    totalCashAndEquivalents, netReceivables, totalInventory, totalCurrentAssets,
                    netFixedAssets, totalNonCurrentAssets, totalAssets,
                    totalPayables, totalCurrentLiabilities, totalNonCurrentLiabilities, totalLiabilities,
                    baseEquity, totalEquity,
                    netSales, totalCogs, grossProfit, totalOpex, operatingProfit, netIncomeBeforeZakat, netIncome,
                    currentRatio, quickRatio, debtToEquity, returnOnEquity, returnOnAssets, workingCapital,
                    dso, dio, dpo, ccc,
                    cash, bank, stInvestments, receivables, eclAllowance, rawMaterials, wip, finishedGoods, prepaids, dueFromRelated,
                    lands, buildings, machinery, accumDepr, intangibleAssets, payables, accruedExp, customerAdvances,
                    shortTermLoans, dueToRelated, zakatProvision, longTermLoans, endOfServiceProvision, capital, statutoryReserve, retainedEarnings,
                    revenueGoods, revenueServices, salesDiscounts, cogsMaterials, cogsLabor, cogsOverhead,
                    opexSalaries, opexRent, opexMarketing, opexDepreciation, opexEcl, financeCosts, zakatTaxExpense,
                    filteredCount: filteredData.length
                };
            };

            const fin = calculateFinancials();

            // دالة تنسيق الأرقام لعرض المبالغ النقدية بالريال السعودي بشكل منسق واحترافي
            const formatCurrency = (val) => {
                return new Intl.NumberFormat('ar-SA', { style: 'currency', currency: 'SAR', maximumFractionDigits: 0 }).format(val);
            };

            // حسابات المحاكاة اللحظية لسيناريوهات "ماذا لو؟" (تتحدث فوراً بناءً على الشهر المختار)
            const simulatedSales = fin.netSales * (1 + simSalesGrowth / 100);
            const simulatedCogs = simulatedSales * (simCogsRatio / 100);
            const simulatedGrossProfit = simulatedSales - simulatedCogs;
            const simulatedOpex = simulatedSales * (simOpexRatio / 100);
            const simulatedEbit = simulatedGrossProfit - simulatedOpex;
            const simulatedNetIncome = simulatedEbit - fin.financeCosts - fin.zakatTaxExpense;

            // توليد التوصيات الذكية والديناميكية للمستثمر بناءً على أرقام الشهر المختار
            const generateInvestorRecommendations = () => {
                const recs = [];
                const currentRatioNum = parseFloat(fin.currentRatio);
                const debtToEquityNum = parseFloat(fin.debtToEquity);

                if (currentRatioNum < 1.5) {
                    recs.push({
                        title: "دعم سيولة رأس المال العامل",
                        desc: `نسبة التداول الحالية للفترة تبلغ ${fin.currentRatio} وهي أقل من المستهدف الآمن (1.5). نوصي بضخ جزء من الاستثمارات أو تسييل الاستثمارات قصيرة الأجل البالغة ${formatCurrency(fin.stInvestments)} لتأمين التدفقات النقدية التشغيلية.`
                    });
                } else {
                    recs.push({
                        title: "فرص استغلال السيولة الفائضة",
                        desc: `تمتلك الشركة نسبة تداول ممتازة بمقدار ${fin.currentRatio}. نقترح توجيه النقد الفائض البالغ ${formatCurrency(fin.totalCashAndEquivalents)} نحو توسيع شبكة المبيعات وتحديث خطوط الإنتاج والآلات التشغيلية.`
                    });
                }

                if (fin.dso > 50) {
                    recs.push({
                        title: "إعادة النظر في سياسات الائتمان ومنح التسهيلات للعملاء",
                        desc: `متوسط فترة التحصيل DSO وصلت إلى ${fin.dso} يوماً. من الضروري جداً تطبيق آلية متابعة صارمة لعملاء الآجل وتفعيل خصم تعجيل الدفع للمحافظة على دورة نقدية سريعة.`
                    });
                } else {
                    recs.push({
                        title: "إشادة بكفاءة التحصيل والائتمان",
                        desc: `فترة تحصيل ديون العملاء جيدة ومثالية جداً حيث تبلغ ${fin.dso} يوماً فقط. هذه الميزة تدعم سرعة دوران رأس المال العامل وتدفق السيولة.`
                    });
                }

                if (debtToEquityNum > 50) {
                    recs.push({
                        title: "إعادة هيكلة الديون الطويلة والقصيرة",
                        desc: `نسبة الالتزامات إلى حقوق الشركاء تبلغ ${fin.debtToEquity}%. نوصي بالتوجه لتسوية جزء من القروض البنكية قصيرة الأجل البالغة ${formatCurrency(fin.shortTermLoans)} لتخفيف تكاليف الفوائد البنكية وتحسين التصنيف الائتماني.`
                    });
                } else {
                    recs.push({
                        title: "سلامة الرافعة المالية والملاءة",
                        desc: `تتمتع الشركة بهيكل تمويلي سليم برافعة مالية آمنة ${fin.debtToEquity}%. هذا يمنح المستثمرين ثقة تامة وقدرة على الاقتراض المستقبلي لتمويل مشروعات النمو الكبرى.`
                    });
                }

                return recs;
            };

            const investorRecommendations = generateInvestorRecommendations();

            // تفعيل أيقونات الملاحة وواجهات الاستخدام
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentView, selectedPeriod, activeStatementTab]);

            // دالة لتنزيل قالب إكسل فارغ تماماً يحتوي فقط على الهيدر بناءً على التوجيهات الفنية
            const downloadExcelTemplate = () => {
                const wsData = [
                    ["كود الحساب (Account Code)", "اسم الحساب - عربي (Account Name AR)", "اسم الحساب - إنجليزي (Account Name EN)", "مدين (Debit)", "دائن (Credit)", "الفترة المالية (Period)"]
                ];
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "IFRS Trial Balance Template");
                XLSX.writeFile(wb, `IFRS_Trial_Balance_Template_${selectedPeriod}.xlsx`);
            };

            // قراءة ومعالجة ميزان المراجعة المرفوع وتحديث شاشات المنصة تلقائياً وبدقة بشرية
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    const parsedBalance = [];
                    // تخطي الصف الأول المخصص للعناوين والبدء من الصف الثاني لقراءة الأرصدة
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if (row[0] && row[1]) {
                            parsedBalance.push({
                                code: row[0].toString(),
                                nameAr: row[1],
                                nameEn: row[2] || row[1],
                                debit: parseFloat(row[3]) || 0,
                                credit: parseFloat(row[4]) || 0,
                                period: row[5] || selectedPeriod
                            });
                        }
                    }

                    if (parsedBalance.length > 0) {
                        // دمج الميزان الجديد مع الحسابات الحالية أو استبدالها بشكل كامل للفترة المختارة
                        const otherPeriods = trialBalance.filter(item => item.period !== selectedPeriod);
                        setTrialBalance([...otherPeriods, ...parsedBalance]);
                        alert(`تم استيراد ميزان المراجعة بنجاح لشهر ${selectedPeriod}! تم ربط وتحديث القوائم والتحليلات فورياً.`);
                        setCurrentView('dashboard');
                    } else {
                        alert("تنبيه: لم نتمكن من العثور على سجلات صالحة في الملف المرفوع. يرجى التأكد من مطابقة الملف لقالب الإدخال الخاص بالمنصة.");
                    }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div class="min-h-screen flex bg-slate-50/50 text-slate-800">
                    
                    {/* 1. القائمة الجانبية (Sidebar) */}
                    <aside class="w-80 bg-slate-900 text-white flex flex-col justify-between shadow-xl transition-all duration-300">
                        <div>
                            {/* الشعار والهوية البصرية الاحترافية */}
                            <div class="p-6 border-b border-slate-800 flex items-center space-x-3 space-x-reverse">
                                <div class="bg-emerald-500 text-slate-900 p-2 rounded-xl shadow-lg shadow-emerald-500/20">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-lg font-extrabold leading-none tracking-wide text-white">منصة التحليل المالي</h1>
                                    <span class="text-[11px] text-emerald-400 font-bold mt-1 block">التحليل وإعداد التقارير الفنية</span>
                                </div>
                            </div>

                            {/* روابط التنقل السهلة بين شاشات التحليل المالي المترابط */}
                            <nav class="p-4 space-y-1.5">
                                <p class="text-[11px] font-bold text-slate-500 px-3 uppercase tracking-wider mb-2">مستويات الدراسة والتحليل</p>
                                
                                <button 
                                    onClick={() => setCurrentView('dashboard')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'dashboard' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                                    <span>لوحة الأداء العام والملخص</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('statements')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'statements' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="book-open" class="w-5 h-5"></i>
                                    <span>القوائم المالية والتقارير الدورية</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ingestion')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ingestion' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="file-up" class="w-5 h-5"></i>
                                    <span>بوابة رفع البيانات ومطابقة الأرصدة</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ratios')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ratios' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="percent" class="w-5 h-5"></i>
                                    <span>مركز النسب المالية والتحليل المقارن</span>
                                </button>

                                <p class="text-[11px] font-bold text-slate-500 px-3 pt-6 uppercase tracking-wider mb-2">أدوات التخطيط والمخاطر</p>

                                <button 
                                    onClick={() => setCurrentView('risk')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'risk' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                                    <span>تقرير المخاطر والتنبيهات التشغيلية</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('forecasting')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'forecasting' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="line-chart" class="w-5 h-5"></i>
                                    <span>التقديرات والتدفقات النقدية المستقبلية</span>
                                </button>
                            </nav>
                        </div>
                        
                        <div class="p-6 border-t border-slate-800">
                            <div class="flex items-center space-x-3 space-x-reverse text-slate-400">
                                <div class="bg-slate-800 p-2 rounded-lg text-emerald-400">
                                    <i data-lucide="award" class="w-5 h-5"></i>
                                </div>
                                <div class="text-xs leading-relaxed">
                                    <p class="font-bold text-white">إعداد وإشراف مهني:</p>
                                    <p class="text-slate-500 text-[10px]">خبير مالي معتمد - موازنة IFRS</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* 2. منطقة العمل الرئيسية (Main Area) */}
                    <main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
                        
                        {/* شريط الأدوات العلوي مع تصفية ديناميكية تفاعلية مذهلة */}
                        <header class="bg-white border-b border-slate-200 h-20 px-8 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div class="flex items-center space-x-6 space-x-reverse">
                                <h2 class="text-xl font-extrabold text-slate-900">
                                    {currentView === 'dashboard' && "لوحة الأداء المالي العام"}
                                    {currentView === 'statements' && "مركز إعداد القوائم المالية المستخلصة (IFRS)"}
                                    {currentView === 'ingestion' && "بوابة التحميل والتدقيق المحاسبي لميزان المراجعة"}
                                    {currentView === 'ratios' && "مركز دراسة وتحليل النسب والمؤشرات المالية"}
                                    {currentView === 'risk' && "كشف التقييم المالي والوقاية من مخاطر التشغيل"}
                                    {currentView === 'forecasting' && "لوحة محاكاة التقديرات والتدفقات النقدية المتوقعة"}
                                </h2>
                            </div>

                            {/* تصفية تفاعلية حية لأشهر الربع الثاني 2026 */}
                            <div class="flex items-center space-x-4 space-x-reverse">
                                <div class="flex items-center space-x-2 space-x-reverse">
                                    <span class="text-xs text-slate-500 font-bold">الفترة المالية المحددة للتحليل الحركي:</span>
                                    <select 
                                        value={selectedPeriod}
                                        onChange={(e) => {
                                            setSelectedPeriod(e.target.value);
                                        }}
                                        class="border border-slate-200 px-4 py-2 rounded-lg text-sm font-extrabold focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent bg-slate-50 text-slate-900 cursor-pointer"
                                    >
                                        <option value="2026-04">أبريل 2026 (ميزان تجريبي متزن)</option>
                                        <option value="2026-05">مايو 2026 (ميزان تجريبي متزن)</option>
                                        <option value="2026-06">يونيو 2026 (ميزان تجريبي متزن)</option>
                                    </select>
                                </div>

                                <button 
                                    onClick={downloadExcelTemplate}
                                    class="bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center space-x-2 space-x-reverse transition-all"
                                >
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                    <span>نموذج Excel فارغ</span>
                                </button>
                            </div>
                        </header>

                        {/* مساحة رندرة الصفحات حسب الاختيار الفعلي من القائمة */}
                        <div class="p-8 flex-1 max-w-7xl w-full mx-auto space-y-8 fade-in">
                            
                            {/* إرشادات تشغيل احترافية ومبسطة ترشد المستخدم بخطوات الخبير البشري */}
                            <div class="bg-emerald-50/50 border border-emerald-200/60 rounded-2xl p-4 flex items-start space-x-3 space-x-reverse shadow-sm">
                                <div class="bg-emerald-500 text-white p-2 rounded-xl mt-0.5 animate-pulse">
                                    <i data-lucide="info" class="w-5 h-5"></i>
                                </div>
                                <div class="space-y-1">
                                    <h4 class="font-bold text-emerald-950 text-xs">تحليل ديناميكي حركي نشط للفترة ({selectedPeriod}):</h4>
                                    <p class="text-xs text-emerald-800 leading-relaxed">
                                        تتفاعل جميع القوائم والنسب المالية المدرجة في المنصة ديناميكياً عند اختيارك أي فترة زمنية مختلفة من القائمة المنسدلة في الأعلى. يرجى تجربة التبديل لمعاينة التغير التلقائي في المبيعات، ومجمل الأرباح وتوزيع السيولة وهيكل التدفق النقدي.
                                    </p>
                                </div>
                            </div>

                            {/* ==================== الواجهة 1: لوحة الأداء العام والملخص التنفيذي (Dashboard) ==================== */}
                            {currentView === 'dashboard' && (
                                <div class="space-y-8">
                                    {/* بطاقات المؤشرات المالية الرئيسية المحسوبة ديناميكياً */}
                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        
                                        {/* مبيعات الفترة */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">صافي المبيعات والإيرادات</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.netSales)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                                                    <span>مبيعات منتجات سلع وخدمات</span>
                                                </div>
                                            </div>
                                            <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl">
                                                <i data-lucide="shopping-bag" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* صافي الربح الفعلي */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">صافي الربح المالي النهائي</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.netIncome)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                                                    <span>هامش صافي {((fin.netIncome / fin.netSales)*100).toFixed(1)}%</span>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-50 text-emerald-600 p-4 rounded-2xl">
                                                <i data-lucide="dollar-sign" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* السيولة المتوفرة */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">النقد والنقد المعادل بالبنوك</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.totalCashAndEquivalents)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-amber-600 font-bold">
                                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i>
                                                    <span>تغطية نقدية جيدة للمصاريف</span>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-50 text-emerald-600 p-4 rounded-2xl">
                                                <i data-lucide="wallet" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                        {/* رأس المال العامل */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex justify-between items-center">
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-slate-500">رأس المال العامل النشط</span>
                                                <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.workingCapital)}</h3>
                                                <div class="flex items-center space-x-1 space-x-reverse text-xs text-emerald-600 font-bold">
                                                    <i data-lucide="activity" class="w-3.5 h-3.5"></i>
                                                    <span>مؤشر سيولة تشغيلية آمن</span>
                                                </div>
                                            </div>
                                            <div class="bg-purple-50 text-purple-600 p-4 rounded-2xl">
                                                <i data-lucide="briefcase" class="w-8 h-8"></i>
                                            </div>
                                        </div>

                                    </div>

                                    {/* لوحة عرض هيكل التدفقات ورأس المال التشغيلي */}
                                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        
                                        {/* مؤشرات التداول السيولة السريعة ورأس المال العامل */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6 lg:col-span-2">
                                            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                                                <h3 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                    <i data-lucide="gauge" class="text-emerald-500"></i>
                                                    <span>تحليل ملاءة السيولة وتغطية الالتزامات القصيرة</span>
                                                </h3>
                                                <span class="text-xs bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-bold">مستخلص ومطابق محاسبياً لـ {selectedPeriod}</span>
                                            </div>

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                                                    <div class="flex justify-between text-sm">
                                                        <span class="font-bold text-slate-600">نسبة التداول الحالية (Current Ratio):</span>
                                                        <span class="font-extrabold text-emerald-600">{fin.currentRatio}</span>
                                                    </div>
                                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                                        <div class="bg-emerald-500 h-2.5 rounded-full" style={{ width: `${Math.min((parseFloat(fin.currentRatio)/3)*100, 100)}%` }}></div>
                                                    </div>
                                                    <p class="text-xs text-slate-500">يقيس تغطية أصولك المتداولة البالغة <strong class="text-slate-800">{formatCurrency(fin.totalCurrentAssets)}</strong> للالتزامات المستحقة في الأجل القصير.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                                                    <div class="flex justify-between text-sm">
                                                        <span class="font-bold text-slate-600">النسبة السريعة (Quick Ratio):</span>
                                                        <span class="font-extrabold text-blue-600">{fin.quickRatio}</span>
                                                    </div>
                                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                                        <div class="bg-blue-500 h-2.5 rounded-full" style={{ width: `${Math.min((parseFloat(fin.quickRatio)/2)*100, 100)}%` }}></div>
                                                    </div>
                                                    <p class="text-xs text-slate-500">استبعاد بنود الأصول صعبة التسييل السريع مثل إجمالي المخزون البالغ <strong class="text-slate-800">{formatCurrency(fin.totalInventory)}</strong>.</p>
                                                </div>
                                            </div>

                                            {/* تعليق الخبير المالي المهني على جودة الحركة النقدية وهيكلية الأصول */}
                                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-2">
                                                <h4 class="text-xs font-bold text-slate-600">رأي المحلل المالي الخبير:</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">
                                                    تشير البيانات المحاسبية لشهر <strong class="text-slate-900">{selectedPeriod}</strong> إلى ملاءة مالية مطمئنة جداً. مع ذمم مدينة نشطة بقيمة <strong class="text-slate-800">{formatCurrency(fin.netReceivables)}</strong>، وإجمالي مخزون تشغيلي بمبلغ <strong class="text-slate-800">{formatCurrency(fin.totalInventory)}</strong>. يتضح توازن توزيع الموارد والأصول غير المتداولة ومنها الآلات والمباني بالصافي بمبلغ <strong class="text-slate-800">{formatCurrency(fin.netFixedAssets)}</strong> مما يدعم ثبات الكفاءة الإنتاجية للمنشأة.
                                                </p>
                                            </div>
                                        </div>

                                        {/* التقرير المالي الفني والتحليلي السريع (نقاط القوة والضعف) */}
                                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                            <div class="border-b border-slate-100 pb-4">
                                                <h3 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                    <i data-lucide="file-text" class="text-emerald-500"></i>
                                                    <span>التقرير المالي والملخص التحليلي</span>
                                                </h3>
                                            </div>

                                            <div class="space-y-4">
                                                <div>
                                                    <h4 class="text-xs font-bold text-emerald-700 flex items-center space-x-1.5 space-x-reverse mb-2">
                                                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                                        <span>نقاط القوة والمزايا المكتشفة</span>
                                                    </h4>
                                                    <ul class="text-xs text-slate-600 space-y-2 list-disc list-inside pr-2 leading-relaxed">
                                                        <li>قدرة تداول ممتازة بمقدار <strong class="text-slate-900">{fin.currentRatio}</strong> تدعم المركز الائتماني للشركة.</li>
                                                        <li>هامش ربح تشغيلي قوي بحدود <strong class="text-slate-900">{((fin.operatingProfit / fin.netSales)*100).toFixed(1)}%</strong> مما يعني انضباط الأعباء والمصاريف العامة.</li>
                                                    </ul>
                                                </div>

                                                <div class="pt-2 border-t border-slate-100">
                                                    <h4 class="text-xs font-bold text-rose-700 flex items-center space-x-1.5 space-x-reverse mb-2">
                                                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                                                        <span>ملاحظات ومحاذير يوصى بمتابعتها</span>
                                                    </h4>
                                                    <ul class="text-xs text-slate-600 space-y-2 list-disc list-inside pr-2 leading-relaxed">
                                                        <li>دورة دوران الكاش الإجمالية تبلغ (<strong class="text-slate-900">{fin.ccc} يوم</strong>) مما يوجب تحسين وتيرة البيع والتحصيل للعملاء.</li>
                                                        <li>التزامات القروض طويلة الأجل بقيمة <strong class="text-slate-900">{formatCurrency(fin.shortTermLoans + fin.longTermLoans)}</strong> تضغط بشكل متوسط على الربحية عبر تكاليف فوائد التمويل.</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                    
                                    {/* قسم جديد بالكامل: التوصيات الاستراتيجية المخصصة للمستثمر */}
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                                            <h3 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                <i data-lucide="trending-up" class="text-emerald-500"></i>
                                                <span>توصيات المستثمر الاستراتيجية بناءً على أرقام ({selectedPeriod})</span>
                                            </h3>
                                            <span class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">توصيات حية تتغير بتغير الشهر</span>
                                        </div>

                                                        </tr>

                                                        <tr class="bg-slate-100 font-extrabold">
                                                            <td class="p-4" colspan="2">الأنشطة التمويلية (Financing Activities)</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4 pl-8 text-emerald-600">متحصلات من زيادة وتسهيلات القروض البنكية</td>
                                                            <td class="p-4 text-left text-emerald-600 font-semibold">+{formatCurrency(fin.shortTermLoans + fin.longTermLoans)}</td>
                                                        </tr>
                                                        <tr class="bg-slate-50 font-bold">
                                                            <td class="p-4">صافي النقد المتوفر من الأنشطة التمويلية</td>
                                                            <td class="p-4 text-left text-emerald-600">+{formatCurrency(fin.shortTermLoans + fin.longTermLoans)}</td>
                                                        </tr>

                                                        <tr class="bg-emerald-600 text-white font-black border-t-4 border-emerald-700 text-base">
                                                            <td class="p-4">رصيد النقد الفعلي المقدر نهاية الفترة الحالية</td>
                                                            <td class="p-4 text-left">{formatCurrency(fin.totalCashAndEquivalents)}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}

                            {/* ==================== الواجهة 3: بوابة رفع البيانات والمدقق (Ingestion) ==================== */}
                            {currentView === 'ingestion' && (
                                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                                    <div class="border-b border-slate-200 pb-6">
                                        <h3 class="text-lg font-bold text-slate-900">استيراد وقراءة ميزان المراجعة لشهر {selectedPeriod}</h3>
                                        <p class="text-sm text-slate-500 mt-1">يرجى تحميل النموذج الفارغ لتعبئة بيانات حساباتك وتفاصيل الأرصدة ومن ثم سحب وإسقاط الملف هنا لربط وقراءة البيانات وتوليد التقارير تلقائياً.</p>
                                    </div>

                                    {/* منطقة رفع ملف الإكسل */}
                                    <div class="border-2 border-dashed border-slate-200 hover:border-emerald-500 rounded-2xl p-12 text-center transition-all bg-slate-50 hover:bg-emerald-50/10 cursor-pointer relative">
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls" 
                                            onChange={handleExcelUpload} 
                                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                        />
                                        <div class="space-y-4">
                                            <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto shadow-md">
                                                <i data-lucide="cloud-upload" class="w-8 h-8"></i>
                                            </div>
                                            <div>
                                                <p class="font-bold text-slate-800 text-base">اضغط هنا لاستعراض أو سحب ملف ميزان المراجعة (Excel)</p>
                                                <p class="text-xs text-slate-400 mt-1">سيتم تعبئة وقراءة الأرصدة وربطها تلقائياً بشهر {selectedPeriod}</p>
                                            </div>
                                            <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2 rounded-xl text-sm shadow-md transition-all">تصفح ملفات جهازك</button>
                                        </div>
                                    </div>

                                    {/* قائمة استعراض السجلات المحاسبية والتحقق من التوازن الحسابي */}
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center">
                                            <h4 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                <i data-lucide="check-square" class="text-emerald-500"></i>
                                                <span>الأرصدة المحسوبة في ميزان المراجعة الحالي للفترة {selectedPeriod} ({fin.filteredCount} حساب مالي)</span>
                                            </h4>
                                            <span class="text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1 rounded-full font-bold">متزن ومتوافق مع معايير التقارير الدولية (IFRS)</span>
                                        </div>

                                        <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <table class="w-full text-right border-collapse">
                                                <thead>
                                                    <tr class="bg-slate-50 text-slate-500 text-xs border-b border-slate-200 font-bold">
                                                        <th class="p-4 text-right">كود الحساب</th>
                                                        <th class="p-4 text-right">اسم الحساب (عربي)</th>
                                                        <th class="p-4 text-right">اسم الحساب (إنجليزي)</th>
                                                        <th class="p-4 text-left">مدين (SAR)</th>
                                                        <th class="p-4 text-left">دائن (SAR)</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="text-sm divide-y divide-slate-200">
                                                    {trialBalance.filter(item => !item.period || item.period === selectedPeriod).map((item, index) => (
                                                        <tr key={index} class="hover:bg-slate-50/50">
                                                            <td class="p-4 font-mono font-bold text-slate-600">{item.code}</td>
                                                            <td class="p-4 font-semibold text-slate-800">{item.nameAr}</td>
                                                            <td class="p-4 text-slate-500 italic">{item.nameEn}</td>
                                                            <td class="p-4 text-left text-emerald-600 font-bold">{item.debit > 0 ? formatCurrency(item.debit) : "-"}</td>
                                                            <td class="p-4 text-left text-slate-700 font-bold">{item.credit > 0 ? formatCurrency(item.credit) : "-"}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 4: مركز النسب المالية والتحليل (Ratios) ==================== */}
                            {currentView === 'ratios' && (
                                <div class="space-y-8">
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4">تحليل النسب والمؤشرات التفصيلية لشهر {selectedPeriod}</h3>
                                        
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-6">
                                            {/* نسب الربحية والأداء الفني */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="trending-up" class="text-emerald-500"></i>
                                                    <span>مؤشرات الربحية والأداء الإجمالي (Profitability)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>هامش مجمل الربح للعمليات:</span>
                                                        <span class="text-emerald-600">{((fin.grossProfit / fin.netSales)*100).toFixed(1)}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">يقيس كفاءة الإنتاج والتصنيع المباشر للبضائع قبل خصم الأعباء والالتزامات الإدارية.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>هامش صافي الأرباح النهائية:</span>
                                                        <span class="text-emerald-600">{((fin.netIncome / fin.netSales)*100).toFixed(1)}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">يقيس نسبة الأرباح الصافية المتبقية لصالح المستثمرين والشركاء بعد تصفية جميع المصاريف والأعباء.</p>
                                                </div>
                                            </div>

                                            {/* مؤشرات الكفاءة والنشاط التشغيلي */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="refresh-cw" class="text-blue-500"></i>
                                                    <span>مؤشرات النشاط ودوران رأس المال (Efficiency)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>متوسط فترة تحصيل العملاء (DSO):</span>
                                                        <span class="text-amber-600">{fin.dso} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">الفترة الزمنية التي تحتاجها المنشأة لاسترداد مبيعاتها الآجلة من السوق النقدي.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>متوسط فترة سداد الموردين (DPO):</span>
                                                        <span class="text-emerald-600">{fin.dpo} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">الفترة المستغرقة التي يتم استغلالها لتسوية وسداد المستحقات والالتزامات مع الموردين.</p>
                                                </div>
                                            </div>

                                            {/* مؤشرات الرافعة المالية والتمويل */}
                                            <div class="space-y-4">
                                                <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                    <i data-lucide="shield" class="text-purple-500"></i>
                                                    <span>تحليل الهيكلية والرافعة المالية (Leverage)</span>
                                                </h4>
                                                
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>نسبة الالتزامات إلى حقوق الشركاء:</span>
                                                        <span class="text-slate-800">{fin.debtToEquity}%</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">مدى اعتماد المنشأة على التسهيلات الائتمانية والتمويل الخارجي مقارنة بأموال وحقوق الملاك.</p>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span>دورة التحويل النقدي المجمعة (CCC):</span>
                                                        <span class="text-slate-800">{fin.ccc} يوم</span>
                                                    </div>
                                                    <p class="text-xs text-slate-500">الفترة الزمنية الفاصلة بين تدفق الكاش لشراء المواد الأولية وتحصيل الكاش المقابل من العملاء.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 5: رادار المخاطر والتنبيهات (Risk Radar) ==================== */}
                            {currentView === 'risk' && (
                                <div class="space-y-8">
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4 flex items-center space-x-2 space-x-reverse">
                                            <i data-lucide="shield-alert" class="text-rose-500"></i>
                                            <span>رادار تقييم المخاطر وتنبيهات الأداء التشغيلي والسيولة لشهر {selectedPeriod}</span>
                                        </h3>

                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* مخاطر التحصيل وبطء النقدية */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-rose-200 hover:bg-rose-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-rose-100 text-rose-600 p-3 rounded-xl">
                                                        <i data-lucide="users" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-rose-100 text-rose-800 px-3 py-1 rounded-full font-bold">مستوى مراقبة مستمر</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">مخاطر بطء معدلات تحصيل النقد من العملاء (DSO)</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">تستغرق فترة التحصيل المحققة {fin.dso} يوماً، وهي فترة تزيد بشكل نسبي عن متوسط السوق المستهدف. يوصى بمراجعة سياسات البيع الآجل الممنوحة وتفعيل خطط حث العملاء على السداد المعجل عبر خصومات السداد الفوري لتحسين تدفق النقد السريع.</p>
                                            </div>

                                            {/* فجوات السيولة والتمويل الذاتي */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-amber-200 hover:bg-amber-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-amber-100 text-amber-600 p-3 rounded-xl">
                                                        <i data-lucide="alert-circle" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold">ملاحظات وقائية</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">فجوة التحويل النقدي ودورة رأس المال المستغل</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">تقدر دورة تدوير النقدية بـ {fin.ccc} يوماً. تشير هذه القراءة إلى احتجاز جزء من النقدية المتاحة في الدورة التشغيلية لفترة أطول. يُنصح بالتوجه للتفاوض مع كبار الموردين لزيادة حدود وتسهيلات الدفع لتقليل فجوة الاحتياج النقدي الدوري.</p>
                                            </div>

                                            {/* خطر تركّز العملاء */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-amber-200 hover:bg-amber-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-amber-100 text-amber-600 p-3 rounded-xl">
                                                        <i data-lucide="layers" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold">توصية احترازية</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">تحليل تركز مخاطر العملاء والائتمان</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">يجب تنويع محفظة العملاء لضمان ألا تتركز المبيعات بنسبة تزيد عن 20% لدى عميل منفرد. مخصص الخسائر الائتمانية المتوقعة البالغ <strong class="text-slate-800">{formatCurrency(fin.eclAllowance)}</strong> يغطي المخاطر الحالية بكفاءة.</p>
                                            </div>

                                            {/* خطر انخفاض الهامش التشغيلي */}
                                            <div class="border border-slate-200 rounded-xl p-6 space-y-4 hover:border-rose-200 hover:bg-rose-50/5 transition-all">
                                                <div class="flex justify-between items-start">
                                                    <div class="bg-rose-100 text-rose-600 p-3 rounded-xl">
                                                        <i data-lucide="trending-down" class="w-6 h-6"></i>
                                                    </div>
                                                    <span class="text-xs bg-rose-100 text-rose-800 px-3 py-1 rounded-full font-bold">هام جداً</span>
                                                </div>
                                                <h4 class="font-bold text-slate-900">مراقبة هوامش الأرباح وتكاليف السلع (COGS)</h4>
                                                <p class="text-xs text-slate-500 leading-relaxed">تكلفة المبيعات الحالية تمثل <strong class="text-slate-800">{((fin.totalCogs/fin.netSales)*100).toFixed(1)}%</strong> من إجمالي مبيعاتك. أي ارتفاع غير محسوب في أسعار المواد الخام بقيمة <strong class="text-slate-800">{formatCurrency(fin.cogsMaterials)}</strong> سيؤثر بشكل مباشر ومباشر على صافي الربح النهائي.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== الواجهة 6: التنبؤ والتخطيط والسيناريوهات (Forecasting) ==================== */}
                            {currentView === 'forecasting' && (
                                <div class="space-y-8">
                                    {/* لوحة السيناريوهات التفاعلية (ماذا لو؟) */}
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <div class="border-b border-slate-100 pb-4">
                                            <h3 class="text-lg font-bold text-slate-900">محاكي السيناريوهات المالية التفاعلي (What-If Analysis)</h3>
                                            <p class="text-xs text-slate-500 mt-1">قم بتعديل مؤشرات المبيعات ونسب التكلفة والمصاريف لملاحظة النتيجة التقديرية التلقائية لصافي الربح المتوقع فوراً لشهر {selectedPeriod}.</p>
                                        </div>

                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            
                                            {/* محدد نمو المبيعات */}
                                            <div class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-xs font-bold">
                                                    <span class="text-slate-700">تغير حجم المبيعات المتوقع:</span>
                                                    <span class="text-emerald-600 font-mono">{simSalesGrowth > 0 ? `+${simSalesGrowth}` : simSalesGrowth}%</span>
                                                </div>
                                                <input 
                                                    type="range" 
                                                    min="-30" 
                                                    max="50" 
                                                    value={simSalesGrowth}
                                                    onChange={(e) => setSimSalesGrowth(parseInt(e.target.value))}
                                                    class="w-full accent-emerald-500 cursor-pointer"
                                                />
                                                <p class="text-[10px] text-slate-400">تعديل توقعات زيادة أو انخفاض مستويات مبيعات الفترة الحالية.</p>
                                            </div>

                                            {/* محدد نسبة تكلفة البضاعة المباعة */}
                                            <div class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-xs font-bold">
                                                    <span class="text-slate-700">نسبة تكلفة المبيعات من الإيراد:</span>
                                                    <span class="text-blue-600 font-mono">{simCogsRatio}%</span>
                                                </div>
                                                <input 
                                                    type="range" 
                                                    min="25" 
                                                    max="65" 
                                                    value={simCogsRatio}
                                                    onChange={(e) => setSimCogsRatio(parseInt(e.target.value))}
                                                    class="w-full accent-blue-500 cursor-pointer"
                                                />
                                                <p class="text-[10px] text-slate-400">مراقبة تأثر الربح في حال زيادة أو انخفاض مدخلات التصنيع والمواد.</p>
                                            </div>

                                            {/* محدد نسبة المصاريف الإدارية */}
                                            <div class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-xs font-bold">
                                                    <span class="text-slate-700">نسبة المصاريف الإدارية والعمومية:</span>
                                                    <span class="text-purple-600 font-mono">{simOpexRatio}%</span>
                                                </div>
                                                <input 
                                                    type="range" 
                                                    min="10" 
                                                    max="35" 
                                                    value={simOpexRatio}
                                                    onChange={(e) => setSimOpexRatio(parseInt(e.target.value))}
                                                    class="w-full accent-purple-500 cursor-pointer"
                                                />
                                                <p class="text-[10px] text-slate-400">التحكم في مستويات المصاريف والتشغيل والتسويق والإيجارات المقدرة.</p>
                                            </div>

                                        </div>

                                        {/* بطاقات مقارنة النتائج الفورية للسيناريو */}
                                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 pt-4 border-t border-slate-100">
                                            <div class="bg-slate-900 text-white p-4 rounded-xl">
                                                <span class="text-[10px] text-slate-400 font-bold block mb-1">المبيعات المقدرة بالسيناريو:</span>
                                                <span class="text-lg font-extrabold">{formatCurrency(simulatedSales)}</span>
                                            </div>
                                            <div class="bg-slate-900 text-white p-4 rounded-xl">
                                                <span class="text-[10px] text-slate-400 font-bold block mb-1">تكلفة المبيعات المقدرة بالسيناريو:</span>
                                                <span class="text-lg font-extrabold text-slate-300">{formatCurrency(simulatedCogs)}</span>
                                            </div>
                                            <div class="bg-slate-900 text-white p-4 rounded-xl">
                                                <span class="text-[10px] text-slate-400 font-bold block mb-1">المصاريف التشغيلية المقدرة بالسيناريو:</span>
                                                <span class="text-lg font-extrabold text-slate-300">{formatCurrency(simulatedOpex)}</span>
                                            </div>
                                            <div class="bg-emerald-600 text-white p-4 rounded-xl shadow-md">
                                                <span class="text-[10px] text-emerald-200 font-bold block mb-1">صافي الربح التقديري المالي:</span>
                                                <span class="text-lg font-black">{formatCurrency(simulatedNetIncome)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* جدول تقدير التدفقات التاريخية */}
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4">مخطط الموازنة التقديرية المستقبلية للثلاثة أشهر المقبلة</h3>
                                        
                                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 space-y-6">
                                            <h4 class="font-bold text-slate-800 flex items-center space-x-2 space-x-reverse text-sm">
                                                <i data-lucide="calendar" class="text-emerald-500"></i>
                                                <span>تقديرات أداء الفترات التشغيلية المقبلة بناءً على مستويات شهر {selectedPeriod}</span>
                                            </h4>
                                            <p class="text-xs text-slate-500 leading-relaxed">استناداً إلى الاتجاه التاريخي للأرباح والمبيعات ومستويات التكلفة الثابتة والمصروفات المستخلصة من ميزان المراجعة لشهر {selectedPeriod}، يوضح الجدول التالي المبيعات والسيولة النقدية المتوقعة للثلاثة أشهر المقبلة:</p>

                                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {/* الشهر 1 */}
                                                <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                    <span class="text-xs text-slate-400 font-bold">توقعات الشهر الأول القادم (+5%):</span>
                                                    <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.netSales * 1.05)}</h4>
                                                    <p class="text-[10px] text-slate-400">الرصيد النقدي التقديري المتوفر بالحسابات: {formatCurrency(fin.totalCashAndEquivalents + (fin.netSales * 0.05))}</p>
                                                </div>

                                                {/* الشهر 2 */}
                                                <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                    <span class="text-xs text-slate-400 font-bold">توقعات الشهر الثاني القادم (+10%):</span>
                                                    <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.netSales * 1.10)}</h4>
                                                    <p class="text-[10px] text-slate-400">الرصيد النقدي التقديري المتوفر بالحسابات: {formatCurrency(fin.totalCashAndEquivalents + (fin.netSales * 0.10))}</p>
                                                </div>

                                                {/* الشهر 3 */}
                                                <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-2">
                                                    <span class="text-xs text-slate-400 font-bold">توقعات الشهر الثالث القادم (+15%):</span>
                                                    <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(fin.netSales * 1.15)}</h4>
                                                    <p class="text-[10px] text-slate-400">الرصيد النقدي التقديري المتوفر بالحسابات: {formatCurrency(fin.totalCashAndEquivalents + (fin.netSales * 0.15))}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* تذييل الصفحة (Footer) */}
                        <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400 mt-auto">
                            <p>© 2026 المنصة المالية المتكاملة للتحليل المالي - جميع الحقوق محفوظة</p>
                        </footer>
                    </main>

                </div>
            );
        }

        // رندر للتطبيق المالي في الهيكل الرئيسي
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
