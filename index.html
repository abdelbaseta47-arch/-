<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة المهنية للتحليل المالي وإعداد التقارير</title>
    <!-- خط Cairo المتميز للتصاميم العربية الاحترافية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- مكتبات التطوير والتشغيل الفوري (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة قراءة ملفات الإكسل XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- أيقونات Lucide الرائعة -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // تخصيص إعدادات Tailwind لتناسب الهوية المالية الفاخرة
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        finance: {
                            dark: '#0f172a',
                            navy: '#1e293b',
                            green: '#10b981',
                            red: '#ef4444',
                            blue: '#3b82f6',
                            gold: '#f59e0b',
                            lightBg: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
        /* تأثيرات الانتقال والتمرير السلس */
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50/50">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // البيانات الافتراضية الأولية
        const defaultTrialBalance = [
            // شهر أبريل 2026
            { code: "1111", nameAr: "النقدية في الخزينة الصندوق", nameEn: "Cash on Hand", debit: 92000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-04" },
            { code: "1112", nameAr: "البنوك - الحسابات الجارية بالريال", nameEn: "Cash at Banks", debit: 220000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-04" },
            { code: "1120", nameAr: "العملاء والذمم المدينة التجارية", nameEn: "Trade Receivables", debit: 160000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-04" },
            { code: "1133", nameAr: "مخزون السلع تامة الصنع الجاهزة للبيع", nameEn: "Finished Goods", debit: 100000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-04" },
            { code: "2111", nameAr: "الموردون والذمم الدائنة التجارية", nameEn: "Trade Payables", debit: 0, credit: 88000, category: "Liabilities", subCategory: "Current Liabilities", period: "2026-04" },
            { code: "3100", nameAr: "رأس المال المصرح به والمدفوع", nameEn: "Paid-up Capital", debit: 0, credit: 484000, category: "Equity", subCategory: "Equity", period: "2026-04" },
            // شهر مايو 2026
            { code: "1111", nameAr: "النقدية في الخزينة الصندوق", nameEn: "Cash on Hand", debit: 50000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-05" },
            { code: "1112", nameAr: "البنوك - الحسابات الجارية بالريال", nameEn: "Cash at Banks", debit: 250000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-05" },
            { code: "1120", nameAr: "العملاء والذمم المدينة التجارية", nameEn: "Trade Receivables", debit: 180000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-05" },
            { code: "1133", nameAr: "مخزون السلع تامة الصنع الجاهزة للبيع", nameEn: "Finished Goods", debit: 120000, credit: 0, category: "Assets", subCategory: "Current Assets", period: "2026-05" },
            { code: "2111", nameAr: "الموردون والذمم الدائنة التجارية", nameEn: "Trade Payables", debit: 0, credit: 95000, category: "Liabilities", subCategory: "Current Liabilities", period: "2026-05" },
            { code: "3100", nameAr: "رأس المال المصرح به والمدفوع", nameEn: "Paid-up Capital", debit: 0, credit: 505000, category: "Equity", subCategory: "Equity", period: "2026-05" },
            // إيرادات ومصروفات تجريبية
            { code: "4110", nameAr: "إيرادات بيع المنتجات", nameEn: "Sales Revenues", debit: 0, credit: 380000, category: "Revenues", period: "2026-04" },
            { code: "5110", nameAr: "تكلفة المواد الخام المباشرة", nameEn: "Direct Materials", debit: 150000, credit: 0, category: "Expenses", period: "2026-04" },
            { code: "4110", nameAr: "إيرادات بيع المنتجات", nameEn: "Sales Revenues", debit: 0, credit: 450000, category: "Revenues", period: "2026-05" },
            { code: "5110", nameAr: "تكلفة المواد الخام المباشرة", nameEn: "Direct Materials", debit: 180000, credit: 0, category: "Expenses", period: "2026-05" }
        ];

        function App() {
            // إدارة الصفحات
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeStatementTab, setActiveStatementTab] = useState('income');
            
            // إدارة الذاكرة المحلية (Persistent Storage)
            const [trialBalance, setTrialBalance] = useState(() => {
                const savedData = localStorage.getItem('finance_platform_data');
                if (savedData) {
                    try {
                        return JSON.parse(savedData);
                    } catch (e) {
                        return defaultTrialBalance;
                    }
                }
                return defaultTrialBalance;
            });

            // حفظ البيانات تلقائياً في المتصفح عند أي تغيير
            useEffect(() => {
                localStorage.setItem('finance_platform_data', JSON.stringify(trialBalance));
            }, [trialBalance]);

            // قراءة الشهور المتوفرة في البيانات ديناميكياً
            const availablePeriods = [...new Set(trialBalance.map(item => item.period).filter(Boolean))].sort();
            const defaultPeriod = availablePeriods.length > 0 ? availablePeriods[availablePeriods.length - 1] : '';
            const [selectedPeriod, setSelectedPeriod] = useState(defaultPeriod || 'all');

            // إعدادات الإدخال اليدوي والاستيراد
            const [ingestionMode, setIngestionMode] = useState('excel'); // 'excel' or 'manual'
            const [entryPeriod, setEntryPeriod] = useState(defaultPeriod || new Date().toISOString().slice(0, 7));
            const [manualEntry, setManualEntry] = useState({ code: '', nameAr: '', nameEn: '', debit: '', credit: '' });

            const [simSalesGrowth, setSimSalesGrowth] = useState(0); 
            const [simCogsRatio, setSimCogsRatio] = useState(44); 
            const [simOpexRatio, setSimOpexRatio] = useState(22); 

            // دالة لحساب المؤشرات المالية
            const calculateFinancials = () => {
                let cash = 0, bank = 0, stInvestments = 0, receivables = 0, eclAllowance = 0, rawMaterials = 0, wip = 0, finishedGoods = 0, prepaids = 0, dueFromRelated = 0, lands = 0, buildings = 0, machinery = 0, accumDepr = 0, intangibleAssets = 0;
                let payables = 0, accruedExp = 0, customerAdvances = 0, shortTermLoans = 0, dueToRelated = 0, zakatProvision = 0, longTermLoans = 0, endOfServiceProvision = 0;
                let capital = 0, statutoryReserve = 0, retainedEarnings = 0;
                let revenueGoods = 0, revenueServices = 0, salesDiscounts = 0;
                let cogsMaterials = 0, cogsLabor = 0, cogsOverhead = 0;
                let opexSalaries = 0, opexRent = 0, opexMarketing = 0, opexDepreciation = 0, opexEcl = 0;
                let financeCosts = 0, zakatTaxExpense = 0;

                // منطق التجميع المتقدم (YTD) أو الفلترة حسب الشهر
                let processedData = [];
                if (selectedPeriod === 'all') {
                    // في حال تجميع كل الشهور، نقوم بجمع الحركات (مناسب لقوائم الدخل والمصروفات)
                    const aggregated = {};
                    trialBalance.forEach(item => {
                        const key = item.code;
                        if (!aggregated[key]) {
                            aggregated[key] = { ...item, debit: 0, credit: 0 };
                        }
                        aggregated[key].debit += (parseFloat(item.debit) || 0);
                        aggregated[key].credit += (parseFloat(item.credit) || 0);
                    });
                    processedData = Object.values(aggregated);
                } else {
                    processedData = trialBalance.filter(item => !item.period || item.period === selectedPeriod);
                }

                processedData.forEach(item => {
                    const code = parseInt(item.code);
                    const debitAmt = parseFloat(item.debit) || 0;
                    const creditAmt = parseFloat(item.credit) || 0;
                    const netAmt = debitAmt - creditAmt;

                    // تصنيف الحسابات الشامل
                    if(code >= 1111 && code <= 1113) { cash += (code===1111?netAmt:0); bank += (code===1112?netAmt:0); stInvestments += (code===1113?netAmt:0); }
                    else if(code === 1120) receivables += netAmt;
                    else if(code === 1125) eclAllowance += creditAmt; 
                    else if(code >= 1131 && code <= 1133) { rawMaterials += (code===1131?netAmt:0); wip += (code===1132?netAmt:0); finishedGoods += (code===1133?netAmt:0); }
                    else if(code === 1140) prepaids += netAmt;
                    else if(code === 1150) dueFromRelated += netAmt;
                    else if(code >= 1211 && code <= 1214) { lands += (code===1211?netAmt:0); buildings += (code===1212?netAmt:0); machinery += (code===1213?netAmt:0); accumDepr += (code===1214?creditAmt:0); }
                    else if(code === 1220) intangibleAssets += netAmt;
                    else if(code >= 2111 && code <= 2140) { payables += (code===2111?creditAmt:0); accruedExp += (code===2112?creditAmt:0); customerAdvances += (code===2113?creditAmt:0); shortTermLoans += (code===2121?creditAmt:0); dueToRelated += (code===2130?creditAmt:0); zakatProvision += (code===2140?creditAmt:0); }
                    else if(code === 2211) longTermLoans += creditAmt;
                    else if(code === 2220) endOfServiceProvision += creditAmt;
                    else if(code >= 3100 && code <= 3200) { capital += (code===3100?creditAmt:0); statutoryReserve += (code===3150?creditAmt:0); retainedEarnings += (code===3200?creditAmt:0); }
                    else if(code >= 4110 && code <= 4150) { revenueGoods += (code===4110?creditAmt:0); revenueServices += (code===4120?creditAmt:0); salesDiscounts += (code===4150?debitAmt:0); }
                    else if(code >= 5110 && code <= 5130) { cogsMaterials += (code===5110?debitAmt:0); cogsLabor += (code===5120?debitAmt:0); cogsOverhead += (code===5130?debitAmt:0); }
                    else if(code >= 5211 && code <= 5215) { opexSalaries += (code===5211?debitAmt:0); opexRent += (code===5212?debitAmt:0); opexMarketing += (code===5213?debitAmt:0); opexDepreciation += (code===5214?debitAmt:0); opexEcl += (code===5215?debitAmt:0); }
                    else if(code === 5310) financeCosts += debitAmt;
                    else if(code === 5410) zakatTaxExpense += debitAmt;
                });

                const totalCashAndEquivalents = cash + bank + stInvestments;
                const netReceivables = receivables - eclAllowance;
                const totalInventory = rawMaterials + wip + finishedGoods;
                const totalCurrentAssets = totalCashAndEquivalents + netReceivables + totalInventory + prepaids + dueFromRelated;

                const netFixedAssets = lands + buildings + machinery - accumDepr;
                const totalNonCurrentAssets = netFixedAssets + intangibleAssets;
                const totalAssets = totalCurrentAssets + totalNonCurrentAssets;

                const totalPayables = payables + accruedExp + customerAdvances;
                const totalCurrentLiabilities = totalPayables + shortTermLoans + dueToRelated + zakatProvision;
                const totalNonCurrentLiabilities = longTermLoans + endOfServiceProvision;
                const totalLiabilities = totalCurrentLiabilities + totalNonCurrentLiabilities;

                const baseEquity = capital + statutoryReserve + retainedEarnings;

                const netSales = revenueGoods + revenueServices - salesDiscounts;
                const totalCogs = cogsMaterials + cogsLabor + cogsOverhead;
                const grossProfit = netSales - totalCogs;
                const totalOpex = opexSalaries + opexRent + opexMarketing + opexDepreciation + opexEcl;
                const operatingProfit = grossProfit - totalOpex; 
                const netIncomeBeforeZakat = operatingProfit - financeCosts;
                const netIncome = netIncomeBeforeZakat - zakatTaxExpense; 
                const totalEquity = baseEquity + netIncome;

                const currentRatio = totalCurrentLiabilities > 0 ? (totalCurrentAssets / totalCurrentLiabilities).toFixed(2) : "0.00";
                const quickRatio = totalCurrentLiabilities > 0 ? ((totalCashAndEquivalents + netReceivables) / totalCurrentLiabilities).toFixed(2) : "0.00";
                const debtToEquity = totalEquity > 0 ? ((totalLiabilities / totalEquity) * 100).toFixed(1) : "0.0";
                const workingCapital = totalCurrentAssets - totalCurrentLiabilities;

                const dso = netSales > 0 ? Math.round((netReceivables / netSales) * 365) : 0; 
                const dio = totalCogs > 0 ? Math.round((totalInventory / totalCogs) * 365) : 0; 
                const dpo = totalCogs > 0 ? Math.round((payables / totalCogs) * 365) : 0; 
                const ccc = (dso + dio) - dpo; 

                const debtToAssets = totalAssets > 0 ? ((totalLiabilities / totalAssets) * 100).toFixed(1) : "0.0";
                const interestCoverage = financeCosts > 0 ? (operatingProfit / financeCosts).toFixed(2) : "0.00";
                const cashRunwayMonths = (totalOpex + financeCosts) > 0 ? (totalCashAndEquivalents / ((totalOpex + financeCosts) / 3)).toFixed(1) : "0.0";

                return {
                    totalCashAndEquivalents, netReceivables, totalInventory, totalCurrentAssets, netFixedAssets, totalNonCurrentAssets, totalAssets,
                    totalPayables, totalCurrentLiabilities, totalNonCurrentLiabilities, totalLiabilities, baseEquity, totalEquity,
                    netSales, totalCogs, grossProfit, totalOpex, operatingProfit, netIncomeBeforeZakat, netIncome,
                    currentRatio, quickRatio, debtToEquity, workingCapital, dso, dio, dpo, ccc, debtToAssets, interestCoverage, cashRunwayMonths,
                    cash, bank, stInvestments, receivables, eclAllowance, rawMaterials, wip, finishedGoods, prepaids, dueFromRelated,
                    lands, buildings, machinery, accumDepr, intangibleAssets, payables, accruedExp, customerAdvances,
                    shortTermLoans, dueToRelated, zakatProvision, longTermLoans, endOfServiceProvision, capital, statutoryReserve, retainedEarnings,
                    revenueGoods, revenueServices, salesDiscounts, cogsMaterials, cogsLabor, cogsOverhead,
                    opexSalaries, opexRent, opexMarketing, opexDepreciation, opexEcl, financeCosts, zakatTaxExpense,
                    filteredCount: processedData.length,
                    processedData
                };
            };

            const fin = calculateFinancials();
            const formatCurrency = (val) => new Intl.NumberFormat('ar-SA', { style: 'currency', currency: 'SAR', maximumFractionDigits: 0 }).format(val || 0);

            // محاكاة التوقعات
            const simulatedSales = fin.netSales * (1 + simSalesGrowth / 100);
            const simulatedCogs = simulatedSales * (simCogsRatio / 100);
            const simulatedOpex = simulatedSales * (simOpexRatio / 100);
            const simulatedNetIncome = (simulatedSales - simulatedCogs - simulatedOpex) - fin.financeCosts - fin.zakatTaxExpense;

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentView, selectedPeriod, activeStatementTab, ingestionMode]);

            // ================= وظائف إدخال وإدارة البيانات =================

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    const parsedBalance = [];
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if (row[0] && row[1]) {
                            parsedBalance.push({
                                code: row[0].toString(),
                                nameAr: row[1],
                                nameEn: row[2] || row[1],
                                debit: parseFloat(row[3]) || 0,
                                credit: parseFloat(row[4]) || 0,
                                period: row[5] || entryPeriod // ربط السجل بالشهر المحدد في الواجهة إذا كان فارغاً بالإكسل
                            });
                        }
                    }
                    if (parsedBalance.length > 0) {
                        setTrialBalance([...trialBalance, ...parsedBalance]);
                        alert(`تم استيراد ${parsedBalance.length} سجل بنجاح وتم دمجها في النظام لشهر ${entryPeriod}.`);
                    } else {
                        alert("لم نتمكن من العثور على سجلات صالحة في الملف المرفوع.");
                    }
                };
                reader.readAsBinaryString(file);
                e.target.value = null; // Reset input
            };

            const handleManualSubmit = (e) => {
                e.preventDefault();
                if(!manualEntry.code || !manualEntry.nameAr) return alert("يرجى إدخال كود الحساب واسم الحساب كحد أدنى.");
                
                const newRow = {
                    code: manualEntry.code,
                    nameAr: manualEntry.nameAr,
                    nameEn: manualEntry.nameEn || manualEntry.nameAr,
                    debit: parseFloat(manualEntry.debit) || 0,
                    credit: parseFloat(manualEntry.credit) || 0,
                    period: entryPeriod
                };
                setTrialBalance([...trialBalance, newRow]);
                setManualEntry({ code: '', nameAr: '', nameEn: '', debit: '', credit: '' });
            };

            const handleDeleteRow = (indexToDelete) => {
                if(window.confirm('هل أنت متأكد من حذف هذا السطر المحاسبي؟')) {
                    const updated = [...trialBalance];
                    updated.splice(indexToDelete, 1);
                    setTrialBalance(updated);
                }
            };

            const handleClearAllData = () => {
                if(window.confirm('🚨 تحذير هام: هل أنت متأكد من مسح جميع البيانات والحسابات المدخلة؟ لا يمكن التراجع عن هذه الخطوة.')) {
                    setTrialBalance([]);
                    localStorage.removeItem('finance_platform_data');
                    alert("تم تصفير النظام بالكامل.");
                }
            };

            const downloadExcelTemplate = () => {
                const wsData = [["كود الحساب (Account Code)", "اسم الحساب - عربي (Account Name AR)", "اسم الحساب - إنجليزي (Account Name EN)", "مدين (Debit)", "دائن (Credit)", "الفترة المالية (Period)"]];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "IFRS Trial Balance Template");
                XLSX.writeFile(wb, `IFRS_Template.xlsx`);
            };

            return (
                <div class="min-h-screen flex bg-slate-50/50 text-slate-800">
                    
                    {/* القائمة الجانبية */}
                    <aside class="w-80 bg-slate-900 text-white flex flex-col justify-between shadow-xl transition-all duration-300">
                        <div class="overflow-y-auto max-h-[85vh] scrollbar-thin">
                            <div class="p-6 border-b border-slate-800 flex items-center space-x-3 space-x-reverse">
                                <div class="bg-emerald-500 text-slate-900 p-2 rounded-xl shadow-lg shadow-emerald-500/20">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-lg font-extrabold leading-none tracking-wide text-white">منصة التحليل المالي</h1>
                                    <span class="text-[11px] text-emerald-400 font-bold mt-1 block">التحليل وإعداد التقارير الفنية</span>
                                </div>
                            </div>

                            <nav class="p-4 space-y-1.5">
                                <p class="text-[11px] font-bold text-slate-500 px-3 uppercase tracking-wider mb-2">النظام والمطابقة</p>
                                
                                <button 
                                    onClick={() => setCurrentView('ingestion')}
                                    class={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ingestion' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <div class="flex items-center space-x-3 space-x-reverse">
                                        <i data-lucide="database" class="w-5 h-5"></i>
                                        <span>إدارة البيانات والأرصدة</span>
                                    </div>
                                    {trialBalance.length > 0 && <span class="bg-slate-800 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full">{trialBalance.length}</span>}
                                </button>

                                <p class="text-[11px] font-bold text-slate-500 px-3 pt-4 uppercase tracking-wider mb-2">مستويات الدراسة والتحليل</p>
                                
                                <button onClick={() => setCurrentView('dashboard')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'dashboard' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> <span>لوحة الأداء العام</span>
                                </button>
                                <button onClick={() => setCurrentView('statements')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'statements' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="book-open" class="w-5 h-5"></i> <span>القوائم المالية (IFRS)</span>
                                </button>
                                <button onClick={() => setCurrentView('ratios')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ratios' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="percent" class="w-5 h-5"></i> <span>مركز النسب والمؤشرات</span>
                                </button>

                                <p class="text-[11px] font-bold text-slate-500 px-3 pt-4 uppercase tracking-wider mb-2">إدارة رأس المال العامل</p>
                                <button onClick={() => setCurrentView('receivables')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'receivables' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="users" class="w-5 h-5"></i> <span>تحليل العملاء والتحصيل</span>
                                </button>
                                <button onClick={() => setCurrentView('payables')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'payables' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="truck" class="w-5 h-5"></i> <span>تحليل الموردين والسداد</span>
                                </button>
                                <button onClick={() => setCurrentView('cash-deep-dive')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'cash-deep-dive' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="wallet" class="w-5 h-5"></i> <span>إدارة النقدية والسيولة</span>
                                </button>
                                <button onClick={() => setCurrentView('leverage-debt')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'leverage-debt' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="shield" class="w-5 h-5"></i> <span>المديونية والرافعة المالية</span>
                                </button>

                                <p class="text-[11px] font-bold text-slate-500 px-3 pt-4 uppercase tracking-wider mb-2">موديول التوقعات المتقدمة</p>
                                <button onClick={() => setCurrentView('forecasting')} class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'forecasting' ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide="zap" class="w-5 h-5"></i> <span>التنبؤات والسيناريوهات</span>
                                </button>
                            </nav>
                        </div>
                    </aside>

                    {/* منطقة العمل الرئيسية */}
                    <main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
                        
                        {/* شريط الأدوات العلوي والفلترة */}
                        <header class="bg-white border-b border-slate-200 h-20 px-8 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <h2 class="text-xl font-extrabold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                {currentView === 'ingestion' ? <i data-lucide="database" class="text-emerald-500"></i> : null}
                                <span>
                                    {currentView === 'dashboard' && "لوحة الأداء المالي العام"}
                                    {currentView === 'statements' && "مركز إعداد القوائم المالية المستخلصة"}
                                    {currentView === 'ingestion' && "إدارة قواعد البيانات وإدخال الأرصدة"}
                                    {currentView === 'ratios' && "مركز دراسة وتحليل النسب المالية"}
                                    {currentView === 'receivables' && "لوحة تحليل العملاء والذمم المدينة"}
                                    {currentView === 'payables' && "لوحة تحليل الموردين والذمم الدائنة"}
                                    {currentView === 'cash-deep-dive' && "إدارة السيولة النقدية"}
                                    {currentView === 'leverage-debt' && "دراسة المديونية والتمويل"}
                                    {currentView === 'forecasting' && "موديول التنبؤات وتخطيط السيناريوهات"}
                                </span>
                            </h2>

                            <div class="flex items-center space-x-4 space-x-reverse bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                <span class="text-xs text-slate-500 font-bold px-2">تحليل لبيانات شهر:</span>
                                <select 
                                    value={selectedPeriod}
                                    onChange={(e) => setSelectedPeriod(e.target.value)}
                                    class="border-0 px-3 py-1.5 rounded-lg text-sm font-extrabold focus:ring-0 bg-white text-emerald-900 cursor-pointer shadow-sm"
                                >
                                    <option value="all">📊 تجميع كافة الفترات (YTD)</option>
                                    {availablePeriods.map((p, i) => (
                                        <option key={i} value={p}>الفترة: {p}</option>
                                    ))}
                                </select>
                            </div>
                        </header>

                        <div class="p-8 flex-1 max-w-7xl w-full mx-auto space-y-8 fade-in">

                            {/* ==================== بوابة إدارة البيانات (Ingestion & Data Management) ==================== */}
                            {currentView === 'ingestion' && (
                                <div class="space-y-6">
                                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <div>
                                            <h3 class="text-lg font-bold text-slate-900">طرق إدخال وتغذية البيانات</h3>
                                            <p class="text-xs text-slate-500 mt-1">يتم حفظ البيانات تلقائياً. يرجى تحديد الشهر الذي ترغب في إدخال بياناته أسفله.</p>
                                        </div>
                                        <div class="flex bg-slate-100 p-1 rounded-xl">
                                            <button onClick={() => setIngestionMode('excel')} class={`px-6 py-2 rounded-lg text-sm font-bold transition-all flex items-center space-x-2 space-x-reverse ${ingestionMode === 'excel' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i><span>استيراد Excel</span>
                                            </button>
                                            <button onClick={() => setIngestionMode('manual')} class={`px-6 py-2 rounded-lg text-sm font-bold transition-all flex items-center space-x-2 space-x-reverse ${ingestionMode === 'manual' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                                <i data-lucide="keyboard" class="w-4 h-4"></i><span>إدخال يدوي مرن</span>
                                            </button>
                                        </div>
                                    </div>

                                    {/* منطقة تحديد الفترة للإدخال */}
                                    <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex items-center space-x-4 space-x-reverse">
                                        <div class="bg-blue-100 text-blue-700 p-2 rounded-lg"><i data-lucide="calendar-plus" class="w-5 h-5"></i></div>
                                        <div class="flex-1">
                                            <label class="block text-xs font-bold text-blue-900 mb-1">البيانات التي سيتم إدخالها الآن تخص شهر (الفترة المالية):</label>
                                            <input type="month" value={entryPeriod} onChange={(e) => setEntryPeriod(e.target.value)} class="border border-blue-300 px-3 py-1.5 rounded-lg text-sm font-bold text-blue-900 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                        {ingestionMode === 'excel' && (
                                            <button onClick={downloadExcelTemplate} class="bg-white border border-blue-200 text-blue-700 hover:bg-blue-100 px-4 py-2 rounded-lg text-xs font-bold flex items-center space-x-2 space-x-reverse transition-all">
                                                <i data-lucide="download" class="w-4 h-4"></i><span>تحميل قالب Excel</span>
                                            </button>
                                        )}
                                    </div>

                                    {/* محتوى طرق الإدخال */}
                                    {ingestionMode === 'excel' && (
                                        <div class="border-2 border-dashed border-slate-300 hover:border-emerald-500 rounded-2xl p-12 text-center transition-all bg-white hover:bg-emerald-50/20 cursor-pointer relative">
                                            <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <div class="space-y-4 pointer-events-none">
                                                <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto shadow-sm">
                                                    <i data-lucide="cloud-upload" class="w-8 h-8"></i>
                                                </div>
                                                <div>
                                                    <p class="font-bold text-slate-800 text-base">اضغط أو اسحب ملف الإكسل هنا</p>
                                                    <p class="text-xs text-slate-500 mt-1">سيتم ربط جميع الحسابات المرفوعة بشهر: <strong class="text-emerald-700">{entryPeriod}</strong> تلقائياً.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {ingestionMode === 'manual' && (
                                        <form onSubmit={handleManualSubmit} class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                            <h4 class="font-bold text-slate-800 text-sm border-b border-slate-100 pb-2">إضافة قيد / حساب جديد</h4>
                                            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                                                <div>
                                                    <label class="block text-xs text-slate-500 mb-1">كود الحساب *</label>
                                                    <input required type="number" value={manualEntry.code} onChange={e => setManualEntry({...manualEntry, code: e.target.value})} class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-1 focus:ring-emerald-500 outline-none" placeholder="مثال: 1111" />
                                                </div>
                                                <div class="md:col-span-2">
                                                    <label class="block text-xs text-slate-500 mb-1">اسم الحساب (عربي) *</label>
                                                    <input required type="text" value={manualEntry.nameAr} onChange={e => setManualEntry({...manualEntry, nameAr: e.target.value})} class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-1 focus:ring-emerald-500 outline-none" placeholder="مثال: نقدية بالصندوق" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs text-slate-500 mb-1">مدين (SAR)</label>
                                                    <input type="number" value={manualEntry.debit} onChange={e => setManualEntry({...manualEntry, debit: e.target.value})} class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-1 focus:ring-emerald-500 outline-none text-emerald-700 font-bold" placeholder="0" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs text-slate-500 mb-1">دائن (SAR)</label>
                                                    <input type="number" value={manualEntry.credit} onChange={e => setManualEntry({...manualEntry, credit: e.target.value})} class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-1 focus:ring-emerald-500 outline-none text-rose-700 font-bold" placeholder="0" />
                                                </div>
                                            </div>
                                            <div class="flex justify-end pt-2">
                                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-xl text-sm font-bold flex items-center space-x-2 space-x-reverse transition-all shadow-sm">
                                                    <i data-lucide="plus" class="w-4 h-4"></i><span>إضافة السطر</span>
                                                </button>
                                            </div>
                                        </form>
                                    )}

                                    {/* جدول عرض البيانات وإدارتها */}
                                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                            <h4 class="font-bold text-slate-900 flex items-center space-x-2 space-x-reverse">
                                                <i data-lucide="list" class="text-slate-500 w-5 h-5"></i>
                                                <span>قاعدة البيانات الحالية ({trialBalance.length} سجل محفوظ)</span>
                                            </h4>
                                            <button onClick={handleClearAllData} class="bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white border border-rose-200 px-4 py-1.5 rounded-lg text-xs font-bold flex items-center space-x-1.5 space-x-reverse transition-all">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i><span>تصفير جميع الحسابات</span>
                                            </button>
                                        </div>
                                        <div class="max-h-96 overflow-y-auto">
                                            <table class="w-full text-right border-collapse">
                                                <thead class="sticky top-0 bg-slate-100 z-10 shadow-sm">
                                                    <tr class="text-slate-600 text-xs font-bold">
                                                        <th class="p-3 border-b">الفترة</th>
                                                        <th class="p-3 border-b">كود</th>
                                                        <th class="p-3 border-b">اسم الحساب</th>
                                                        <th class="p-3 border-b text-left">مدين</th>
                                                        <th class="p-3 border-b text-left">دائن</th>
                                                        <th class="p-3 border-b text-center">إجراء</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="text-sm divide-y divide-slate-100">
                                                    {trialBalance.map((item, index) => (
                                                        <tr key={index} class="hover:bg-slate-50 transition-colors">
                                                            <td class="p-3 text-xs font-bold text-blue-600 bg-blue-50/30 w-24">{item.period || 'غير محدد'}</td>
                                                            <td class="p-3 font-mono text-slate-500">{item.code}</td>
                                                            <td class="p-3 font-semibold text-slate-800">{item.nameAr}</td>
                                                            <td class="p-3 text-left text-emerald-600 font-bold">{item.debit ? formatCurrency(item.debit) : "-"}</td>
                                                            <td class="p-3 text-left text-slate-700 font-bold">{item.credit ? formatCurrency(item.credit) : "-"}</td>
                                                            <td class="p-3 text-center">
                                                                <button onClick={() => handleDeleteRow(index)} class="text-slate-400 hover:text-rose-500 transition-colors p-1 rounded-md hover:bg-rose-50" title="حذف السطر">
                                                                    <i data-lucide="x" class="w-4 h-4"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {trialBalance.length === 0 && (
                                                        <tr><td colspan="6" class="p-8 text-center text-slate-400 text-sm">لا توجد بيانات مدخلة. ابدأ بإضافة الحسابات أعلاه.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== باقي اللوحات والقوائم المالية (تعمل كالسابق وتتأثر بالفلتر) ==================== */}
                            
                            {currentView === 'dashboard' && (
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div class="space-y-1">
                                            <span class="text-xs font-semibold text-slate-500">صافي المبيعات (Net Sales)</span>
                                            <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.netSales)}</h3>
                                        </div>
                                        <div class="bg-blue-50 text-blue-600 p-4 rounded-xl"><i data-lucide="shopping-bag" class="w-6 h-6"></i></div>
                                    </div>
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div class="space-y-1">
                                            <span class="text-xs font-semibold text-slate-500">صافي الربح (Net Income)</span>
                                            <h3 class="text-2xl font-black text-emerald-600">{formatCurrency(fin.netIncome)}</h3>
                                        </div>
                                        <div class="bg-emerald-50 text-emerald-600 p-4 rounded-xl"><i data-lucide="dollar-sign" class="w-6 h-6"></i></div>
                                    </div>
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div class="space-y-1">
                                            <span class="text-xs font-semibold text-slate-500">النقد بالبنوك (Cash)</span>
                                            <h3 class="text-2xl font-black text-slate-900">{formatCurrency(fin.totalCashAndEquivalents)}</h3>
                                        </div>
                                        <div class="bg-amber-50 text-amber-600 p-4 rounded-xl"><i data-lucide="wallet" class="w-6 h-6"></i></div>
                                    </div>
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div class="space-y-1">
                                            <span class="text-xs font-semibold text-slate-500">هامش الربح (Net Margin)</span>
                                            <h3 class="text-2xl font-black text-purple-600">{fin.netSales ? ((fin.netIncome / fin.netSales)*100).toFixed(1) : 0}%</h3>
                                        </div>
                                        <div class="bg-purple-50 text-purple-600 p-4 rounded-xl"><i data-lucide="percent" class="w-6 h-6"></i></div>
                                    </div>
                                </div>
                            )}

                            {currentView === 'statements' && (
                                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                    <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                                        <h3 class="text-lg font-bold text-slate-900">القوائم المالية للتحليل: {selectedPeriod === 'all' ? 'تجميع YTD' : selectedPeriod}</h3>
                                        <div class="flex bg-slate-100 p-1 rounded-xl">
                                            <button onClick={() => setActiveStatementTab('income')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeStatementTab === 'income' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`}>الدخل</button>
                                            <button onClick={() => setActiveStatementTab('balance')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeStatementTab === 'balance' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`}>المركز المالي</button>
                                        </div>
                                    </div>
                                    {activeStatementTab === 'income' && (
                                        <table class="w-full text-sm text-right">
                                            <tbody>
                                                <tr class="bg-slate-50"><td class="p-3 font-bold">صافي المبيعات</td><td class="p-3 font-bold text-left">{formatCurrency(fin.netSales)}</td></tr>
                                                <tr><td class="p-3 text-rose-700">(-) تكلفة المبيعات COGS</td><td class="p-3 text-rose-700 text-left">({formatCurrency(fin.totalCogs)})</td></tr>
                                                <tr class="bg-slate-100 border-y border-slate-200"><td class="p-3 font-bold text-emerald-800">مجمل الربح</td><td class="p-3 font-bold text-emerald-800 text-left">{formatCurrency(fin.grossProfit)}</td></tr>
                                                <tr><td class="p-3 text-rose-700">(-) المصاريف التشغيلية OPEX</td><td class="p-3 text-rose-700 text-left">({formatCurrency(fin.totalOpex)})</td></tr>
                                                <tr class="bg-slate-50 border-y border-slate-200"><td class="p-3 font-bold text-blue-800">الربح التشغيلي EBIT</td><td class="p-3 font-bold text-blue-800 text-left">{formatCurrency(fin.operatingProfit)}</td></tr>
                                                <tr><td class="p-3 text-rose-700">(-) تكاليف التمويل والزكاة</td><td class="p-3 text-rose-700 text-left">({formatCurrency(fin.financeCosts + fin.zakatTaxExpense)})</td></tr>
                                                <tr class="bg-emerald-600 text-white font-bold"><td class="p-4 rounded-r-lg">صافي الربح النهائي</td><td class="p-4 text-left rounded-l-lg">{formatCurrency(fin.netIncome)}</td></tr>
                                            </tbody>
                                        </table>
                                    )}
                                    {activeStatementTab === 'balance' && (
                                        <table class="w-full text-sm text-right">
                                            <tbody>
                                                <tr class="bg-slate-900 text-white font-bold"><td colspan="2" class="p-3 rounded-t-lg">الأصول</td></tr>
                                                <tr><td class="p-3">إجمالي الأصول المتداولة</td><td class="p-3 text-left font-bold">{formatCurrency(fin.totalCurrentAssets)}</td></tr>
                                                <tr><td class="p-3">إجمالي الأصول غير المتداولة</td><td class="p-3 text-left font-bold">{formatCurrency(fin.totalNonCurrentAssets)}</td></tr>
                                                <tr class="bg-emerald-50 text-emerald-900 font-bold border-b-2 border-emerald-200"><td class="p-3">إجمالي الأصول</td><td class="p-3 text-left">{formatCurrency(fin.totalAssets)}</td></tr>
                                                
                                                <tr class="bg-slate-900 text-white font-bold"><td colspan="2" class="p-3 mt-4">الالتزامات وحقوق الملكية</td></tr>
                                                <tr><td class="p-3">إجمالي الالتزامات</td><td class="p-3 text-left font-bold text-rose-700">{formatCurrency(fin.totalLiabilities)}</td></tr>
                                                <tr><td class="p-3">إجمالي حقوق الملكية</td><td class="p-3 text-left font-bold">{formatCurrency(fin.totalEquity)}</td></tr>
                                                <tr class="bg-blue-50 text-blue-900 font-bold border-b-2 border-blue-200"><td class="p-3">إجمالي الالتزامات وحقوق الملكية</td><td class="p-3 text-left">{formatCurrency(fin.totalLiabilities + fin.totalEquity)}</td></tr>
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            )}

                            {/* ==================== موديول التنبؤات وتخطيط السيناريوهات (Forecasting) ==================== */}
                            {currentView === 'forecasting' && (
                                <div class="space-y-8">
                                    <div class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                                        <i data-lucide="zap" class="absolute top-[-20px] left-[-20px] w-48 h-48 text-white opacity-5 rotate-12"></i>
                                        <h3 class="text-2xl font-black mb-2 relative z-10">موديول التنبؤ والذكاء المالي التقديري</h3>
                                        <p class="text-blue-200 text-sm relative z-10">تعتمد هذه الأرقام على تضخيم البيانات الأساسية الخاصة بالفترة ({selectedPeriod === 'all' ? 'جميع الفترات' : selectedPeriod}). حرّك المؤشرات لمراقبة التأثير اللحظي.</p>
                                    </div>

                                    <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            <div class="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-sm font-bold">
                                                    <span class="text-slate-700">تغير حجم المبيعات المتوقع:</span>
                                                    <span class="text-emerald-600 font-mono">{simSalesGrowth > 0 ? `+${simSalesGrowth}` : simSalesGrowth}%</span>
                                                </div>
                                                <input type="range" min="-50" max="100" value={simSalesGrowth} onChange={(e) => setSimSalesGrowth(parseInt(e.target.value))} class="w-full accent-emerald-500 cursor-pointer" />
                                            </div>

                                            <div class="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-sm font-bold">
                                                    <span class="text-slate-700">نسبة تكلفة المبيعات (COGS):</span>
                                                    <span class="text-blue-600 font-mono">{simCogsRatio}%</span>
                                                </div>
                                                <input type="range" min="20" max="80" value={simCogsRatio} onChange={(e) => setSimCogsRatio(parseInt(e.target.value))} class="w-full accent-blue-500 cursor-pointer" />
                                            </div>

                                            <div class="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                                <div class="flex justify-between text-sm font-bold">
                                                    <span class="text-slate-700">نسبة المصاريف الإدارية (OPEX):</span>
                                                    <span class="text-purple-600 font-mono">{simOpexRatio}%</span>
                                                </div>
                                                <input type="range" min="5" max="50" value={simOpexRatio} onChange={(e) => setSimOpexRatio(parseInt(e.target.value))} class="w-full accent-purple-500 cursor-pointer" />
                                            </div>
                                        </div>

                                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 pt-6 border-t border-slate-100">
                                            <div class="bg-slate-900 text-white p-5 rounded-xl border-l-4 border-slate-700">
                                                <span class="text-xs text-slate-400 font-bold block mb-2">المبيعات المقدرة بالسيناريو:</span>
                                                <span class="text-xl font-extrabold">{formatCurrency(simulatedSales)}</span>
                                            </div>
                                            <div class="bg-rose-50 text-rose-900 p-5 rounded-xl border-l-4 border-rose-400">
                                                <span class="text-xs text-rose-500 font-bold block mb-2">تكلفة المبيعات المتوقعة:</span>
                                                <span class="text-xl font-extrabold">{formatCurrency(simulatedCogs)}</span>
                                            </div>
                                            <div class="bg-amber-50 text-amber-900 p-5 rounded-xl border-l-4 border-amber-400">
                                                <span class="text-xs text-amber-600 font-bold block mb-2">المصاريف التشغيلية المتوقعة:</span>
                                                <span class="text-xl font-extrabold">{formatCurrency(simulatedOpex)}</span>
                                            </div>
                                            <div class="bg-emerald-600 text-white p-5 rounded-xl border-l-4 border-emerald-400 shadow-lg transform scale-105">
                                                <span class="text-xs text-emerald-200 font-bold block mb-2">صافي الربح التقديري:</span>
                                                <span class="text-2xl font-black">{formatCurrency(simulatedNetIncome)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
