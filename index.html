            { entryId: "j42", accountCode: "4130", periodId: "p6", debit: 0, credit: 21000 },
            { entryId: "j43", accountCode: "4140", periodId: "p6", debit: 0, credit: 4000 },
            { entryId: "j44", accountCode: "4150", periodId: "p6", debit: 13000, credit: 0 },
            { entryId: "j45", accountCode: "5110", periodId: "p6", debit: 138000, credit: 0 },
            { entryId: "j46", accountCode: "5120", periodId: "p6", debit: 55000, credit: 0 },
            { entryId: "j47", accountCode: "5130", periodId: "p6", debit: 33000, credit: 0 },
            { entryId: "j48", accountCode: "5140", periodId: "p6", debit: 13000, credit: 0 },
            { entryId: "j49", accountCode: "5211", periodId: "p6", debit: 60000, credit: 0 },
            { entryId: "j50", accountCode: "5212", periodId: "p6", debit: 22000, credit: 0 },
            { entryId: "j51", accountCode: "5213", periodId: "p6", debit: 17000, credit: 0 },

            { entryId: "j55", accountCode: "5310", periodId: "p6", debit: 14000, credit: 0 },
            { entryId: "j56", accountCode: "5410", periodId: "p6", debit: 8800, credit: 0 }
        ];

        function App() {
            // 1. إدارة الصفحات والواجهات النشطة بالمنصة
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeStatementTab, setActiveStatementTab] = useState('balance');

            // 2. إدارة البيانات في البنية الهيكلية الجديدة لربط الفترات بالكامل (مع دعم الذاكرة الداخلية LocalStorage)
            const [periods, setPeriods] = useState(() => {
                const saved = localStorage.getItem('finance_periods');
                return saved ? JSON.parse(saved) : initialPeriods;
            });
            const [accounts, setAccounts] = useState(() => {
                const saved = localStorage.getItem('finance_accounts');
                return saved ? JSON.parse(saved) : initialAccounts;
            });
            const [balances, setBalances] = useState(() => {
                const saved = localStorage.getItem('finance_balances');
                return saved ? JSON.parse(saved) : initialBalances;
            });

            // تحديث الذاكرة الداخلية عند أي تغيير في البيانات
            useEffect(() => {
                localStorage.setItem('finance_periods', JSON.stringify(periods));
            }, [periods]);

            useEffect(() => {
                localStorage.setItem('finance_accounts', JSON.stringify(accounts));
            }, [accounts]);

            useEffect(() => {
                localStorage.setItem('finance_balances', JSON.stringify(balances));
            }, [balances]);

            // 3. فلاتر الفترات الموحدة على مستوى المنصة بالكامل
            const [currentPeriodId, setCurrentPeriodId] = useState("p6");
            const [comparePeriodId, setComparePeriodId] = useState("p5");

            // 4. نموذج إضافة / تعديل الحسابات تفاعلياً
            const [showAccountModal, setShowAccountModal] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [selectedAccountForEdit, setSelectedAccountForEdit] = useState(null);
            const [accountForm, setAccountForm] = useState({ code: '', nameAr: '', category: 'Assets', subCategory: 'Current Assets' });

            // 5. نموذج إدخال أرصدة يدوي تفاعلي لفترة معينة
            const [showBalanceModal, setShowBalanceModal] = useState(false);
            const [balanceForm, setBalanceForm] = useState({ accountCode: '', periodId: '', debit: 0, credit: 0 });

            // 6. متغيرات لوحة محاكاة السيناريوهات المالية (ماذا لو؟)
            const [simSalesGrowth, setSimSalesGrowth] = useState(0); 
            const [simCogsRatio, setSimCogsRatio] = useState(43); 
            const [simOpexRatio, setSimOpexRatio] = useState(21); 

            // دالة للحصول على الاسم التوضيحي للفترة
            const getPeriodName = (pId) => {
                const found = periods.find(p => p.id === pId);
                return found ? found.name : "غير محددة";
            };

            // حساب المؤشرات والقوائم المالية لفترة محددة ديناميكياً
            const calculateFinancialsForPeriod = (pId) => {
                let cash = 0, bank = 0, stInvestments = 0, receivables = 0, eclAllowance = 0, rawMaterials = 0, wip = 0, finishedGoods = 0, prepaids = 0, dueFromRelated = 0;
                let lands = 0, buildings = 0, machinery = 0, accumDepr = 0, intangibleAssets = 0, goodwill = 0, investRealestate = 0, investAssociates = 0, deferredTaxAssets = 0, rightOfUseAssets = 0, accumRightOfUseDepr = 0;
                let payables = 0, accruedExp = 0, customerAdvances = 0, shortTermLoans = 0, dueToRelated = 0, zakatProvision = 0, leaseLiabilitiesCurrent = 0;
                let longTermLoans = 0, leaseLiabilitiesNonCurrent = 0, endOfServiceProvision = 0, deferredTaxLiabilities = 0, otherProvisions = 0;
                let capital = 0, statutoryReserve = 0, retainedEarnings = 0, sharePremium = 0, otherComprehensiveIncome = 0, treasuryShares = 0;
                let revenueGoods = 0, revenueServices = 0, revenueOther = 0, revenueFinance = 0, salesDiscounts = 0;
                let cogsMaterials = 0, cogsLabor = 0, cogsOverhead = 0, cogsDepreciation = 0;
                let opexSalaries = 0, opexRent = 0, opexMarketing = 0, opexDepreciation = 0, opexEcl = 0, opexTravel = 0;
                let financeCosts = 0, zakatTaxExpense = 0;

                const periodBalances = balances.filter(b => b.periodId === pId);

                accounts.forEach(acc => {
                    const balance = periodBalances.find(b => b.accountCode === acc.code);
                    const debitAmt = balance ? (parseFloat(balance.debit) || 0) : 0;
                    const creditAmt = balance ? (parseFloat(balance.credit) || 0) : 0;
                    const netAmt = debitAmt - creditAmt;

                    const codeNum = parseInt(acc.code);

                    switch(codeNum) {
                        case 1111: cash += netAmt; break;
                        case 1112: bank += netAmt; break;
                        case 1113: stInvestments += netAmt; break;
                        case 1120: receivables += netAmt; break;
                        case 1125: eclAllowance += creditAmt; break; 
                        case 1131: rawMaterials += netAmt; break;
                        case 1132: wip += netAmt; break;
                        case 1133: finishedGoods += netAmt; break;
                        case 1140: prepaids += netAmt; break;
                        case 1150: dueFromRelated += netAmt; break;
                        case 1211: lands += netAmt; break;
                        case 1212: buildings += netAmt; break;
                        case 1213: machinery += netAmt; break;
                        case 1214: accumDepr += creditAmt; break; 
                        case 1215: rightOfUseAssets += netAmt; break;
                        case 1216: accumRightOfUseDepr += creditAmt; break;
                        case 1220: intangibleAssets += netAmt; break;
                        case 1230: goodwill += netAmt; break;
                        case 1240: investRealestate += netAmt; break;
                        case 1250: investAssociates += netAmt; break;
                        case 1260: deferredTaxAssets += netAmt; break;

                        case 2111: payables += creditAmt; break;
                        case 2112: accruedExp += creditAmt; break;
                        case 2113: customerAdvances += creditAmt; break;
                        case 2121: shortTermLoans += creditAmt; break;
                        case 2130: dueToRelated += creditAmt; break;
                        case 2140: zakatProvision += creditAmt; break;
                        case 2150: leaseLiabilitiesCurrent += creditAmt; break;

                        case 2211: longTermLoans += creditAmt; break;
                        case 2212: leaseLiabilitiesNonCurrent += creditAmt; break;
                        case 2220: endOfServiceProvision += creditAmt; break;
                        case 2230: deferredTaxLiabilities += creditAmt; break;
                        case 2240: otherProvisions += creditAmt; break;

                        case 3100: capital += creditAmt; break;
                        case 3110: sharePremium += creditAmt; break;
                        case 3150: statutoryReserve += creditAmt; break;
                        case 3200: retainedEarnings += creditAmt; break;
                        case 3300: otherComprehensiveIncome += creditAmt; break;
                        case 3400: treasuryShares += netAmt; break; 

                        case 4110: revenueGoods += creditAmt; break;
                        case 4120: revenueServices += creditAmt; break;
                        case 4130: revenueOther += creditAmt; break;
                        case 4140: revenueFinance += creditAmt; break;
                        case 4150: salesDiscounts += debitAmt; break;

                        case 5110: cogsMaterials += debitAmt; break;
                        case 5120: cogsLabor += debitAmt; break;
                        case 5130: cogsOverhead += debitAmt; break;
                        case 5140: cogsDepreciation += debitAmt; break;

                        case 5211: opexSalaries += debitAmt; break;
                        case 5212: opexRent += debitAmt; break;
                        case 5213: opexMarketing += debitAmt; break;
                        case 5214: opexDepreciation += debitAmt; break;
                        case 5215: opexEcl += debitAmt; break;
                        case 5216: opexTravel += debitAmt; break;

                        case 5310: financeCosts += debitAmt; break;
                        case 5410: zakatTaxExpense += debitAmt; break;
                        default: break;
                    }
                });

                const totalCashAndEquivalents = cash + bank + stInvestments;
                const netReceivables = receivables - eclAllowance;
                const totalInventory = rawMaterials + wip + finishedGoods;
                const totalCurrentAssets = totalCashAndEquivalents + netReceivables + totalInventory + prepaids + dueFromRelated;

                const netFixedAssets = lands + buildings + machinery - accumDepr;
                const netRightOfUse = rightOfUseAssets - accumRightOfUseDepr;
                const totalNonCurrentAssets = netFixedAssets + netRightOfUse + intangibleAssets + goodwill + investRealestate + investAssociates + deferredTaxAssets;
                const totalAssets = totalCurrentAssets + totalNonCurrentAssets;

                const totalPayables = payables + accruedExp + customerAdvances;
                const totalCurrentLiabilities = totalPayables + shortTermLoans + dueToRelated + zakatProvision + leaseLiabilitiesCurrent;
                const totalNonCurrentLiabilities = longTermLoans + leaseLiabilitiesNonCurrent + endOfServiceProvision + deferredTaxLiabilities + otherProvisions;
                const totalLiabilities = totalCurrentLiabilities + totalNonCurrentLiabilities;

                const baseEquity = capital + sharePremium + statutoryReserve + retainedEarnings + otherComprehensiveIncome + treasuryShares;

                const netSales = revenueGoods + revenueServices + revenueOther - salesDiscounts;
                const totalCogs = cogsMaterials + cogsLabor + cogsOverhead + cogsDepreciation;
                const grossProfit = netSales - totalCogs;
                const totalOpex = opexSalaries + opexRent + opexMarketing + opexDepreciation + opexEcl + opexTravel;
                const operatingProfit = grossProfit - totalOpex; 
                const netIncomeBeforeZakat = operatingProfit + revenueFinance - financeCosts;
                const netIncome = netIncomeBeforeZakat - zakatTaxExpense; 

                const totalEquity = baseEquity + netIncome;

                const currentRatio = totalCurrentLiabilities > 0 ? (totalCurrentAssets / totalCurrentLiabilities).toFixed(2) : "0.00";
                const quickRatio = totalCurrentLiabilities > 0 ? ((totalCashAndEquivalents + netReceivables) / totalCurrentLiabilities).toFixed(2) : "0.00";
                const debtToEquity = totalEquity > 0 ? ((totalLiabilities / totalEquity) * 100).toFixed(1) : "0.0";
                const returnOnEquity = totalEquity > 0 ? ((netIncome / totalEquity) * 100).toFixed(1) : "0.0";
                const returnOnAssets = totalAssets > 0 ? ((netIncome / totalAssets) * 100).toFixed(1) : "0.0";

                const workingCapital = totalCurrentAssets - totalCurrentLiabilities;

                const dso = netSales > 0 ? Math.round((netReceivables / netSales) * 30) : 0; 
                const dio = totalCogs > 0 ? Math.round((totalInventory / totalCogs) * 30) : 0; 
                const dpo = totalCogs > 0 ? Math.round((payables / totalCogs) * 30) : 0; 
                const ccc = (dso + dio) - dpo; 

                return {
                    totalCashAndEquivalents, netReceivables, totalInventory, totalCurrentAssets,
                    netFixedAssets, netRightOfUse, totalNonCurrentAssets, totalAssets,
                    totalPayables, totalCurrentLiabilities, totalNonCurrentLiabilities, totalLiabilities,
                    baseEquity, totalEquity,
                    netSales, totalCogs, grossProfit, totalOpex, operatingProfit, netIncomeBeforeZakat, netIncome,
                    currentRatio, quickRatio, debtToEquity, returnOnEquity, returnOnAssets, workingCapital,
                    dso, dio, dpo, ccc,
                    cash, bank, stInvestments, receivables, eclAllowance, rawMaterials, wip, finishedGoods, prepaids, dueFromRelated,
                    lands, buildings, machinery, accumDepr, rightOfUseAssets, accumRightOfUseDepr, intangibleAssets, goodwill, investRealestate, investAssociates, deferredTaxAssets,
                    payables, accruedExp, customerAdvances, shortTermLoans, dueToRelated, zakatProvision, leaseLiabilitiesCurrent,
                    longTermLoans, leaseLiabilitiesNonCurrent, endOfServiceProvision, deferredTaxLiabilities, otherProvisions,
                    capital, sharePremium, statutoryReserve, retainedEarnings, otherComprehensiveIncome, treasuryShares,
                    revenueGoods, revenueServices, revenueOther, revenueFinance, salesDiscounts,
                    cogsMaterials, cogsLabor, cogsOverhead, cogsDepreciation,
                    opexSalaries, opexRent, opexMarketing, opexDepreciation, opexEcl, opexTravel,
                    financeCosts, zakatTaxExpense
                };
            };

            const finCurrent = calculateFinancialsForPeriod(currentPeriodId);
            const finCompare = calculateFinancialsForPeriod(comparePeriodId);

            const formatCurrency = (val) => {
                if (val === undefined || isNaN(val)) return "0 ريال";
                const absVal = Math.abs(val);
                const formatted = new Intl.NumberFormat('ar-SA', { style: 'decimal', maximumFractionDigits: 0 }).format(absVal);
                return val < 0 ? `(${formatted} ريال)` : `${formatted} ريال`;
            };

            const formatPercent = (val) => {
                if (isNaN(val) || !isFinite(val)) return "0.0%";
                return `${val > 0 ? '+' : ''}${val.toFixed(1)}%`;
            };

            const getDiff = (currentVal, compareVal) => currentVal - compareVal;

            const getPercentChange = (currentVal, compareVal) => {
                if (compareVal === 0) return currentVal > 0 ? 100 : 0;
                return (getDiff(currentVal, compareVal) / Math.abs(compareVal)) * 100;
            };

            const simulatedSales = finCurrent.netSales * (1 + simSalesGrowth / 100);
            const simulatedCogs = simulatedSales * (simCogsRatio / 100);
            const simulatedGrossProfit = simulatedSales - simulatedCogs;
            const simulatedOpex = simulatedSales * (simOpexRatio / 100);
            const simulatedEbit = simulatedGrossProfit - simulatedOpex;
            const simulatedNetIncome = simulatedEbit + finCurrent.revenueFinance - finCurrent.financeCosts - finCurrent.zakatTaxExpense;

            const downloadExcelTemplate = () => {
                const wsData = [
                    ["كود الحساب (Account Code)", "اسم الحساب - عربي (Account Name AR)", "الفترة المحاسبية (Period) مثل (2026-06)", "مدين (Debit)", "دائن (Credit)"]
                ];
                accounts.slice(0, 10).forEach(acc => {
                    wsData.push([acc.code, acc.nameAr, "2026-06", 0, 0]);
                });
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "IFRS Multi-Period Template");
                XLSX.writeFile(wb, `IFRS_Trial_Balance_Template_Unified.xlsx`);
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    const parsedBalances = [];
                    const parsedAccounts = [...accounts];
                    const parsedPeriods = [...periods];

                    for (let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if (row[0] && row[1]) {
                            const code = row[0].toString();
                            const nameAr = row[1];
                            const rawPeriod = row[2] ? row[2].toString().trim() : "2026-06";
                            const debit = parseFloat(row[3]) || 0;
                            const credit = parseFloat(row[4]) || 0;

                            if (!parsedAccounts.some(acc => acc.code === code)) {
                                parsedAccounts.push({
                                    id: `custom_${Date.now()}_${i}`,
                                    code: code,
                                    nameAr: nameAr,
                                    category: code.startsWith("1") ? "Assets" : code.startsWith("2") ? "Liabilities" : code.startsWith("3") ? "Equity" : code.startsWith("4") ? "Revenues" : "Expenses",
                                    subCategory: code.startsWith("11") ? "Current Assets" : code.startsWith("12") ? "Non-Current Assets" : code.startsWith("21") ? "Current Liabilities" : code.startsWith("22") ? "Non-Current Liabilities" : "Equity",
                                    isCustom: true
                                });
                            }

                            let periodObj = parsedPeriods.find(p => p.name === rawPeriod || p.id === rawPeriod);
                            if (!periodObj) {
                                const pId = `p_uploaded_${Date.now()}_${i}`;
                                periodObj = { id: pId, month: rawPeriod.split("-")[1] || "06", year: rawPeriod.split("-")[0] || "2026", name: rawPeriod };
                                parsedPeriods.push(periodObj);
                            }

                            parsedBalances.push({
                                entryId: `entry_${Date.now()}_${i}`,
                                accountCode: code,
                                periodId: periodObj.id,
                                debit: debit,
                                credit: credit
                            });
                        }
                    }

                    if (parsedBalances.length > 0) {
                        setAccounts(parsedAccounts);
                        setPeriods(parsedPeriods);
                        setBalances(prev => [...prev, ...parsedBalances]);
                        alert("تم استيراد ومعالجة ميزان المراجعة وتوزيع الأرصدة على الفترات المذكورة بنجاح!");
                        setCurrentView('dashboard');
                    } else {
                        alert("تنبيه: لم نتمكن من العثور على سجلات صالحة في الملف المرفوع. يرجى استخدام القالب المعتمد.");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleAddAccount = (e) => {
                e.preventDefault();
                if (!accountForm.code || !accountForm.nameAr) {
                    alert("يرجى ملء كافة الحقول الإلزامية.");
                    return;
                }
                
                if (modalMode === 'add') {
                    if (accounts.some(acc => acc.code === accountForm.code)) {
                        alert("كود الحساب هذا مسجل مسبقاً في الدليل الموحد.");
                        return;
                    }
                    const newAcc = {
                        id: `acc_${Date.now()}`,
                        code: accountForm.code,
                        nameAr: accountForm.nameAr,
                        category: accountForm.category,
                        subCategory: accountForm.subCategory,
                        isCustom: true
                    };
                    setAccounts(prev => [...prev, newAcc]);
                    alert("تم إضافة الحساب بنجاح لدليل الحسابات.");
                } else if (modalMode === 'edit') {
                    setAccounts(prev => prev.map(acc => acc.id === selectedAccountForEdit.id ? { ...acc, nameAr: accountForm.nameAr, category: accountForm.category, subCategory: accountForm.subCategory } : acc));
                    alert("تم تحديث بيانات الحساب بنجاح.");
                }
                setShowAccountModal(false);
                setAccountForm({ code: '', nameAr: '', category: 'Assets', subCategory: 'Current Assets' });
            };

            const handleDeleteAccount = (accId, accCode) => {
                if (confirm("هل أنت متأكد من رغبتك في حذف هذا الحساب؟ سيتم حذف كافة الأرصدة المرتبطة به في الفترات المختلفة.")) {
                    setAccounts(prev => prev.filter(acc => acc.id !== accId));
                    setBalances(prev => prev.filter(b => b.accountCode !== accCode));
                    alert("تم حذف الحساب وكافة أرصدته من ميزان المراجعة.");
                }
            };

            const handleClearAllBalances = () => {
                if (confirm("تحذير أمني: هل أنت متأكد من مسح وتصفير جميع أرصدة ميزان المراجعة المدخلة؟ (لن يتم حذف دليل الحسابات)")) {
                    setBalances([]);
                    alert("تم مسح كافة الأرصدة بنجاح، يمكنك الآن إدخال أو استيراد أرصدة جديدة.");
                }
            };

            const handleRestoreDefaults = () => {
                if(confirm("تحذير: هل تريد مسح بياناتك الحالية واستعادة البيانات الافتراضية التجريبية للمنصة؟")) {
                    setAccounts(initialAccounts);
                    setPeriods(initialPeriods);
                    setBalances(initialBalances);
                    setCurrentPeriodId("p6");
                    setComparePeriodId("p5");
                    alert("تمت استعادة البيانات التجريبية بنجاح.");
                }
            };

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            return (
                <div class="min-h-screen flex bg-slate-50/50 text-slate-800">
                    
                    {/* 1. القائمة الجانبية المحدثة (Sidebar) */}
                    <aside class="w-80 bg-slate-900 text-white flex flex-col justify-between shadow-xl transition-all duration-300 z-10 shrink-0">
                        <div>
                            {/* الشعار والهوية البصرية الاحترافية الفاخرة */}
                            <div class="p-6 border-b border-slate-800 flex items-center space-x-3 space-x-reverse">
                                <div class="bg-emerald-500 text-slate-900 p-2 rounded-xl shadow-lg shadow-emerald-500/20">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-base font-extrabold leading-none tracking-wide text-white">التحليل المالي والمقارن</h1>
                                    <span class="text-[10px] text-emerald-400 font-bold mt-1.5 block">معايير IFRS والتحليلات المقارنة</span>
                                </div>
                            </div>

                            {/* روابط التنقل السهلة المترابطة */}
                            <nav class="p-4 space-y-1.5">
                                <p class="text-[11px] font-bold text-slate-500 px-3 uppercase tracking-wider mb-2">مستويات الدراسة والتحليل</p>
                                
                                <button 
                                    onClick={() => setCurrentView('dashboard')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'dashboard' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                                    <span>لوحة الأداء والملخص العام</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('trial_balance_list')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'trial_balance_list' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="scale" class="w-5 h-5"></i>
                                    <span>ميزان المراجعة متعدد الفترات</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('statements')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'statements' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="book-open" class="w-5 h-5"></i>
                                    <span>القوائم المالية المقارنة</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ingestion')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ingestion' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="file-up" class="w-5 h-5"></i>
                                    <span>بوابة الرفع والدمج الموحد</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('ratios')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'ratios' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="percent" class="w-5 h-5"></i>
                                    <span>مركز النسب المالية المقارن</span>
                                </button>

                                <p class="text-[11px] font-bold text-slate-500 px-3 pt-4 uppercase tracking-wider mb-2">أدوات التخطيط والمخاطر</p>

                                <button 
                                    onClick={() => setCurrentView('risk')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'risk' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                                    <span>تقرير تقييم المخاطر المالي</span>
                                </button>

                                <button 
                                    onClick={() => setCurrentView('forecasting')}
                                    class={`w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all font-bold text-sm ${currentView === 'forecasting' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide="line-chart" class="w-5 h-5"></i>
                                    <span>محاكاة وتنبؤات التدفق النقدي</span>
                                </button>
                            </nav>
                        </div>
                        
                        <div class="p-6 border-t border-slate-800">
                            <div class="flex items-center space-x-3 space-x-reverse text-slate-400">
                                <div class="bg-slate-800 p-2 rounded-lg text-emerald-400">
                                    <i data-lucide="award" class="w-5 h-5"></i>
                                </div>
                                <div class="text-xs leading-relaxed">
                                    <p class="font-bold text-white">إشراف مهني معتمد:</p>
                                    <p class="text-slate-500 text-[10px]">خبير مالي معتمد - موازنة IFRS</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* 2. منطقة العمل الرئيسية (Main Area) تشمل الفلتر الموحد الجديد */}
                    <main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
                        
                        {/* شريط الأدوات العلوي والفلاتر المركزية الموحدة */}
                        <header class="bg-white border-b border-slate-200/80 px-8 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4 sticky top-0 z-20 shadow-sm">
                            <div>
                                <h2 class="text-lg font-bold text-slate-900">أدوات التحكم والفلترة الموحدة للمنصة</h2>
                                <p class="text-xs text-slate-500 mt-1">يتم تحديث لوحات التحكم والقوائم والنسب والتحليلات تلقائياً للربط المباشر بين الفترات</p>
                            </div>

                            {/* فلاتر الفترات الموحدة للربط على مستوى المنصة بالكامل */}
                            <div class="flex flex-wrap items-center gap-4">
                                <div class="flex items-center space-x-2 space-x-reverse">
                                    <label class="text-xs font-bold text-slate-600 whitespace-nowrap">الفترة الحالية (أ):</label>
                                    <select 
                                        value={currentPeriodId} 
                                        onChange={(e) => setCurrentPeriodId(e.target.value)}
                                        class="bg-slate-100 border border-slate-200 text-slate-800 rounded-lg text-xs px-3 py-2 font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                    >
                                        {periods.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div class="flex items-center space-x-2 space-x-reverse">
                                    <label class="text-xs font-bold text-slate-600 whitespace-nowrap">الفترة المقارنة (ب):</label>
                                    <select 
                                        value={comparePeriodId} 
                                        onChange={(e) => setComparePeriodId(e.target.value)}
                                        class="bg-slate-100 border border-slate-200 text-slate-800 rounded-lg text-xs px-3 py-2 font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                    >
                                        {periods.map(p => (
                                            <option key={p.id} value={p.id} disabled={p.id === currentPeriodId}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div class="h-6 w-[1px] bg-slate-300 hidden md:block"></div>

                                <span class="bg-emerald-50 text-emerald-700 text-[11px] font-bold px-2.5 py-1.5 rounded-full border border-emerald-200">
                                    مقارنة نشطة: {getPeriodName(currentPeriodId)} ضد {getPeriodName(comparePeriodId)}
                                </span>
                            </div>
                        </header>

                        {/* المساحة التفاعلية لعرض الشاشات والصفحات */}
                        <div class="p-8 flex-1">
                            
                            {/* شاشة لوحة الأداء والملخص العام (DASHBOARD) */}
                            {currentView === 'dashboard' && (
                                <div class="space-y-8 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">الملخص المالي العام للفترة</h3>
                                            <p class="text-slate-500 text-xs mt-1">البيانات الفنية الحالية لميزان المراجعة والأداء المالي والمقارن</p>
                                        </div>
                                        <div class="text-xs text-slate-400 font-bold bg-white px-4 py-2 rounded-xl shadow-sm border">
                                            معدل وفقاً لـ IFRS في {getPeriodName(currentPeriodId)}
                                        </div>
                                    </div>

                                    {/* بطاقات مؤشرات الأداء الأساسية KPIs المحدثة والمقارنة */}
                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100/80 flex justify-between items-center relative overflow-hidden">
                                            <div class="space-y-2">
                                                <span class="text-xs font-bold text-slate-500 block">صافي إيرادات المبيعات</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(finCurrent.netSales)}</h4>
                                                <span class="text-[11px] font-bold block">
                                                    <span class={getDiff(finCurrent.netSales, finCompare.netSales) >= 0 ? "text-emerald-500" : "text-red-500"}>
                                                        {formatPercent(getPercentChange(finCurrent.netSales, finCompare.netSales))}
                                                    </span>
                                                    <span class="text-slate-400 mr-1">عن الشهر المقارن</span>
                                                </span>
                                            </div>
                                            <div class="bg-emerald-50 text-emerald-600 p-3.5 rounded-xl">
                                                <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                                            </div>
                                        </div>

                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100/80 flex justify-between items-center relative overflow-hidden">
                                            <div class="space-y-2">
                                                <span class="text-xs font-bold text-slate-500 block">إجمالي هامش الربح</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(finCurrent.grossProfit)}</h4>
                                                <span class="text-[11px] font-bold block">
                                                    <span class={getDiff(finCurrent.grossProfit, finCompare.grossProfit) >= 0 ? "text-emerald-500" : "text-red-500"}>
                                                        {formatPercent(getPercentChange(finCurrent.grossProfit, finCompare.grossProfit))}
                                                    </span>
                                                    <span class="text-slate-400 mr-1">عن الشهر المقارن</span>
                                                </span>
                                            </div>
                                            <div class="bg-blue-50 text-blue-600 p-3.5 rounded-xl">
                                                <i data-lucide="percent" class="w-6 h-6"></i>
                                            </div>
                                        </div>

                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100/80 flex justify-between items-center relative overflow-hidden">
                                            <div class="space-y-2">
                                                <span class="text-xs font-bold text-slate-500 block">صافي ربح الفترة الحالية</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(finCurrent.netIncome)}</h4>
                                                <span class="text-[11px] font-bold block">
                                                    <span class={getDiff(finCurrent.netIncome, finCompare.netIncome) >= 0 ? "text-emerald-500" : "text-red-500"}>
                                                        {formatPercent(getPercentChange(finCurrent.netIncome, finCompare.netIncome))}
                                                    </span>
                                                    <span class="text-slate-400 mr-1">عن الشهر المقارن</span>
                                                </span>
                                            </div>
                                            <div class="bg-indigo-50 text-indigo-600 p-3.5 rounded-xl">
                                                <i data-lucide="briefcase" class="w-6 h-6"></i>
                                            </div>
                                        </div>

                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100/80 flex justify-between items-center relative overflow-hidden">
                                            <div class="space-y-2">
                                                <span class="text-xs font-bold text-slate-500 block">النقدية وما في حكمها</span>
                                                <h4 class="text-xl font-extrabold text-slate-900">{formatCurrency(finCurrent.totalCashAndEquivalents)}</h4>
                                                <span class="text-[11px] font-bold block">
                                                    <span class={getDiff(finCurrent.totalCashAndEquivalents, finCompare.totalCashAndEquivalents) >= 0 ? "text-emerald-500" : "text-red-500"}>
                                                        {formatPercent(getPercentChange(finCurrent.totalCashAndEquivalents, finCompare.totalCashAndEquivalents))}
                                                    </span>
                                                    <span class="text-slate-400 mr-1">عن الشهر المقارن</span>
                                                </span>
                                            </div>
                                            <div class="bg-amber-50 text-amber-600 p-3.5 rounded-xl">
                                                <i data-lucide="wallet" class="w-6 h-6"></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* لوحات التحليل البياني البصري المقارن */}
                                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                                            <h4 class="text-sm font-bold text-slate-900 mb-6 flex items-center gap-2">
                                                <i data-lucide="bar-chart-2" class="text-emerald-500 w-5 h-5"></i>
                                                تحليل اتجاهات الربحية ومقارنتها عبر الفترات المحددة
                                            </h4>
                                            
                                            {/* محاكاة رسم بياني SVG احترافي يوضح المقارنة بين فترتين لثلاثة عناصر أساسية */}
                                            <div class="h-64 flex flex-col justify-between">
                                                <div class="flex-1 flex items-end justify-around pb-4 border-b border-slate-100">
                                                    {/* إيرادات */}
                                                    <div class="flex flex-col items-center gap-2 w-1/4">
                                                        <div class="flex gap-1 items-end w-full justify-center">
                                                            <div class="w-8 bg-emerald-500 rounded-t-md transition-all duration-500" style={{ height: '140px' }} title={`الحالية: ${formatCurrency(finCurrent.netSales)}`}></div>
                                                            <div class="w-8 bg-emerald-200 rounded-t-md transition-all duration-500" style={{ height: '120px' }} title={`المقارنة: ${formatCurrency(finCompare.netSales)}`}></div>
                                                        </div>
                                                        <span class="text-xs font-bold text-slate-600 text-center">إجمالي الإيرادات</span>
                                                    </div>

                                                    {/* هامش الربح */}
                                                    <div class="flex flex-col items-center gap-2 w-1/4">
                                                        <div class="flex gap-1 items-end w-full justify-center">
                                                            <div class="w-8 bg-blue-500 rounded-t-md transition-all duration-500" style={{ height: '90px' }} title={`الحالية: ${formatCurrency(finCurrent.grossProfit)}`}></div>
                                                            <div class="w-8 bg-blue-200 rounded-t-md transition-all duration-500" style={{ height: '80px' }} title={`المقارنة: ${formatCurrency(finCompare.grossProfit)}`}></div>
                                                        </div>
                                                        <span class="text-xs font-bold text-slate-600 text-center">إجمالي هامش الربح</span>
                                                    </div>

                                                    {/* صافي الربح */}
                                                    <div class="flex flex-col items-center gap-2 w-1/4">
                                                        <div class="flex gap-1 items-end w-full justify-center">
                                                            <div class="w-8 bg-indigo-500 rounded-t-md transition-all duration-500" style={{ height: '60px' }} title={`الحالية: ${formatCurrency(finCurrent.netIncome)}`}></div>
                                                            <div class="w-8 bg-indigo-200 rounded-t-md transition-all duration-500" style={{ height: '40px' }} title={`المقارنة: ${formatCurrency(finCompare.netIncome)}`}></div>
                                                        </div>
                                                        <span class="text-xs font-bold text-slate-600 text-center">صافي الأرباح</span>
                                                    </div>
                                                </div>

                                                {/* دليل الرسم */}
                                                <div class="flex justify-center items-center gap-6 mt-4 text-xs font-bold text-slate-500">
                                                    <div class="flex items-center gap-1.5">
                                                        <div class="w-3.5 h-3.5 rounded bg-slate-800"></div>
                                                        <span>الفترة الحالية ({getPeriodName(currentPeriodId)})</span>
                                                    </div>
                                                    <div class="flex items-center gap-1.5">
                                                        <div class="w-3.5 h-3.5 rounded bg-slate-300"></div>
                                                        <span>الفترة المقارنة ({getPeriodName(comparePeriodId)})</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* المؤشرات السريعة وبنية الأصول والالتزامات */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                                            <div>
                                                <h4 class="text-sm font-bold text-slate-900 mb-6 flex items-center gap-2">
                                                    <i data-lucide="pie-chart" class="text-emerald-500 w-5 h-5"></i>
                                                    بنية هيكلية الميزانية العمومية
                                                </h4>
                                                <div class="space-y-4">
                                                    <div>
                                                        <div class="flex justify-between text-xs font-bold mb-1.5">
                                                            <span class="text-slate-600">الأصول المتداولة</span>
                                                            <span class="text-slate-900">{formatCurrency(finCurrent.totalCurrentAssets)}</span>
                                                        </div>
                                                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                            <div class="bg-emerald-500 h-full rounded-full" style={{ width: `${(finCurrent.totalCurrentAssets / finCurrent.totalAssets) * 100 || 0}%` }}></div>
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <div class="flex justify-between text-xs font-bold mb-1.5">
                                                            <span class="text-slate-600">الأصول غير المتداولة</span>
                                                            <span class="text-slate-900">{formatCurrency(finCurrent.totalNonCurrentAssets)}</span>
                                                        </div>
                                                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                            <div class="bg-blue-500 h-full rounded-full" style={{ width: `${(finCurrent.totalNonCurrentAssets / finCurrent.totalAssets) * 100 || 0}%` }}></div>
                                                        </div>
                                                    </div>

                                                    <div class="pt-4 border-t border-dashed">
                                                        <div class="flex justify-between text-xs font-bold mb-1.5">
                                                            <span class="text-slate-600">حقوق الملكية للمساهمين</span>
                                                            <span class="text-slate-900">{formatCurrency(finCurrent.totalEquity)}</span>
                                                        </div>
                                                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                            <div class="bg-indigo-500 h-full rounded-full" style={{ width: `${(finCurrent.totalEquity / finCurrent.totalAssets) * 100 || 0}%` }}></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="bg-slate-50 p-4 rounded-xl text-center border mt-6">
                                                <span class="text-[11px] font-bold text-slate-500 block mb-1">الربح كنسبة من المبيعات</span>
                                                <span class="text-lg font-black text-slate-900">
                                                    {finCurrent.netSales > 0 ? ((finCurrent.netIncome / finCurrent.netSales) * 100).toFixed(1) : "0"} %
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة ميزان المراجعة متعدد الفترات المحدثة بالكامل (TRIAL BALANCE LIST) */}
                            {currentView === 'trial_balance_list' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">ميزان المراجعة متعدد الفترات والتفاصيل</h3>
                                            <p class="text-slate-500 text-xs mt-1">تعديل وإضافة بنود ومسح أو تعديل الأرصدة المرتبطة بالفترة الحالية النشطة</p>
                                        </div>
                                        <div class="flex flex-wrap items-center gap-3">
                                            <button 
                                                onClick={handleClearAllBalances}
                                                class="bg-red-600 hover:bg-red-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2"
                                            >
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                مسح جميع الأرصدة
                                            </button>
                                            <button 
                                                onClick={() => { setModalMode('add'); setAccountForm({ code: '', nameAr: '', category: 'Assets', subCategory: 'Current Assets' }); setShowAccountModal(true); }}
                                                class="bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2"
                                            >
                                                <i data-lucide="plus" class="w-4 h-4"></i>
                                                إضافة حساب جديد
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    setBalanceForm({ accountCode: accounts[0]?.code || '', periodId: currentPeriodId, debit: 0, credit: 0 });
                                                    setShowBalanceModal(true);
                                                }}
                                                class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2"
                                            >
                                                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                                إدخال رصيد
                                            </button>
                                        </div>
                                    </div>

                                    {/* جدول عرض ميزان المراجعة المطور بالكامل والمبني على الفلاتر والفترة النشطة */}
                                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 overflow-hidden">
                                        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                                            <h4 class="text-xs font-extrabold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="list" class="text-emerald-500 w-4 h-4"></i>
                                                قائمة الأرصدة المعتمدة للفترة: {getPeriodName(currentPeriodId)}
                                            </h4>
                                            <span class="text-[10px] text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full font-bold border border-emerald-100">
                                                يتم الحفظ تلقائياً في الذاكرة
                                            </span>
                                        </div>

                                        <div class="overflow-x-auto">
                                            <table class="w-full text-right border-collapse">
                                                <thead>
                                                    <tr class="bg-slate-50 text-slate-500 text-xs font-bold border-b border-slate-200/60">
                                                        <th class="p-4">كود الحساب</th>
                                                        <th class="p-4">اسم الحساب (عربي)</th>
                                                        <th class="p-4 text-center">الفترة المحاسبية</th>
                                                        <th class="p-4 text-center">مدين</th>
                                                        <th class="p-4 text-center">دائن</th>
                                                        <th class="p-4 text-center">إجراءات التحكم</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-slate-100 text-xs">
                                                    {accounts.map(acc => {
                                                        const currentBal = balances.find(b => b.accountCode === acc.code && b.periodId === currentPeriodId);
                                                        const debitAmt = currentBal ? (parseFloat(currentBal.debit) || 0) : 0;
                                                        const creditAmt = currentBal ? (parseFloat(currentBal.credit) || 0) : 0;

                                                        return (
                                                            <tr key={acc.id} class="hover:bg-slate-50/50 transition-colors">
                                                                <td class="p-4 font-bold text-slate-900">{acc.code}</td>
                                                                <td class="p-4 font-semibold text-slate-700">
                                                                    {acc.nameAr}
                                                                    {acc.isCustom && <span class="mr-2 text-[9px] bg-amber-50 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded-full font-bold">مخصص</span>}
