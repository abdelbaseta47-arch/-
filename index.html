                                                        </tr>

                                                        <tr class="bg-slate-50/50 font-bold text-slate-900"><td colspan="4" class="p-4">التدفقات النقدية من الأنشطة الاستثمارية</td></tr>
                                                        <tr>
                                                            <td class="p-4 pr-8 text-red-600">(المدفوع) لشراء أصول ثابتة وملموسة</td>
                                                            <td class="p-4 text-center">({formatCurrency(Math.abs(cashFlowAnalysis.changeInFixedAssets))})</td>
                                                            <td class="p-4 text-center text-slate-400">---</td>
                                                            <td class="p-4 text-center text-blue-600">---</td>
                                                        </tr>
                                                        <tr class="bg-slate-100 text-slate-900 font-extrabold">
                                                            <td class="p-4">صافي التدفق النقدي (المستخدم) في الاستثمار</td>
                                                            <td class="p-4 text-center text-red-600">({formatCurrency(Math.abs(cashFlowAnalysis.totalInvestingCashFlow))})</td>
                                                            <td class="p-4 text-center text-slate-400">---</td>
                                                            <td class="p-4 text-center text-blue-600">---</td>
                                                        </tr>

                                                        <tr class="bg-slate-50/50 font-bold text-slate-900"><td colspan="4" class="p-4">التدفقات النقدية من الأنشطة التمويلية</td></tr>
                                                        <tr>
                                                            <td class="p-4 pr-8">المتحصلات من/(المسدد لـ) القروض والتسهيلات</td>
                                                            <td class="p-4 text-center text-indigo-600">{formatCurrency(cashFlowAnalysis.changeInLoans)}</td>
                                                            <td class="p-4 text-center text-slate-400">---</td>
                                                            <td class="p-4 text-center text-blue-600">---</td>
                                                        </tr>
                                                        <tr class="bg-slate-100 text-slate-900 font-extrabold">
                                                            <td class="p-4">صافي التدفق النقدي من التمويل</td>
                                                            <td class="p-4 text-center text-indigo-600">{formatCurrency(cashFlowAnalysis.totalFinancingCashFlow)}</td>
                                                            <td class="p-4 text-center text-slate-400">---</td>
                                                            <td class="p-4 text-center text-blue-600">---</td>
                                                        </tr>

                                                        <tr class="bg-slate-900 text-white font-extrabold text-base">
                                                            <td class="p-4">صافي الزيادة / (النقص) في النقدية</td>
                                                            <td class="p-4 text-center text-amber-400">{formatCurrency(cashFlowAnalysis.netCashChange)}</td>
                                                            <td class="p-4 text-center text-slate-400">---</td>
                                                            <td class="p-4 text-center text-amber-400">---</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            )}

                                            {/* (د) جدول التغير في حقوق الملكية */}
                                            {activeStatementTab === 'equity' && (
                                                <table class="w-full text-right border-collapse text-xs">
                                                    <thead>
                                                        <tr class="bg-slate-50 text-slate-500 font-bold border-b border-slate-200/60">
                                                            <th class="p-4 w-1/3">عناصر حقوق الملكية</th>
                                                            <th class="p-4 text-center">{getPeriodName(currentPeriodId)}</th>
                                                            <th class="p-4 text-center">{getPeriodName(comparePeriodId)}</th>
                                                            <th class="p-4 text-center text-blue-600">التغير (التوزيعات/الإضافات)</th>
                                                            <th class="p-4 text-center text-emerald-600">نسبة التغير %</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-100 font-semibold text-slate-700">
                                                        <tr>
                                                            <td class="p-4">رأس المال المصدر والمدفوع</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.capital)}</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCompare.capital)}</td>
                                                            <td class="p-4 text-center text-blue-600">{formatCurrency(getDiff(finCurrent.capital, finCompare.capital))}</td>
                                                            <td class="p-4 text-center text-emerald-600">{formatPercent(getPercentChange(finCurrent.capital, finCompare.capital))}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4">علاوة الإصدار</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.sharePremium)}</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCompare.sharePremium)}</td>
                                                            <td class="p-4 text-center text-blue-600">{formatCurrency(getDiff(finCurrent.sharePremium, finCompare.sharePremium))}</td>
                                                            <td class="p-4 text-center text-emerald-600">{formatPercent(getPercentChange(finCurrent.sharePremium, finCompare.sharePremium))}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4">الاحتياطي النظامي الإلزامي</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.statutoryReserve)}</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCompare.statutoryReserve)}</td>
                                                            <td class="p-4 text-center text-blue-600">{formatCurrency(getDiff(finCurrent.statutoryReserve, finCompare.statutoryReserve))}</td>
                                                            <td class="p-4 text-center text-emerald-600">{formatPercent(getPercentChange(finCurrent.statutoryReserve, finCompare.statutoryReserve))}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4">احتياطي الدخل الشامل الآخر</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.otherComprehensiveIncome)}</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCompare.otherComprehensiveIncome)}</td>
                                                            <td class="p-4 text-center text-blue-600">{formatCurrency(getDiff(finCurrent.otherComprehensiveIncome, finCompare.otherComprehensiveIncome))}</td>
                                                            <td class="p-4 text-center text-emerald-600">{formatPercent(getPercentChange(finCurrent.otherComprehensiveIncome, finCompare.otherComprehensiveIncome))}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4">الأرباح المبقاة (رصيد أول) + أرباح الفترة</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.retainedEarnings + finCurrent.netIncome)}</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCompare.retainedEarnings + finCompare.netIncome)}</td>
                                                            <td class="p-4 text-center text-blue-600">{formatCurrency(getDiff(finCurrent.retainedEarnings + finCurrent.netIncome, finCompare.retainedEarnings + finCompare.netIncome))}</td>
                                                            <td class="p-4 text-center text-emerald-600">{formatPercent(getPercentChange(finCurrent.retainedEarnings + finCurrent.netIncome, finCompare.retainedEarnings + finCompare.netIncome))}</td>
                                                        </tr>
                                                        <tr class="bg-slate-900 text-white font-extrabold text-base">
                                                            <td class="p-4">إجمالي حقوق الملكية في نهاية الفترة</td>
                                                            <td class="p-4 text-center text-emerald-400">{formatCurrency(finCurrent.totalEquity)}</td>
                                                            <td class="p-4 text-center text-slate-300">{formatCurrency(finCompare.totalEquity)}</td>
                                                            <td class="p-4 text-center text-emerald-400">{formatCurrency(getDiff(finCurrent.totalEquity, finCompare.totalEquity))}</td>
                                                            <td class="p-4 text-center text-emerald-400">{formatPercent(getPercentChange(finCurrent.totalEquity, finCompare.totalEquity))}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة بوابة الرفع والمطابقة (INGESTION) */}
                            {currentView === 'ingestion' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">بوابة رفع البيانات ومطابقة الأرصدة</h3>
                                            <p class="text-slate-500 text-xs mt-1">تعديل الأرصدة ورفع موازين المراجعة متعددة الفترات لدمجها تفاعلياً في النظام بالكامل</p>
                                        </div>
                                        <div class="flex flex-wrap items-center gap-3">
                                            <button 
                                                onClick={handleRestoreDefaults}
                                                class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs px-4 py-2.5 rounded-xl shadow-sm transition-all flex items-center gap-2 border border-slate-300"
                                            >
                                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                                                استعادة البيانات التجريبية
                                            </button>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 text-center space-y-6 flex flex-col justify-between">
                                            <div class="space-y-4">
                                                <div class="bg-emerald-50 text-emerald-600 p-4 rounded-full w-16 h-16 flex items-center justify-center mx-auto">
                                                    <i data-lucide="file-spreadsheet" class="w-8 h-8"></i>
                                                </div>
                                                <h4 class="text-base font-bold text-slate-900">تحديث واستيراد البيانات من Excel</h4>
                                                <p class="text-xs text-slate-500 max-w-sm mx-auto leading-relaxed">
                                                    استيراد ملف إكسل ميزان المراجعة متعدد الشهور وتوطينه بشكل متطابق مع معايير ومسميات المنصة الموحدة.
                                                </p>
                                            </div>

                                            <div class="space-y-4 pt-4 border-t">
                                                <button 
                                                    onClick={downloadExcelTemplate}
                                                    class="text-xs font-bold text-emerald-600 hover:text-emerald-700 block mx-auto flex items-center gap-1.5 justify-center"
                                                >
                                                    <i data-lucide="download" class="w-4 h-4"></i>
                                                    تحميل قالب الإدخال الموحد (.xlsx)
                                                </button>

                                                <label class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-6 py-3 rounded-xl cursor-pointer shadow-md inline-block transition-all">
                                                    اختيار ملف ميزان المراجعة ورفعه
                                                    <input 
                                                        type="file" 
                                                        accept=".xlsx, .xls" 
                                                        onChange={handleExcelUpload} 
                                                        class="hidden" 
                                                    />
                                                </label>
                                            </div>
                                        </div>

                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="database" class="text-emerald-500 w-5 h-5"></i>
                                                إحصائيات وقوة قاعدة البيانات الحالية
                                            </h4>

                                            <div class="grid grid-cols-2 gap-4 font-sans">
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">عدد الفترات المحاسبية</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{periods.length} فترات تاريخية</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">إجمالي الحسابات المعرفة</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{accounts.length} حساب IFRS</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">قيود الأرصدة المسجلة</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{balances.length} قيد مالي</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">موازنة ميزان المراجعة</span>
                                                    <span class="text-xs font-bold text-emerald-600 block mt-1">متزن بالكامل 100%</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة مركز النسب المالية المقارن الشامل (RATIOS) */}
                            {currentView === 'ratios' && (
                                <div class="space-y-8 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">مركز النسب المالية والتحليل المقارن</h3>
                                            <p class="text-slate-500 text-xs mt-1">تغطية شاملة لمؤشرات السيولة، المديونية، كفاءة التشغيل، والربحية للوقوف على الأداء المالي</p>
                                        </div>
                                    </div>

                                    {/* 1. نسب السيولة */}
                                    <div class="space-y-4">
                                        <h4 class="text-sm font-bold text-slate-900 border-b pb-2">1. نسب السيولة النقدية (Liquidity Ratios)</h4>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 font-sans">
                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">نسبة التداول (Current Ratio)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-slate-900">{finCurrent.currentRatio} مرة</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.currentRatio}</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">الأصول المتداولة / الالتزامات المتداولة</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">نسبة السيولة السريعة (Quick Ratio)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-slate-900">{finCurrent.quickRatio} مرة</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.quickRatio}</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">(الأصول المتداولة - المخزون) / الالتزامات المتداولة</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">نسبة النقدية (Cash Ratio)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-slate-900">{finCurrent.cashRatio} مرة</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.cashRatio}</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">النقد وشبه النقد / الالتزامات المتداولة</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 2. نسب الربحية */}
                                    <div class="space-y-4">
                                        <h4 class="text-sm font-bold text-slate-900 border-b pb-2">2. نسب ومؤشرات الربحية (Profitability Ratios)</h4>
                                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 font-sans">
                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">هامش إجمالي الربح</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-emerald-600">{finCurrent.grossProfitMargin}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">السابق: {finCompare.grossProfitMargin}%</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">هامش صافي الربح</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-emerald-600">{finCurrent.netProfitMargin}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">السابق: {finCompare.netProfitMargin}%</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">العائد على الأصول (ROA)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-blue-600">{finCurrent.returnOnAssets}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">السابق: {finCompare.returnOnAssets}%</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">العائد على حقوق الملكية (ROE)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-indigo-600">{finCurrent.returnOnEquity}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">السابق: {finCompare.returnOnEquity}%</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 3. المديونية والرفع المالي */}
                                    <div class="space-y-4">
                                        <h4 class="text-sm font-bold text-slate-900 border-b pb-2">3. نسب المديونية والملاءة المالية (Solvency & Leverage)</h4>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 font-sans">
                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">الديون إلى حقوق الملكية (D/E)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-red-600">{finCurrent.debtToEquity}%</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.debtToEquity}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">إجمالي الالتزامات / حقوق الملكية</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">نسبة المديونية للأصول</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-amber-600">{finCurrent.debtToAssets}%</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.debtToAssets}%</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">إجمالي الالتزامات / إجمالي الأصول</p>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-xs font-bold text-slate-500">معدل تغطية الفوائد (ICR)</span>
                                                </div>
                                                <div class="flex items-baseline gap-3">
                                                    <span class="text-2xl font-black text-slate-900">{finCurrent.interestCoverage} مرة</span>
                                                    <span class="text-[10px] text-slate-400">السابق: {finCompare.interestCoverage}</span>
                                                </div>
                                                <p class="text-[10px] text-slate-400">الربح التشغيلي (EBIT) / المصاريف التمويلية</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            )}

                            {/* شاشة تقييم المخاطر المالي والتنبيهات المترابطة (RISK) */}
                            {currentView === 'risk' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">تقرير المخاطر والتنبيهات التشغيلية</h3>
                                            <p class="text-slate-500 text-xs mt-1">تحديد نقاط الضعف والمخاطر لتدقيق الحسابات وسلامة المركز المالي في الفترة الحالية</p>
                                        </div>
                                    </div>

                                    {/* بطاقات تحليل المخاطر */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 font-sans">
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="shield-alert" class="text-red-500 w-5 h-5"></i>
                                                تحليل مستويات المخاطر الهيكلية للسيولة
                                            </h4>

                                            <div class="space-y-4">
                                                <div class="flex justify-between items-center p-4 rounded-xl bg-slate-50 border">
                                                    <div>
                                                        <span class="text-xs font-bold text-slate-900 block">فجوة رأس المال العامل</span>
                                                        <span class="text-[10px] text-slate-500">الأصول المتداولة - الالتزامات المتداولة</span>
                                                    </div>
                                                    <span class="text-xs font-extrabold text-slate-800">{formatCurrency(finCurrent.workingCapital)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة التنبؤات والتدفقات النقدية المستقبلية المطورة (FORECASTING) */}
                            {currentView === 'forecasting' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900 font-sans">محاكاة وتنبؤات الأرباح وقائمة الدخل التقديرية</h3>
                                            <p class="text-slate-500 text-xs mt-1">لوحة تفاعلية لمحاكاة أثر التغيرات التشغيلية على مسار الأرباح (Pro-forma Income Statement)</p>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        {/* أدوات التحكم والتحريك */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-8 h-fit sticky top-24">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2 pb-2 border-b">
                                                <i data-lucide="sliders" class="text-emerald-500 w-5 h-5"></i>
                                                مؤشرات المحاكاة المتوقعة (Drivers)
                                            </h4>

                                            <div class="space-y-6">
                                                <div class="space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-700">معدل نمو المبيعات (Sales Growth):</span>
                                                        <span class="text-emerald-600 bg-emerald-50 px-2 rounded">{simSalesGrowth}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="-50" 
                                                        max="100" 
                                                        value={simSalesGrowth}
                                                        onChange={(e) => setSimSalesGrowth(parseInt(e.target.value))}
                                                        class="w-full accent-emerald-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                                    />
                                                </div>

                                                <div class="space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-700">تكلفة البضاعة كنسبة من البيع (COGS %):</span>
                                                        <span class="text-amber-600 bg-amber-50 px-2 rounded">{simCogsRatio}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="10" 
                                                        max="90" 
                                                        value={simCogsRatio}
                                                        onChange={(e) => setSimCogsRatio(parseInt(e.target.value))}
                                                        class="w-full accent-amber-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                                    />
                                                </div>

                                                <div class="space-y-3">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-700">المصاريف الإدارية كنسبة (OPEX %):</span>
                                                        <span class="text-blue-600 bg-blue-50 px-2 rounded">{simOpexRatio}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="5" 
                                                        max="60" 
                                                        value={simOpexRatio}
                                                        onChange={(e) => setSimOpexRatio(parseInt(e.target.value))}
                                                        class="w-full accent-blue-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                                    />
                                                </div>
                                            </div>
                                            
                                            <div class="p-4 bg-slate-50 border rounded-xl text-[10px] text-slate-500 leading-relaxed font-semibold">
                                                يتم بناء قائمة الدخل التقديرية بناءً على الأرصدة الحالية للفترة النشطة (<strong>{getPeriodName(currentPeriodId)}</strong>) وتطبيق معدلات التغير المفترضة أعلاه لقياس أثرها المباشر على الربحية النهائية.
                                            </div>
                                        </div>

                                        {/* قائمة الدخل التقديرية (Pro-forma) */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 lg:col-span-2 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2 pb-2 border-b">
                                                <i data-lucide="calculator" class="text-indigo-500 w-5 h-5"></i>
                                                قائمة الدخل التقديرية (Pro-forma Income Statement)
                                            </h4>

                                            <div class="overflow-x-auto font-sans">
                                                <table class="w-full text-right text-xs">
                                                    <thead>
                                                        <tr class="bg-slate-100 text-slate-600 font-bold">
                                                            <th class="p-4 rounded-r-lg w-1/3">البيان المالي</th>
                                                            <th class="p-4 text-center">الفعلي (الفترة الحالية)</th>
                                                            <th class="p-4 text-center rounded-l-lg text-emerald-700 bg-emerald-50">المتوقع (السيناريو)</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-100 font-semibold text-slate-700">
                                                        <tr>
                                                            <td class="p-4">إجمالي المبيعات والإيرادات</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.netSales)}</td>
                                                            <td class="p-4 text-center text-emerald-700 bg-emerald-50/30">{formatCurrency(simulatedSales)}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4 text-red-600">يخصم: تكلفة البضاعة المباعة</td>
                                                            <td class="p-4 text-center">({formatCurrency(finCurrent.totalCogs)})</td>
                                                            <td class="p-4 text-center text-amber-700 bg-emerald-50/30">({formatCurrency(simulatedCogs)})</td>
                                                        </tr>
                                                        <tr class="bg-slate-50 font-bold">
                                                            <td class="p-4 text-slate-900">إجمالي مجمل الربح</td>
                                                            <td class="p-4 text-center text-slate-900">{formatCurrency(finCurrent.grossProfit)}</td>
                                                            <td class="p-4 text-center text-emerald-700 bg-emerald-50/50">{formatCurrency(simulatedGrossProfit)}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4 text-red-600">يخصم: المصاريف التشغيلية والإدارية</td>
                                                            <td class="p-4 text-center">({formatCurrency(finCurrent.totalOpex)})</td>
                                                            <td class="p-4 text-center text-amber-700 bg-emerald-50/30">({formatCurrency(simulatedOpex)})</td>
                                                        </tr>
                                                        <tr class="bg-slate-50 font-bold">
                                                            <td class="p-4 text-slate-900">الربح التشغيلي (EBIT)</td>
                                                            <td class="p-4 text-center text-slate-900">{formatCurrency(finCurrent.operatingProfit)}</td>
                                                            <td class="p-4 text-center text-emerald-700 bg-emerald-50/50">{formatCurrency(simulatedEbit)}</td>
                                                        </tr>
                                                        <tr>
                                                            <td class="p-4">إيرادات وتكاليف تمويلية وزكاة (ثابتة)</td>
                                                            <td class="p-4 text-center text-slate-400">({formatCurrency(finCurrent.financeCosts + finCurrent.zakatTaxExpense - finCurrent.revenueFinance)})</td>
                                                            <td class="p-4 text-center text-slate-400 bg-emerald-50/30">({formatCurrency(finCurrent.financeCosts + finCurrent.zakatTaxExpense - finCurrent.revenueFinance)})</td>
                                                        </tr>
                                                        <tr class="bg-slate-900 text-white font-extrabold text-sm">
                                                            <td class="p-4 rounded-r-lg">صافي الربــح المقدر</td>
                                                            <td class="p-4 text-center">{formatCurrency(finCurrent.netIncome)}</td>
                                                            <td class="p-4 text-center text-emerald-400 bg-emerald-900/50 rounded-l-lg">{formatCurrency(simulatedNetIncome)}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                            
                                            {/* ملخص الانحراف */}
                                            <div class="mt-6 flex items-center justify-between p-4 bg-indigo-50 border border-indigo-100 rounded-xl">
                                                <div class="flex items-center gap-3">
                                                    <div class="bg-white p-2 rounded-lg text-indigo-600 shadow-sm"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
                                                    <div>
                                                        <p class="text-xs font-bold text-slate-800">الانحراف التقديري في صافي الربح</p>
                                                        <p class="text-[10px] text-slate-500 font-semibold mt-0.5">التأثير الإجمالي لتغيير مدخلات ومعدلات التشغيل</p>
                                                    </div>
                                                </div>
                                                <div class="text-left">
                                                    <p class={`text-lg font-black ${simulatedNetIncome >= finCurrent.netIncome ? 'text-emerald-600' : 'text-red-600'}`}>
                                                        {simulatedNetIncome >= finCurrent.netIncome ? '+' : ''}{formatCurrency(simulatedNetIncome - finCurrent.netIncome)}
                                                    </p>
                                                    <p class={`text-xs font-bold ${simulatedNetIncome >= finCurrent.netIncome ? 'text-emerald-500' : 'text-red-500'}`}>
                                                        {formatPercent(getPercentChange(simulatedNetIncome, finCurrent.netIncome))}
                                                    </p>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* نافذة منبثقة تفاعلية (Modal) لإضافة أو تعديل الحسابات بدليل الحسابات */}
                    {showAccountModal && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 fade-in p-4">
                            <div class="bg-white rounded-2xl shadow-xl border w-full max-w-lg overflow-hidden">
                                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h4 class="text-sm font-bold">{modalMode === 'add' ? 'إضافة حساب جديد لدليل الحسابات الموحد' : 'تعديل بيانات تصنيف واسم الحساب'}</h4>
                                    <button onClick={() => setShowAccountModal(false)} class="text-slate-400 hover:text-white font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleAddAccount} class="p-6 space-y-4">
                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">كود الحساب (رقمي فريد):</label>
                                        <input 
                                            type="text" 
                                            disabled={modalMode === 'edit'}
                                            value={accountForm.code} 
                                            onChange={(e) => setAccountForm({ ...accountForm, code: e.target.value })}
                                            placeholder="مثل 1114"
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold disabled:opacity-60"
                                            required
                                        />
                                    </div>

                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">اسم الحساب بالعربية:</label>
                                        <input 
                                            type="text" 
                                            value={accountForm.nameAr} 
                                            onChange={(e) => setAccountForm({ ...accountForm, nameAr: e.target.value })}
                                            placeholder="اسم الحساب باللغة العربية"
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold"
                                            required
                                        />
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">الفئة الرئيسية:</label>
                                            <select 
                                                value={accountForm.category} 
                                                onChange={(e) => setAccountForm({ ...accountForm, category: e.target.value })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                            >
                                                <option value="Assets">الأصول (Assets)</option>
                                                <option value="Liabilities">الالتزامات (Liabilities)</option>
                                                <option value="Equity">حقوق الملكية (Equity)</option>
                                                <option value="Revenues">الإيرادات (Revenues)</option>
                                                <option value="Expenses">المصروفات (Expenses)</option>
                                            </select>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">التصنيف الفرعي:</label>
                                            <select 
                                                value={accountForm.subCategory} 
                                                onChange={(e) => setAccountForm({ ...accountForm, subCategory: e.target.value })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                            >
                                                <option value="Current Assets">الأصول المتداولة</option>
                                                <option value="Non-Current Assets">الأصول غير المتداولة</option>
                                                <option value="Current Liabilities">الالتزامات المتداولة</option>
                                                <option value="Non-Current Liabilities">الالتزامات غير المتداولة</option>
                                                <option value="Equity">حقوق الملكية</option>
                                                <option value="Revenues">الإيرادات</option>
                                                <option value="COGS">تكلفة المبيعات</option>
                                                <option value="OPEX">مصاريف تشغيلية</option>
                                                <option value="Finance">مصاريف تمويلية</option>
                                                <option value="Tax">مصروف زكاة وضريبة</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="pt-4 border-t flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowAccountModal(false)} class="bg-slate-100 font-bold text-xs px-5 py-2.5 rounded-xl border">إلغاء</button>
                                        <button type="submit" class="bg-slate-900 text-white font-bold text-xs px-6 py-2.5 rounded-xl shadow-md">{modalMode === 'add' ? 'إضافة للحسابات' : 'حفظ التعديلات'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* نافذة منبثقة تفاعلية (Modal) لإدخال رصيد ميزان المراجعة لفترة محاسبية معينة أو تعديله */}
                    {showBalanceModal && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 fade-in p-4">
                            <div class="bg-white rounded-2xl shadow-xl border w-full max-w-lg overflow-hidden">
                                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h4 class="text-sm font-bold font-sans">إدخال أو تعديل رصيد ميزان المراجعة</h4>
                                    <button onClick={() => setShowBalanceModal(false)} class="text-slate-400 hover:text-white font-bold">&times;</button>
                                </div>
                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        const existsIndex = balances.findIndex(b => b.accountCode === balanceForm.accountCode && b.periodId === balanceForm.periodId);
                                        const newEntry = {
                                            entryId: existsIndex >= 0 ? balances[existsIndex].entryId : `entry_${Date.now()}`,
                                            accountCode: balanceForm.accountCode,
                                            periodId: balanceForm.periodId,
                                            debit: parseFloat(balanceForm.debit) || 0,
                                            credit: parseFloat(balanceForm.credit) || 0
                                        };

                                        if (existsIndex >= 0) {
                                            const updated = [...balances];
                                            updated[existsIndex] = newEntry;
                                            setBalances(updated);
                                        } else {
                                            setBalances(prev => [...prev, newEntry]);
                                        }

                                        showToast("تم تسجيل وتحديث الرصيد بنجاح!", "success");
                                        setShowBalanceModal(false);
                                    }} 
                                    class="p-6 space-y-4"
                                >
                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">الحساب المعني:</label>
                                        <select 
                                            value={balanceForm.accountCode} 
                                            onChange={(e) => setBalanceForm({ ...balanceForm, accountCode: e.target.value })}
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                        >
                                            {accounts.map(acc => (
                                                <option key={acc.id} value={acc.code}>{acc.code} - {acc.nameAr}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">الفترة المحاسبية:</label>
                                        <select 
                                            value={balanceForm.periodId} 
                                            onChange={(e) => setBalanceForm({ ...balanceForm, periodId: e.target.value })}
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold"
                                        >
                                            {periods.map(p => (
                                                <option key={p.id} value={p.id}>{p.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">رصيد مدين:</label>
                                            <input 
                                                type="number" 
                                                value={balanceForm.debit} 
                                                onChange={(e) => setBalanceForm({ ...balanceForm, debit: parseFloat(e.target.value) || 0 })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold text-emerald-600"
                                            />
                                        </div>

                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">رصيد دائن:</label>
                                            <input 
                                                type="number" 
                                                value={balanceForm.credit} 
                                                onChange={(e) => setBalanceForm({ ...balanceForm, credit: parseFloat(e.target.value) || 0 })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold text-red-600"
                                            />
                                        </div>
                                    </div>

                                    <div class="pt-4 border-t flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowBalanceModal(false)} class="bg-slate-100 font-bold text-xs px-5 py-2.5 rounded-xl border">إلغاء</button>
                                        <button type="submit" class="bg-slate-900 text-white font-bold text-xs px-6 py-2.5 rounded-xl shadow-md">تحديث الرصيد</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // تشغيل تطبيق الـ React في بيئة الـ DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
