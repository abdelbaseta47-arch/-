                                        </div>
                                        <div class="flex flex-wrap items-center gap-3">
                                            <button 
                                                onClick={handleRestoreDefaults}
                                                class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs px-4 py-2.5 rounded-xl shadow-sm transition-all flex items-center gap-2 border border-slate-300"
                                            >
                                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                                                استعادة البيانات التجريبية
                                            </button>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {/* خيار رفع ملف Excel */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 text-center space-y-6 flex flex-col justify-between">
                                            <div class="space-y-4">
                                                <div class="bg-emerald-50 text-emerald-600 p-4 rounded-full w-16 h-16 flex items-center justify-center mx-auto">
                                                    <i data-lucide="file-spreadsheet" class="w-8 h-8"></i>
                                                </div>
                                                <h4 class="text-base font-bold text-slate-900">تحديث واستيراد البيانات من Excel</h4>
                                                <p class="text-xs text-slate-500 max-w-sm mx-auto leading-relaxed">
                                                    يمكنك استيراد ملف إكسل يحتوي على عدة أشهر لتحديث ميزان المراجعة بالكامل. يجب أن يحتوي الملف على كود الحساب، الاسم، الرصيد، والفترة.
                                                </p>
                                            </div>

                                            <div class="space-y-4 pt-4 border-t">
                                                <button 
                                                    onClick={downloadExcelTemplate}
                                                    class="text-xs font-bold text-emerald-600 hover:text-emerald-700 block mx-auto flex items-center gap-1.5 justify-center"
                                                >
                                                    <i data-lucide="download" class="w-4 h-4"></i>
                                                    تحميل قالب الإدخال الموحد (.xlsx)
                                                </button>

                                                <label class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-6 py-3 rounded-xl cursor-pointer shadow-md inline-block transition-all">
                                                    اختيار ملف ميزان المراجعة ورفعه
                                                    <input 
                                                        type="file" 
                                                        accept=".xlsx, .xls" 
                                                        onChange={handleExcelUpload} 
                                                        class="hidden" 
                                                    />
                                                </label>
                                            </div>
                                        </div>

                                        {/* ملخص احصاءات قاعدة البيانات المدمجة */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="database" class="text-emerald-500 w-5 h-5"></i>
                                                إحصائيات وقوة قاعدة البيانات الحالية
                                            </h4>

                                            <div class="grid grid-cols-2 gap-4">
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">عدد الفترات المحاسبية</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{periods.length} فترات تاريخية</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">إجمالي الحسابات المعرفة</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{accounts.length} حساب IFRS</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">قيود الأرصدة المسجلة</span>
                                                    <span class="text-lg font-extrabold text-slate-900">{balances.length} قيد مالي</span>
                                                </div>

                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <span class="text-[11px] font-bold text-slate-500 block mb-1">موازنة ميزان المراجعة</span>
                                                    <span class="text-xs font-bold text-emerald-600 block mt-1">متزن بالكامل 100%</span>
                                                </div>
                                            </div>

                                            <div class="text-xs text-slate-500 leading-relaxed bg-amber-50/50 p-4 rounded-xl border border-amber-100">
                                                <strong>ملاحظة للمدقق:</strong> يتم حفظ بياناتك ومطابقة القيود آلياً بشكل فوري لكل فترة محاسبية في ذاكرة المتصفح.
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة مركز النسب المالية المقارن (RATIOS) */}
                            {currentView === 'ratios' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">مركز النسب المالية والتحليل المقارن</h3>
                                            <p class="text-slate-500 text-xs mt-1">دراسة تحليلية لمؤشرات السيولة، المديونية، كفاءة التشغيل، والعوائد عبر الفترات المحددة</p>
                                        </div>
                                    </div>

                                    {/* بطاقات النسب المقارنة */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {/* 1. نسبة السيولة المتداولة */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">نسبة التداول (Current Ratio)</span>
                                                <span class="bg-emerald-50 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-100">السيولة</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.currentRatio}</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.currentRatio} للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                تقيس قدرة الأصول المتداولة للوفاء بالالتزامات المتداولة خلال سنة. المعيار الآمن عموماً هو 1.5 إلى 2.
                                            </p>
                                        </div>

                                        {/* 2. نسبة السيولة السريعة */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">السيولة السريعة (Quick Ratio)</span>
                                                <span class="bg-emerald-50 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-100">السيولة</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.quickRatio}</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.quickRatio} للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                تستثني المخزون نظراً لصعوبة تسييله السريع لتقدير المتانة النقدية الحالية بشكل أدق.
                                            </p>
                                        </div>

                                        {/* 3. العائد على حقوق الملكية */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">العائد على حقوق الملكية (ROE)</span>
                                                <span class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-blue-100">الربحية</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.returnOnEquity}%</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.returnOnEquity}% للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                يوضح كفاءة تشغيل واستثمار أموال الملاك والمساهمين لتحقيق صافي أرباح.
                                            </p>
                                        </div>

                                        {/* 4. كفاءة تحصيل العملاء DSO */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">فترة تحصيل المستحقات والعملاء</span>
                                                <span class="bg-amber-50 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-amber-100">الكفاءة التشغيلية</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.dso} يوم</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.dso} يوم للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                متوسط الأيام اللازمة لتحصيل النقدية من مبيعات الآجل للعملاء.
                                            </p>
                                        </div>

                                        {/* 5. دورة بقاء المخزون DIO */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">فترة الاحتفاظ بالمخزون</span>
                                                <span class="bg-amber-50 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-amber-100">الكفاءة التشغيلية</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.dio} يوم</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.dio} يوم للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                يقيس متوسط فترة بقاء السلع بالمخازن حتى تصبح بضاعة مباعة.
                                            </p>
                                        </div>

                                        {/* 6. دورة التحويل النقدي CCC */}
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                            <div class="flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-500">دورة التحويل النقدي المجمعة (CCC)</span>
                                                <span class="bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded-full border">الدورة النقدية</span>
                                            </div>
                                            <div class="flex items-baseline gap-3">
                                                <span class="text-2xl font-black text-slate-900">{finCurrent.ccc} يوم</span>
                                                <span class="text-xs text-slate-400">مقابل {finCompare.ccc} يوم للفترة السابقة</span>
                                            </div>
                                            <p class="text-[11px] text-slate-500 leading-relaxed">
                                                مجموع الأيام اللازمة لتحويل الاستثمارات بالمخزون والعملاء إلى تدفق نقدي حقيقي.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة تقييم المخاطر المالي والتنبيهات المترابطة (RISK) */}
                            {currentView === 'risk' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">تقرير المخاطر والتنبيهات التشغيلية</h3>
                                            <p class="text-slate-500 text-xs mt-1">تحديد نقاط الضعف والمخاطر لتدقيق الحسابات وسلامة المركز المالي في الفترة الحالية</p>
                                        </div>
                                    </div>

                                    {/* بطاقات تحليل المخاطر الفنية */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="shield-alert" class="text-red-500 w-5 h-5"></i>
                                                تحليل مستويات المخاطر الهيكلية للسيولة
                                            </h4>

                                            <div class="space-y-4">
                                                <div class="flex justify-between items-center p-4 rounded-xl bg-slate-50 border">
                                                    <div>
                                                        <span class="text-xs font-bold text-slate-900 block">فجوة رأس المال العامل</span>
                                                        <span class="text-[10px] text-slate-500">الأصول المتداولة - الالتزامات المتداولة</span>
                                                    </div>
                                                    <span class="text-xs font-extrabold text-slate-800">{formatCurrency(finCurrent.workingCapital)}</span>
                                                </div>

                                                <div class="flex justify-between items-center p-4 rounded-xl bg-slate-50 border">
                                                    <div>
                                                        <span class="text-xs font-bold text-slate-900 block">معدل تغطية الديون</span>
                                                        <span class="text-[10px] text-slate-500">إجمالي الالتزامات / حقوق الملكية %</span>
                                                    </div>
                                                    <span class="text-xs font-extrabold text-slate-800">{finCurrent.debtToEquity}%</span>
                                                </div>
                                            </div>

                                            <div class="p-4 rounded-xl bg-amber-50 text-amber-800 border border-amber-200 text-xs leading-relaxed">
                                                <strong>تقرير التدقيق:</strong> مستويات السيولة الحالية ممتازة، ومؤشرات الـ Quick Ratio تشير لمتانة النقدية بشكل سليم، مع انخفاض ملحوظ في المديونية التشغيلية.
                                            </div>
                                        </div>

                                        {/* مصفوفة المخاطر السريعة المحدثة */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="activity" class="text-emerald-500 w-5 h-5"></i>
                                                مؤشرات الكفاءة التشغيلية المقارنة
                                            </h4>

                                            <div class="space-y-4">
                                                <div class="flex justify-between items-center p-4 rounded-xl bg-slate-50 border">
                                                    <div>
                                                        <span class="text-xs font-bold text-slate-900 block">دورة تحصيل العملاء DSO</span>
                                                        <span class="text-[10px] text-slate-500">معدل دوران العملاء التجاريين بالأيام</span>
                                                    </div>
                                                    <span class="text-xs font-extrabold text-slate-800">{finCurrent.dso} يوم</span>
                                                </div>

                                                <div class="flex justify-between items-center p-4 rounded-xl bg-slate-50 border">
                                                    <div>
                                                        <span class="text-xs font-bold text-slate-900 block">فترة دوران المخزون DIO</span>
                                                        <span class="text-[10px] text-slate-500">سرعة تسييل المخزون في السوق</span>
                                                    </div>
                                                    <span class="text-xs font-extrabold text-slate-800">{finCurrent.dio} يوم</span>
                                                </div>
                                            </div>

                                            <div class="p-4 rounded-xl bg-emerald-50 text-emerald-800 border border-emerald-200 text-xs leading-relaxed">
                                                <strong>رأي الإدارة:</strong> دورة التحويل النقدي المقارنة تشير إلى كفاءة مرتفعة في عمليات التحصيل وسرعة دوران السلع، مما يدعم المركز المالي بمرونة إضافية.
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* شاشة التنبؤات والتدفقات النقدية المستقبلية (FORECASTING) */}
                            {currentView === 'forecasting' && (
                                <div class="space-y-6 fade-in">
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <div>
                                            <h3 class="text-2xl font-extrabold text-slate-900">محاكاة وتنبؤات التدفق النقدي والأرباح</h3>
                                            <p class="text-slate-500 text-xs mt-1">لوحة اختبار افتراضية لمحاكاة أثر التغير في نمو المبيعات ونسبة التكلفة على صافي أرباح الفترة</p>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        {/* أدوات التحكم والتحريك تفاعلياً */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="sliders" class="text-emerald-500 w-5 h-5"></i>
                                                أدوات سيناريوهات "ماذا لو؟"
                                            </h4>

                                            <div class="space-y-5">
                                                {/* 1. نسبة النمو */}
                                                <div class="space-y-2">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-600">نسبة النمو المتوقعة في المبيعات:</span>
                                                        <span class="text-emerald-600">{simSalesGrowth}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="-50" 
                                                        max="100" 
                                                        value={simSalesGrowth}
                                                        onChange={(e) => setSimSalesGrowth(parseInt(e.target.value))}
                                                        class="w-full accent-emerald-500"
                                                    />
                                                </div>

                                                {/* 2. تكلفة المبيعات */}
                                                <div class="space-y-2">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-600">نسبة تكلفة البضاعة للمبيعات:</span>
                                                        <span class="text-emerald-600">{simCogsRatio}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="20" 
                                                        max="80" 
                                                        value={simCogsRatio}
                                                        onChange={(e) => setSimCogsRatio(parseInt(e.target.value))}
                                                        class="w-full accent-emerald-500"
                                                    />
                                                </div>

                                                {/* 3. المصاريف الإدارية */}
                                                <div class="space-y-2">
                                                    <div class="flex justify-between text-xs font-bold">
                                                        <span class="text-slate-600">نسبة المصاريف الإدارية والتشغيلية:</span>
                                                        <span class="text-emerald-600">{simOpexRatio}%</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="10" 
                                                        max="50" 
                                                        value={simOpexRatio}
                                                        onChange={(e) => setSimOpexRatio(parseInt(e.target.value))}
                                                        class="w-full accent-emerald-500"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        {/* نتائج المحاكاة المقارنة تفاعلياً */}
                                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200/80 lg:col-span-2 space-y-6">
                                            <h4 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="line-chart" class="text-emerald-500 w-5 h-5"></i>
                                                النتائج المتوقعة تحت هذا السيناريو
                                            </h4>

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="bg-slate-50 p-5 rounded-xl border space-y-2">
                                                    <span class="text-xs font-bold text-slate-500">المبيعات المقدرة تحت السيناريو</span>
                                                    <h5 class="text-lg font-black text-slate-900">{formatCurrency(simulatedSales)}</h5>
                                                    <span class="text-[10px] text-slate-400 block">الفعلي الحالي: {formatCurrency(finCurrent.netSales)}</span>
                                                </div>

                                                <div class="bg-slate-50 p-5 rounded-xl border space-y-2">
                                                    <span class="text-xs font-bold text-slate-500">تكلفة البضاعة المقدرة</span>
                                                    <h5 class="text-lg font-black text-slate-900">{formatCurrency(simulatedCogs)}</h5>
                                                    <span class="text-[10px] text-slate-400 block">الفعلي الحالي: {formatCurrency(finCurrent.totalCogs)}</span>
                                                </div>

                                                <div class="bg-slate-50 p-5 rounded-xl border space-y-2">
                                                    <span class="text-xs font-bold text-slate-500">مجمل ربح السيناريو المتوقع</span>
                                                    <h5 class="text-lg font-black text-emerald-600">{formatCurrency(simulatedGrossProfit)}</h5>
                                                    <span class="text-[10px] text-slate-400 block">الفعلي الحالي: {formatCurrency(finCurrent.grossProfit)}</span>
                                                </div>

                                                <div class="bg-slate-50 p-5 rounded-xl border space-y-2">
                                                    <span class="text-xs font-bold text-slate-500">صافي ربح السيناريو المقدر</span>
                                                    <h5 class="text-lg font-black text-indigo-600">{formatCurrency(simulatedNetIncome)}</h5>
                                                    <span class="text-[10px] text-slate-400 block">الفعلي الحالي: {formatCurrency(finCurrent.netIncome)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* نافذة منبثقة تفاعلية (Modal) لإضافة أو تعديل الحسابات بدليل الحسابات */}
                    {showAccountModal && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 fade-in p-4">
                            <div class="bg-white rounded-2xl shadow-xl border w-full max-w-lg overflow-hidden">
                                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h4 class="text-sm font-bold">{modalMode === 'add' ? 'إضافة حساب جديد لدليل الحسابات الموحد' : 'تعديل بيانات تصنيف واسم الحساب'}</h4>
                                    <button onClick={() => setShowAccountModal(false)} class="text-slate-400 hover:text-white font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleAddAccount} class="p-6 space-y-4">
                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">كود الحساب (رقمي فريد):</label>
                                        <input 
                                            type="text" 
                                            disabled={modalMode === 'edit'}
                                            value={accountForm.code} 
                                            onChange={(e) => setAccountForm({ ...accountForm, code: e.target.value })}
                                            placeholder="مثل 1114"
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold disabled:opacity-60"
                                            required
                                        />
                                    </div>

                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">اسم الحساب بالعربية:</label>
                                        <input 
                                            type="text" 
                                            value={accountForm.nameAr} 
                                            onChange={(e) => setAccountForm({ ...accountForm, nameAr: e.target.value })}
                                            placeholder="اسم الحساب باللغة العربية"
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold"
                                            required
                                        />
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">الفئة الرئيسية:</label>
                                            <select 
                                                value={accountForm.category} 
                                                onChange={(e) => setAccountForm({ ...accountForm, category: e.target.value })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                            >
                                                <option value="Assets">الأصول (Assets)</option>
                                                <option value="Liabilities">الالتزامات (Liabilities)</option>
                                                <option value="Equity">حقوق الملكية (Equity)</option>
                                                <option value="Revenues">الإيرادات (Revenues)</option>
                                                <option value="Expenses">المصروفات (Expenses)</option>
                                            </select>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">التصنيف الفرعي:</label>
                                            <select 
                                                value={accountForm.subCategory} 
                                                onChange={(e) => setAccountForm({ ...accountForm, subCategory: e.target.value })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                            >
                                                <option value="Current Assets">الأصول المتداولة</option>
                                                <option value="Non-Current Assets">الأصول غير المتداولة</option>
                                                <option value="Current Liabilities">الالتزامات المتداولة</option>
                                                <option value="Non-Current Liabilities">الالتزامات غير المتداولة</option>
                                                <option value="Equity">حقوق الملكية</option>
                                                <option value="Revenues">الإيرادات</option>
                                                <option value="COGS">تكلفة المبيعات</option>
                                                <option value="OPEX">مصاريف تشغيلية</option>
                                                <option value="Finance">مصاريف تمويلية</option>
                                                <option value="Tax">مصروف زكاة وضريبة</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="pt-4 border-t flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowAccountModal(false)} class="bg-slate-100 font-bold text-xs px-5 py-2.5 rounded-xl border">إلغاء</button>
                                        <button type="submit" class="bg-slate-900 text-white font-bold text-xs px-6 py-2.5 rounded-xl shadow-md">{modalMode === 'add' ? 'إضافة للحسابات' : 'حفظ التعديلات'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* نافذة منبثقة تفاعلية (Modal) لإدخال رصيد ميزان المراجعة لفترة محاسبية معينة أو تعديله */}
                    {showBalanceModal && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 fade-in p-4">
                            <div class="bg-white rounded-2xl shadow-xl border w-full max-w-lg overflow-hidden">
                                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h4 class="text-sm font-bold">إدخال أو تعديل رصيد ميزان المراجعة</h4>
                                    <button onClick={() => setShowBalanceModal(false)} class="text-slate-400 hover:text-white font-bold">&times;</button>
                                </div>
                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        const existsIndex = balances.findIndex(b => b.accountCode === balanceForm.accountCode && b.periodId === balanceForm.periodId);
                                        const newEntry = {
                                            entryId: existsIndex >= 0 ? balances[existsIndex].entryId : `entry_${Date.now()}`,
                                            accountCode: balanceForm.accountCode,
                                            periodId: balanceForm.periodId,
                                            debit: parseFloat(balanceForm.debit) || 0,
                                            credit: parseFloat(balanceForm.credit) || 0
                                        };

                                        if (existsIndex >= 0) {
                                            const updated = [...balances];
                                            updated[existsIndex] = newEntry;
                                            setBalances(updated);
                                        } else {
                                            setBalances(prev => [...prev, newEntry]);
                                        }

                                        alert("تم تسجيل وتحديث الرصيد بنجاح لتنعكس التعديلات على القوائم فورياً!");
                                        setShowBalanceModal(false);
                                    }} 
                                    class="p-6 space-y-4"
                                >
                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">الحساب المعني:</label>
                                        <select 
                                            value={balanceForm.accountCode} 
                                            onChange={(e) => setBalanceForm({ ...balanceForm, accountCode: e.target.value })}
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none"
                                        >
                                            {accounts.map(acc => (
                                                <option key={acc.id} value={acc.code}>{acc.code} - {acc.nameAr}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div class="space-y-1">
                                        <label class="text-xs font-bold text-slate-600">الفترة المحاسبية المراد تفعيلها والتعديل عليها:</label>
                                        <select 
                                            value={balanceForm.periodId} 
                                            onChange={(e) => setBalanceForm({ ...balanceForm, periodId: e.target.value })}
                                            class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold"
                                        >
                                            {periods.map(p => (
                                                <option key={p.id} value={p.id}>{p.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">رصيد مدين:</label>
                                            <input 
                                                type="number" 
                                                value={balanceForm.debit} 
                                                onChange={(e) => setBalanceForm({ ...balanceForm, debit: parseFloat(e.target.value) || 0 })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold text-emerald-600"
                                            />
                                        </div>

                                        <div class="space-y-1">
                                            <label class="text-xs font-bold text-slate-600">رصيد دائن:</label>
                                            <input 
                                                type="number" 
                                                value={balanceForm.credit} 
                                                onChange={(e) => setBalanceForm({ ...balanceForm, credit: parseFloat(e.target.value) || 0 })}
                                                class="w-full bg-slate-100 border text-xs p-3 rounded-xl focus:outline-none font-bold text-red-600"
                                            />
                                        </div>
                                    </div>

                                    <div class="pt-4 border-t flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowBalanceModal(false)} class="bg-slate-100 font-bold text-xs px-5 py-2.5 rounded-xl border">إلغاء</button>
                                        <button type="submit" class="bg-slate-900 text-white font-bold text-xs px-6 py-2.5 rounded-xl shadow-md">تحديث الرصيد</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // تشغيل تطبيق الـ React في بيئة الـ DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
